<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | The Empire</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
      --header-light: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== HEADER ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 100px;
      background: var(--header-light); backdrop-filter: blur(25px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    #clock { font-size: 26px; color: var(--gold-bright); font-weight: 900; font-family: 'Cinzel'; }
    .nav-links { display: flex; gap: 15px; }
    .nav-btn {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 12px 35px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
    }

    /* ====== PAGE TRANSITION EFFECT ====== */
    .page { 
      display: none; 
      opacity: 0; 
      transform: scale(1.1);
      filter: blur(10px);
      transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .page.active { 
      display: block; 
      opacity: 1; 
      transform: scale(1);
      filter: blur(0);
    }

    /* ====== HERO & MOVING NAME ====== */
    .hero {
      height: 180vh; /* נדרש גובה בשביל גלילה ותנועת שם */
      width: 100%; position: relative;
    }
    .hero-sticky {
      position: sticky; top: 0; height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }
    
    .scrolling-name {
      font-size: 10vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 1.5px var(--gold); font-family: 'Inter';
      text-transform: uppercase; white-space: nowrap; letter-spacing: -2px;
      will-change: transform; transition: color 0.4s ease;
    }

    .medieval-btn {
      margin-top: 40px; font-family: 'Cinzel'; background: linear-gradient(135deg, var(--gold), #8a6d3b);
      color: black; padding: 18px 55px; border: 2px solid #5e4d2b; font-weight: 900;
      font-size: 1.4rem; cursor: pointer; transition: 0.3s;
    }

    /* ====== GALLERY ====== */
    .gallery-zone { background: var(--bg-dark); padding: 80px 20px; position: relative; z-index: 5; }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 25px; max-width: 1400px; margin: 0 auto;
    }
    .card { height: 500px; border: 1px solid #222; background-size: cover; background-position: center; }

    /* ====== CONTENT PAGES ====== */
    .content-container { padding: 200px 10%; text-align: center; min-height: 100vh; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
    .content-container h2 { font-size: 6rem; font-family: 'Cinzel'; color: var(--gold-bright); margin-bottom: 20px; letter-spacing: 5px; }

    /* ====== LOADER ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark); transition: opacity 0.6s ease;
    }
    .dr-bounce { font-size: 6rem; font-weight: 900; color: var(--gold); animation: simpleJump 1.5s infinite; font-family: 'Inter'; }
    @keyframes simpleJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

  </style>
</head>
<body onload="init()">

  <div id="loader-main">
    <div class="dr-bounce">D&R</div>
  </div>

  <header class="header">
    <div class="header-left"><div id="clock">00:00:00</div></div>
    <div class="nav-links">
      <button class="nav-btn" onclick="navigateTo('/')">דף הבית</button>
      <button class="nav-btn" onclick="navigateTo('/history')">היסטוריה</button>
      <button class="nav-btn" onclick="navigateTo('/films')">סרטים</button>
    </div>
  </header>

  <div id="page-home" class="page active">
    <section class="hero">
      <div class="hero-sticky">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <button class="medieval-btn" onclick="document.getElementById('gallery-zone').scrollIntoView({behavior: 'smooth'})">לצלול לכיף</button>
      </div>
    </section>
    <div id="gallery-zone" class="gallery-zone">
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="page-history" class="page">
    <div class="content-container">
      <h2>HISTORY</h2>
      <p style="font-size: 1.5rem; opacity: 0.7;">THE ERA OF EXCELLENCE</p>
      <div style="width: 200px; height: 1px; background: var(--gold); margin: 40px auto;"></div>
      <p>כאן נכתבת המורשת. דולב ורועי מציגים את ציר הזמן של האימפריה.</p>
    </div>
  </div>

  <div id="page-films" class="page">
    <div class="content-container">
      <h2>FILMS</h2>
      <p style="font-size: 1.5rem; opacity: 0.7;">CINEMATIC VISIONS</p>
      <div style="width: 200px; height: 1px; background: var(--gold); margin: 40px auto;"></div>
      <p>הפקות המקור של הסטודיו. חוויה ויזואלית ללא פשרות.</p>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 600);
      }, 1500);
      updateClock();
      
      window.onpopstate = () => handleRoute(window.location.pathname);
      handleRoute(window.location.pathname);
    }

    // ניווט עם אפקט "פורטל"
    function navigateTo(path) {
      if (window.location.pathname === path) return;
      
      // אפקט יציאה קטן
      document.querySelector('.page.active').style.opacity = '0';
      document.querySelector('.page.active').style.transform = 'scale(0.9)';
      
      setTimeout(() => {
        window.history.pushState({}, "", path);
        handleRoute(path);
      }, 400);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => {
        p.classList.remove('active');
        p.style.display = 'none';
      });

      let targetId = 'page-home';
      if (path === '/history') targetId = 'page-history';
      if (path === '/films') targetId = 'page-films';

      const targetPage = document.getElementById(targetId);
      targetPage.style.display = 'block';
      
      // Force reflow
      targetPage.offsetHeight; 
      
      targetPage.classList.add('active');
      targetPage.style.opacity = '1';
      targetPage.style.transform = 'scale(1)';
      
      window.scrollTo(0, 0);
    }

    // אנימציית גלילה לשם - חזר לפעולה!
    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY;
      const winHeight = window.innerHeight;
      
      if (document.getElementById('page-home').classList.contains('active')) {
        const name = document.getElementById('main-name');
        const progress = Math.min(scrollPos / winHeight, 1.5);
        
        // תנועה אופקית (כמו מקודם)
        const xPos = 50 - (progress * 100); 
        name.style.transform = `translateX(${xPos}%)`;
        
        // צביעה בזהב ככל שגוללים
        if (progress > 0.4) {
          name.style.color = `rgba(197, 160, 89, ${progress - 0.4})`;
        } else {
          name.style.color = 'transparent';
        }
      }
    });

    function updateClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
      }, 1000);
    }

    // יצירת גלריה
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];
    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${src}')`;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
