<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --text-main: #f8f8f8;
      --bg-dark: #121212;
    }

    /* אפקט גלילה חלק לכל האתר */
    html { scroll-behavior: smooth; }

    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); }

    /* Header */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }

    .header-center { flex: 1; font-family: 'Frank Ruhl Libre', serif; color: var(--gold); font-size: 1.6rem; font-weight: 700; text-align: center; }

    .nav-btn {
      color: var(--text-main); text-decoration: none; font-weight: 600; cursor: pointer;
      padding: 8px 16px; border: 1px solid var(--gold); border-radius: 4px; background: transparent; transition: 0.3s;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* Hero Section */
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center;
    }

    .quote-box {
      border: 1px solid rgba(197, 160, 89, 0.4); padding: 40px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    }

    /* החלק החדש - Welcome Section */
    .welcome-section {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: var(--bg-dark);
      padding: 50px 20px;
      text-align: center;
    }

    .welcome-img {
      max-width: 80%;
      max-height: 60vh;
      border: 3px solid var(--gold);
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(197, 160, 89, 0.3);
      margin-bottom: 30px;
    }

    .welcome-text {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 2.5rem;
      color: var(--gold);
      max-width: 800px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <header class="header">
    <div style="flex:1"></div>
    <div class="header-center" id="parasha">טוען פרשה...</div>
    <div style="flex:1; display:flex; justify-content:flex-end; gap:10px;">
        <button class="nav-btn">היסטוריה</button>
        <button class="nav-btn">אודות</button>
    </div>
  </header>

  <section class="hero">
    <div class="quote-box">
      <div style="font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; margin-bottom: 20px;">"העוצמה היא המפתח לקיום."</div>
      <div style="font-size: 1.2rem; color: var(--gold); margin-bottom: 30px;">- בנימין נתניהו</div>
      <button class="nav-btn" style="padding: 15px 35px; font-size: 1.1rem;" onclick="document.getElementById('welcome').scrollIntoView();">מוכנים לצלול לכיף?</button>
    </div>
  </section>

  <section id="welcome" class="welcome-section">
    <img src="./aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg" alt="דולב ורועי" class="welcome-img">
    <div class="welcome-text">
        רועי ודולב מברכים אותכם על היוולדותכם לעולם
    </div>
  </section>

  <script>
    // פרשה
    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });
  </script>
</body>
</html>
