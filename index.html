<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>היכל העוצמה | דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@200;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
      --text-light: #f1f1f1;
      --royal-purple: #1a0a2e;
      --royal-blue: #0a142e;
    }

    html { scroll-behavior: smooth; }
    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

    /* ====== באנר אזעקות ====== */
    #alert-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: linear-gradient(90deg, #900, #f00, #900); color: white; padding: 15px; text-align: center;
      font-weight: 900; z-index: 9999; border-bottom: 2px solid gold; font-size: 1.4rem;
    }

    /* ====== Header אלגנטי ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 85px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; border-bottom: 1px solid rgba(197, 160, 89, 0.3);
    }
    #clock { font-weight: 200; font-size: 20px; color: var(--gold); letter-spacing: 1px; }
    .header-center { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.8rem; letter-spacing: 3px; }
    .nav-btn {
      color: var(--text-light); font-family: 'Cinzel', serif; text-decoration: none; font-size: 13px;
      padding: 10px 25px; border: 1px solid var(--gold); border-radius: 2px; background: transparent; transition: 0.5s; cursor: pointer;
    }
    .nav-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 15px rgba(197, 160, 89, 0.5); }

    /* ====== דפים ====== */
    .page { display: none; min-height: 100vh; width: 100%; box-sizing: border-box; }
    .page.active { display: block; }

    /* דף הבית עם התמונה המקורית שלכם */
    #main-hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* המלבן המעוצב - סגנון ימי הביניים מודרני */
    .royal-frame {
      background: rgba(10, 10, 10, 0.85);
      padding: 60px 80px;
      border: 1px solid var(--gold);
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(197, 160, 89, 0.1);
      max-width: 900px;
    }
    .royal-frame::before, .royal-frame::after {
      content: ''; position: absolute; width: 40px; height: 40px; border: 2px solid var(--gold);
    }
    .royal-frame::before { top: -10px; right: -10px; border-bottom: none; border-left: none; }
    .royal-frame::after { bottom: -10px; left: -10px; border-top: none; border-right: none; }

    .quote-text {
      font-family: 'Frank Ruhl Libre', serif; font-size: 2.8rem; font-weight: 700;
      color: var(--gold); line-height: 1.2; margin-bottom: 30px;
    }

    /* כפתור ימי הביניים */
    .medieval-btn {
      font-family: 'Cinzel', serif;
      background: linear-gradient(135deg, #8a6d3b 0%, #c5a059 50%, #8a6d3b 100%);
      color: #1a1a1a;
      padding: 18px 50px;
      border: 2px solid #5e4d2b;
      font-weight: 700;
      font-size: 1.2rem;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: 0.3s;
      border-radius: 4px;
    }
    .medieval-btn:hover {
      filter: brightness(1.2);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(197, 160, 89, 0.4);
    }

    /* ====== קרוסלה עקבית ואיטית ====== */
    .carousel-section { background: #000; padding: 80px 0; border-top: 1px solid var(--gold); }
    .carousel-container { width: 100%; overflow: hidden; position: relative; }
    .track {
      display: flex; width: max-content;
      animation: slowScroll 60s linear infinite; /* קצב איטי ועקבי */
    }
    .track img {
      height: 450px; width: auto; margin: 0 20px;
      border: 1px solid var(--gold); filter: grayscale(30%); transition: 0.6s; cursor: pointer;
    }
    .track img:hover { filter: grayscale(0%); transform: scale(1.03); border-color: #fff; }

    @keyframes slowScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .truth-text { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 30px; }

    /* ====== דפי תוכן משודרגים ====== */
    .royal-title {
      font-family: 'Cinzel', serif; font-size: 5rem; font-weight: 700;
      color: var(--gold); text-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 30px rgba(197, 160, 89, 0.4);
      margin-bottom: 20px;
    }
    #history { background: linear-gradient(to bottom, #000000, #1a0a2e); padding-top: 200px; text-align: center; }
    #about { background: linear-gradient(to bottom, #000000, #0a142e); padding-top: 200px; text-align: center; }

  </style>
</head>
<body>

  <div id="alert-banner">🚨 אזעקת צבע אדום: <span id="alert-loc"></span></div>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
    </div>
    <div class="header-center" id="parasha">היכל העוצמה</div>
    <div class="header-right">
      <button class="nav-btn" onclick="nav('history')">היסטוריה מלכותית</button>
      <button class="nav-btn" onclick="nav('about')">אודות המותג</button>
      <button class="nav-btn" onclick="nav('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active">
    <section id="main-hero">
      <div class="royal-frame">
        <div class="quote-text">"העוצמה אינה נמדדת במה שיש לך, אלא במה שאתה בונה עבור אלו שאחריך."</div>
        <button class="medieval-btn" onclick="document.getElementById('fun-zone').scrollIntoView();">לצלול לכיף</button>
      </div>
    </section>

    <section id="fun-zone" class="carousel-section">
      <h2 style="font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; color: var(--gold);">רועי ודולב</h2>
      <p class="truth-text">כל האמת בפנים, לחצו על התמונות בשבילה</p>
      
      <div class="carousel-container">
        <div class="track" id="main-track">
          </div>
      </div>
    </section>
  </div>

  <div id="history" class="page">
    <h1 class="royal-title">היסטוריה מלכותית</h1>
    <div style="font-size: 1.5rem; color: rgba(197,160,89,0.7);">מורשת שנכתבה בזהב</div>
  </div>

  <div id="about" class="page">
    <h1 class="royal-title">אודות המותג</h1>
    <div style="font-size: 1.5rem; color: rgba(197,160,89,0.7);">החזון שמאחורי הקלעים</div>
  </div>

  <script>
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_230759616.png',
      './image_2026-03-13_222345060.png'
    ];

    // בניית קרוסלה עקבית (שכפול פי 10 ליתר ביטחון)
    const track = document.getElementById('main-track');
    for(let i=0; i<10; i++){
      images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.onclick = () => alert("האמת היא: שדולב ורועי הם השליטים האמיתיים של הרשת! 👑");
        track.appendChild(img);
      });
    }

    function nav(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    // זמן ופרשה
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
    }, 1000);

    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });

    // אזעקות
    async function checkAlerts() {
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.oref.org.il/WarningMessages/alert/alerts.json')}`);
        const j = await r.json();
        const d = JSON.parse(j.contents);
        const b = document.getElementById('alert-banner');
        if (d && d.data) {
          document.getElementById('alert-loc').textContent = d.data.join(', ');
          b.style.display = 'block';
        } else { b.style.display = 'none'; }
      } catch(e) {}
    }
    setInterval(checkAlerts, 4000);
  </script>
</body>
</html>
