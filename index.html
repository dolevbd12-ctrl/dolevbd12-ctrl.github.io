<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R STUDIO | Official Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Oswald:wght@700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent-blue: #0047ab;
      --bg: #ffffff;
      --black: #0a0a0a;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--bg); overflow-x: hidden; color: var(--black);
    }

    /* ====== LOADER: התכוננו לפנומן ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--black); transition: opacity 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .loader-content { text-align: center; }
    .studio-bounce { 
      font-size: 5rem; font-weight: 900; color: var(--accent-blue);
      display: inline-block; animation: bounceJump 1.8s infinite;
    }
    .phenomenon-text { 
      margin-top: 20px; font-size: 1.2rem; letter-spacing: 10px; color: white;
      text-transform: uppercase; animation: fadeInOut 1.5s infinite;
    }

    @keyframes bounceJump {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); }
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ====== NAVIGATION (Inspired by Lando & Charles) ====== */
    nav {
      position: fixed; top: 0; width: 100%; height: 90px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%; z-index: 1000; mix-blend-mode: difference; color: white;
    }
    .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: -3px; cursor: pointer; }
    .nav-links { display: flex; gap: 30px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
    .nav-links div { cursor: pointer; transition: 0.3s; position: relative; }
    .nav-links div::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--accent-blue); transition: 0.3s; }
    .nav-links div:hover::after { width: 100%; }

    /* ====== HERO AREA (Sticky Experience) ====== */
    .hero {
      height: 250vh; width: 100%; position: relative;
      background: var(--black);
    }
    .hero-bg {
      position: sticky; top: 0; height: 100vh; width: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .scrolling-name {
      font-size: 15vw; font-weight: 900; color: white; text-transform: uppercase;
      white-space: nowrap; will-change: transform; letter-spacing: -8px;
    }
    .dive-indicator {
      position: absolute; bottom: 40px; text-align: center; color: white;
      font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase;
    }

    /* ====== GRID (Reveal Style) ====== */
    .reveal-section { position: relative; z-index: 10; background: white; padding-top: 5vh; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 5px; }
    .grid-item { height: 95vh; overflow: hidden; position: relative; background: var(--black); }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0.85; }
    .grid-item:hover img { transform: scale(1.05); opacity: 1; }

    /* ====== FOOTER (Personal Touch) ====== */
    .meet-us {
      background: var(--black); color: white; padding: 150px 5%;
      display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #333;
    }
    .person { text-align: center; }
    .person p { font-family: 'Playfair Display'; font-style: italic; color: #666; font-size: 1.4rem; margin-bottom: 10px; }
    .person h3 { font-size: 4rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -2px; }

    /* ====== PAGES ====== */
    .page { display: none; min-height: 100vh; background: white; }
    .page.active { display: block; }
    .subpage-header { padding: 150px 6% 50px; font-size: 12vw; font-weight: 900; letter-spacing: -8px; line-height: 0.8; }
  </style>
</head>
<body onload="initSite()">

  <div id="loader-main">
    <div class="loader-content">
        <div class="studio-bounce">D&R STUDIO</div>
        <div class="phenomenon-text">התכוננו לפנומן</div>
    </div>
  </div>

  <nav>
    <div class="logo" onclick="goToPage('main')">D&R</div>
    <div class="nav-links">
      <div onclick="diveToFun()">לצלול לכיף</div>
      <div onclick="goToPage('history')">היסטוריה</div>
      <div onclick="goToPage('films')">סרטים</div>
    </div>
  </nav>

  <div id="main" class="page active">
    <section class="hero">
      <div class="hero-bg">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <div class="dive-indicator">Scroll to Explore</div>
      </div>
    </section>

    <div id="grid-start" class="reveal-section">
      <div class="grid" id="main-grid"></div>
    </div>

    <section class="meet-us">
        <div class="person">
            <p>Creative Director</p>
            <h3>הכירו את דולב</h3>
        </div>
        <div class="person">
            <p>Visionary Artist</p>
            <h3>הכירו את רועי</h3>
        </div>
    </section>
  </div>

  <div id="history" class="page">
    <div class="subpage-header">THE<br>LEGACY</div>
  </div>

  <div id="films" class="page">
    <div class="subpage-header">STUDIO<br>FILMS</div>
    <div style="padding: 0 6%; display: grid; gap: 20px;">
        <div style="height: 60vh; background: #eee;"></div>
        <div style="height: 60vh; background: #eee;"></div>
    </div>
  </div>

  <script>
    function initSite() {
      setTimeout(() => {
        const l = document.getElementById('loader-main');
        l.style.opacity = '0';
        setTimeout(() => l.style.display = 'none', 800);
      }, 2000);
    }

    // Scroll Animation (Inspired by Leclerc)
    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY;
      const winHeight = window.innerHeight;
      const progress = Math.min(scrollPos / winHeight, 1.2);
      
      const name = document.getElementById('main-name');
      // תנועה מצד לצד
      const xPos = 80 - (progress * 160);
      name.style.transform = `translateX(${xPos}%)`;
    });

    function goToPage(pageId) {
      const loader = document.getElementById('loader-main');
      loader.style.display = 'flex'; loader.style.opacity = '1';
      setTimeout(() => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
        setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display='none', 800); }, 600);
      }, 1000);
    }

    function diveToFun() {
      if (!document.getElementById('main').classList.contains('active')) {
        goToPage('main');
        setTimeout(() => document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'}), 1800);
      } else {
        document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'});
      }
    }

    // Grid Images
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_222345060.png'
    ];
    const grid = document.getElementById('main-grid');
    images.forEach(src => {
      const div = document.createElement('div');
      div.className = 'grid-item';
      div.innerHTML = `<img src="${src}">`;
      grid.appendChild(div);
    });
  </script>
</body>
</html>
