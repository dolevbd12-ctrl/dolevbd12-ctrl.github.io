<script>
  /* ============================
     JSONP helper (עוקף CORS מול Sefaria)
     ============================ */
  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      const sep = url.includes("?") ? "&" : "?";
      const script = document.createElement("script");
      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error("JSONP timeout"));
      }, 12000);

      function cleanup() {
        clearTimeout(timeout);
        delete window[cb];
        script.remove();
      }

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      script.src = url + sep + "callback=" + cb;
      script.onerror = () => {
        cleanup();
        reject(new Error("JSONP load error"));
      };

      document.body.appendChild(script);
    });
  }

  /* ============================
     פרשת השבוע: Hebcal -> טווח קריאה -> טקסט מספראיה ב-JSONP
     ============================ */
  (function(){
    const elText     = document.getElementById("parshaText");
    const elStatus   = document.getElementById("status");
    const elMarqText = document.getElementById("marqueeText");

    const GEO = { geo: "geoname", geonameid: 281184 }; // Jerusalem

    function showError(msg){
      elStatus.textContent = msg;
      elStatus.style.display = "block";
    }
    function clearError(){
      elStatus.textContent = "";
      elStatus.style.display = "none";
    }

    function hebcalUrl(){
      // שימי לב: זה endpoint של "shabbat" שמחזיר גם leyning.torah
      const url = new URL("https://www.hebcal.com/shabbat");
      url.searchParams.set("cfg", "json");
      url.searchParams.set("geo", GEO.geo);
      url.searchParams.set("geonameid", String(GEO.geonameid));
      url.searchParams.set("M", "on");
      url.searchParams.set("hdp", "1"); // חלקי תאריך עברי נוחים
      return url.toString();
    }

    function formatHebrewDateFromParts(heDateParts){
      // heDateParts מגיע מ-Hebcal כש-hdp=1
      if(!heDateParts) return "";
      const d = heDateParts.d || "";
      const m = heDateParts.m || "";
      const y = heDateParts.y || "";
      const parts = [d, m, y].filter(Boolean);
      return parts.join(" ");
    }

    function formatDateHe(dateIso){
      if(!dateIso) return "";
      const d = new Date(dateIso);
      if(Number.isNaN(d.getTime())) return "";
      return new Intl.DateTimeFormat("he-IL", {
        weekday: "long", year: "numeric", month: "long", day: "numeric"
      }).format(d);
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeSefariaHebrewText(textJson){
      // v1 texts api מחזיר he כמערך פסוקים/פסקאות
      const he = textJson?.he;
      if(Array.isArray(he)) return he.filter(Boolean).join(" ");
      if(typeof he === "string") return he;
      return "";
    }

    async function loadParshaAndText(){
      clearError();
      elText.textContent = "טוען את טקסט הפרשה…";
      elMarqText.textContent = "טוען פרשת השבוע…";

      try{
        // 1) Hebcal Shabbat => פרשה + תאריך עברי + leyning.torah
        const hebRes = await fetch(hebcalUrl(), { cache: "no-store" });
        if(!hebRes.ok) throw new Error("Hebcal HTTP " + hebRes.status);
        const hebJson = await hebRes.json();

        const items = Array.isArray(hebJson?.items) ? hebJson.items : [];
        const parshaItem = items.find(x => x?.category === "parashat");
        if(!parshaItem) throw new Error("No parasha in Hebcal response");

        const parashaHe = (parshaItem.hebrew || "").replace(/^פרשת\s*/i, "").trim() || "פרשת השבוע";
        const gregDate  = formatDateHe(parshaItem.date);
        const hebDate   = formatHebrewDateFromParts(parshaItem?.heDateParts);

        // זה ה"טווח" שממנו נביא טקסט
        const torahRef = parshaItem?.leyning?.torah; // לדוגמה: "Genesis 6:9-11:32"

        // טיקר למעלה
        const parts = [];
        parts.push("פרשת השבוע: " + parashaHe);
        if(hebDate) parts.push("תאריך עברי: " + hebDate);
        if(gregDate) parts.push("שבת: " + gregDate);
        elMarqText.textContent = parts.join("  •  ");

        if(!torahRef){
          elText.textContent = "טקסט הפרשה לא זמין כרגע (Hebcal לא החזיר טווח קריאה).";
          return;
        }

        // 2) Sefaria texts (v1) דרך JSONP כדי לא להיחסם ב-CORS
        // שימי לב: זה מביא את כל הטווח (הפרשה) בבת אחת
        const sefUrl = "https://www.sefaria.org/api/texts/" + encodeURIComponent(torahRef)
                     + "?lang=he&context=0";

        const textJson = await jsonp(sefUrl);
        const hebText = normalizeSefariaHebrewText(textJson);

        if(!hebText){
          elText.textContent = "הטקסט חזר ריק מספראיה כרגע.";
          return;
        }

        // הצגה יפה בפסקאות (בלי "עלייה 1/2/3")
        elText.innerHTML = `<p>${escapeHtml(hebText)}</p>`;

      } catch(err){
        console.error(err);
        showError("יש בעיה בטעינה (אינטרנט/חסימה/שרת). נסה לרענן את הדף.");
        elText.textContent = "לא הצלחתי לטעון את טקסט הפרשה כרגע.";
      }
    }

    loadParshaAndText();
    setInterval(loadParshaAndText, 6 * 60 * 60 * 1000);
  })();

  /* ============================
     ווידג׳ט דיווחים (כמו שהיה)
     ============================ */
  (function(){
    const els = {
      statusBadge: document.getElementById("w_statusBadge"),
      statusDot: document.getElementById("w_statusDot"),
      statusText: document.getElementById("w_statusText"),
      updatedAt: document.getElementById("w_updatedAt"),
      reportCard: document.getElementById("w_reportCard"),
      sevBar: document.getElementById("w_sevBar"),
      reportTitle: document.getElementById("w_reportTitle"),
      reportText: document.getElementById("w_reportText"),
      reportTime: document.getElementById("w_reportTime"),
      btnRefresh: document.getElementById("w_btnRefresh"),
      btnSimulate: document.getElementById("w_btnSimulate"),
    };

    const demoReports = [
      { level: "ok",       title: "שגרה תקינה",        text: "אין דיווחים חריגים כרגע. ניטור פעיל ברקע." },
      { level: "warn",     title: "תשומת לב נקודתית",  text: "זוהתה אינדיקציה שדורשת אימות ממוקד. אין שינוי נרחב." },
      { level: "critical", title: "התרעה חשובה",       text: "נדרשת בדיקה מיידית של פרטי הדיווח. פעל לפי נהלים." }
    ];

    function heTime(){
      return new Intl.DateTimeFormat("he-IL", { hour:"2-digit", minute:"2-digit", second:"2-digit" }).format(new Date());
    }

    function setStatus(level){
      const isAlert = (level === "critical");
      els.statusBadge.classList.toggle("alert", isAlert);
      els.statusText.textContent = isAlert ? "התרעה פעילה" : "אין התרעות";

      if(level === "warn"){
        els.statusDot.style.background = "var(--w-warn)";
      } else if(level === "critical"){
        els.statusDot.style.background = "var(--w-red2)";
      } else {
        els.statusDot.style.background = "var(--w-ok)";
      }
    }

    function setSeverityBar(level){
      els.sevBar.classList.remove("ok","warn","critical");
      els.sevBar.classList.add(level);
    }

    function animateUpdate(){
      els.reportCard.classList.remove("updated");
      void els.reportCard.offsetHeight;
      els.reportCard.classList.add("updated");
    }

    function applyReport(report){
      setSeverityBar(report.level);
      setStatus(report.level);

      els.reportTitle.textContent = report.title;
      els.reportText.textContent  = report.text;

      const t = heTime();
      els.reportTime.textContent  = t;
      els.updatedAt.textContent   = t;

      animateUpdate();
    }

    let idx = 0;
    function nextReport(){
      idx = (idx + 1) % demoReports.length;
      applyReport(demoReports[idx]);
    }

    applyReport(demoReports[0]);
    els.btnSimulate.addEventListener("click", nextReport);
    els.btnRefresh.addEventListener("click", () => applyReport(demoReports[idx]));

    setInterval(() => {
      els.updatedAt.textContent = heTime();
    }, 30000);
  })();
</script>
