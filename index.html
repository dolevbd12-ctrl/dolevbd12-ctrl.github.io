<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | Elite Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== HEADER (שורת משימות) ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 100px;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; border-bottom: 1px solid rgba(197, 160, 89, 0.2);
    }
    
    .header-left { display: flex; flex-direction: column; }
    #clock { font-size: 24px; color: var(--gold); font-weight: 900; font-family: 'Cinzel', serif; }
    
    /* ====== כפתורי אליפסה מוזהבים ====== */
    .nav-links { display: flex; gap: 15px; }
    
    .nav-btn {
      color: black; font-family: 'Cinzel', serif; font-weight: 700;
      padding: 12px 35px; border-radius: 50px; /* הופך אותו לאליפסה */
      border: 1px solid var(--gold-bright);
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      cursor: pointer; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      font-size: 0.9rem; text-decoration: none; display: flex; align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .nav-btn:hover { 
      transform: translateY(-3px) scale(1.05); 
      box-shadow: 0 8px 25px rgba(197, 160, 89, 0.5);
      filter: brightness(1.1);
    }

    /* ====== HERO & SCROLLING NAME ====== */
    .hero {
      height: 200vh; width: 100%; position: relative;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      background-attachment: fixed;
    }
    .sticky-wrap {
      position: sticky; top: 0; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }
    .scrolling-name {
      font-size: 10vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 1.5px var(--gold); font-family: 'Inter', sans-serif;
      text-transform: uppercase; white-space: nowrap; will-change: transform;
    }

    /* ====== לצלול לכיף BUTTON ====== */
    .dive-btn-container {
      margin-top: 40px; opacity: 0; transform: translateY(30px); transition: 1s ease;
    }
    .dive-btn-container.visible { opacity: 1; transform: translateY(0); }

    .medieval-btn {
      font-family: 'Cinzel', serif; background: linear-gradient(135deg, var(--gold), #8a6d3b);
      color: black; padding: 18px 55px; border: 2px solid #5e4d2b; font-weight: 900;
      font-size: 1.4rem; cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 4px;
    }
    .medieval-btn:hover { transform: scale(1.05); filter: brightness(1.2); box-shadow: 0 0 40px var(--gold); }

    /* ====== GALLERY ====== */
    .page { display: none; }
    .page.active { display: block; }
    .gallery-zone { background: var(--bg-dark); padding: 50px 20px 100px; }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 25px; max-width: 1400px; margin: 0 auto;
    }
    .card {
      height: 500px; cursor: pointer; border: 1px solid #222;
      background-size: cover; background-position: center; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .card:hover { border-color: var(--gold); transform: scale(1.02); }

    /* ====== LOADER ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark); transition: opacity 0.8s ease;
    }
    .dr-bounce { font-size: 6rem; font-weight: 900; color: var(--gold); animation: simpleJump 1.5s infinite; font-family: 'Inter'; }
    @keyframes simpleJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    /* ====== MODAL ====== */
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
    .modal-content { background: #000; margin: 10% auto; padding: 60px; border: 2px solid var(--gold); width: 300px; text-align: center; }
    .modal-number { font-size: 8rem; font-weight: 900; color: var(--gold); font-family: 'Inter'; }
  </style>
</head>
<body onload="init()">

  <div id="loader-main">
    <div class="loader-content">
        <div class="dr-bounce">D&R</div>
        <div style="color: var(--gold); letter-spacing: 5px; margin-top: 10px; font-family: 'Cinzel';">התכוננו לפנומן</div>
    </div>
  </div>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
    </div>
    <div class="nav-links">
      <div class="nav-btn" onclick="nav('main')">דף הבית</div>
      <div class="nav-btn" onclick="nav('history')">היסטוריה</div>
      <div class="nav-btn" onclick="nav('films')">סרטים</div>
    </div>
  </header>

  <div id="main" class="page active">
    <section class="hero">
      <div class="sticky-wrap">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <div class="dive-btn-container" id="dive-btn">
          <button class="medieval-btn" onclick="scrollToGallery()">לצלול לכיף</button>
        </div>
      </div>
    </section>

    <div id="gallery-zone" class="gallery-zone">
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="history" class="page"><div style="padding:200px; text-align:center;"><h2 style="font-size:4rem; color:var(--gold); font-family:'Cinzel';">OUR LEGACY</h2></div></div>
  <div id="films" class="page"><div style="padding:200px; text-align:center;"><h2 style="font-size:4rem; color:var(--gold); font-family:'Cinzel';">D&R FILMS</h2></div></div>

  <div id="surpriseModal" class="modal">
    <div class="modal-content">
      <span style="color:var(--gold); cursor:pointer; float:right; font-size: 2rem;" onclick="closeModal()">&times;</span>
      <h3 style="font-family:'Cinzel'; color:var(--gold)">הגורל שלך:</h3>
      <span id="luckyNumber" class="modal-number"></span>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 800);
      }, 2000);
      updateClock();
    }

    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY;
      const winHeight = window.innerHeight;
      const progress = Math.min(scrollPos / winHeight, 1.2);
      const name = document.getElementById('main-name');
      const diveBtn = document.getElementById('dive-btn');
      
      const xPos = 60 - (progress * 120); 
      name.style.transform = `translateX(${xPos}%)`;
      
      // הופעת הטקסט והכפתור בגלילה
      if(progress > 0.3) {
          name.style.color = `rgba(197, 160, 89, ${progress - 0.3})`;
          diveBtn.classList.add('visible');
      } else {
          name.style.color = 'transparent';
          diveBtn.classList.remove('visible');
      }
    });

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];

    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${src}')`;
      card.onclick = () => {
        document.getElementById('luckyNumber').textContent = Math.floor(Math.random() * 10) + 1;
        document.getElementById('surpriseModal').style.display = "block";
      };
      gallery.appendChild(card);
    });

    function scrollToGallery() {
      document.getElementById('gallery-zone').scrollIntoView({behavior: 'smooth'});
    }

    function closeModal() { document.getElementById('surpriseModal').style.display = "none"; }
    
    function nav(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function updateClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
      }, 1000);
    }
  </script>
</body>
</html>
