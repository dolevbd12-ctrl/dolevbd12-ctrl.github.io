<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>D&R Official</title>
  
  <link rel="icon" type="image/png" href="./image_2026-03-13_222345060.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Assistant:wght@400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root { --gold: #c5a059; --bg-dark: #050505; }
    body { margin: 0; background: var(--bg-dark); color: white; font-family: 'Assistant', sans-serif; overflow-x: hidden; }

    /* תפריט עליון משופר */
    .floating-nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 5000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 15px; pointer-events: none;
    }
    .floating-nav > * { pointer-events: auto; }

    .brand-home, .nav-btn {
      background: linear-gradient(135deg, #fff, #f1d592);
      border: none; padding: 8px 12px; border-radius: 50px;
      font-family: 'Cinzel'; font-weight: 900; font-size: 0.7rem; color: #000;
      cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    #clock { 
      font-size: 14px; color: #f1d592; font-family: 'Cinzel'; font-weight: 900;
      flex: 1; text-align: center; margin: 0 5px;
    }

    /* דפים */
    .page { display: none; opacity: 0; transition: 0.5s ease; width: 100%; }
    .page.active { display: block; opacity: 1; }

    /* הירארו (בית) */
    .hero-container { height: 200vh; position: relative; }
    .hero-sticky {
      position: sticky; top: 0; height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('./image_2026-03-13_222345060.png') center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }
    
    .scrolling-name { 
      font-size: 18vw; font-family: 'Inter'; -webkit-text-stroke: 1px var(--gold); 
      color: transparent; white-space: nowrap; will-change: transform;
    }
    .parasha { 
      font-family: 'Cinzel'; color: var(--gold); font-size: 1.2rem; 
      margin-bottom: 10px; will-change: transform;
    }

    /* כפתור גלילה (לצלול) */
    .scroll-indicator {
      margin-top: 30px; padding: 10px 20px; border: 2px solid var(--gold);
      color: var(--gold); font-family: 'Cinzel'; font-weight: 900;
      border-radius: 50px; animation: bounce 2s infinite; cursor: pointer;
    }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

    /* גלריה */
    .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: #000; }
    .gallery img { width: 100%; border-radius: 10px; border: 1px solid #333; }
  </style>
</head>
<body onload="init()">

  <nav class="floating-nav">
    <button class="brand-home" onclick="navigateTo('/')">D&R</button>
    <div id="clock">00:00:00</div>
    <div style="display:flex; gap:5px;">
      <button class="nav-btn" onclick="navigateTo('/history')">היסטוריה</button>
      <button class="nav-btn" onclick="navigateTo('/films')">סרטים</button>
    </div>
  </nav>

  <div id="page-home" class="page">
    <div class="hero-container">
      <div class="hero-sticky">
        <div class="parasha" id="p-text">פרשת כי תשא</div>
        <h1 class="scrolling-name" id="s-name">DOLEV & ROEE</h1>
        <div class="scroll-indicator" onclick="window.scrollTo({top: window.innerHeight, behavior: 'smooth'})">SCROLL</div>
      </div>
    </div>
    <div class="gallery" id="gallery-box"></div>
  </div>

  <div id="page-history" class="page" style="padding-top:120px; text-align:center;">
    <h1 style="font-family:Cinzel; color:var(--gold);">HISTORY</h1>
    <p>בקרוב...</p>
  </div>

  <div id="page-films" class="page" style="padding-top:120px; text-align:center;">
    <h1 style="font-family:Cinzel; color:var(--gold);">FILMS</h1>
    <p>בקרוב...</p>
  </div>

  <script>
    const imgs = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];

    function init() {
      // שעון
      setInterval(() => { 
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL', {hour12:false}); 
      }, 1000);

      // טעינת תמונות
      const box = document.getElementById('gallery-box');
      imgs.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        box.appendChild(img);
      });

      handleRoute(window.location.pathname);
    }

    function navigateTo(path) {
      window.history.pushState({}, "", path);
      handleRoute(path);
      window.scrollTo(0,0);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
      
      let id = 'page-home';
      if (path.includes('history')) id = 'page-history';
      if (path.includes('films')) id = 'page-films';
      
      const target = document.getElementById(id);
      target.style.display = 'block';
      setTimeout(() => target.classList.add('active'), 50);
    }

    // האנימציה המגניבה של השם
    window.addEventListener('scroll', () => {
      const home = document.getElementById('page-home');
      if (home.style.display !== 'none') {
        const progress = Math.min(window.scrollY / window.innerHeight, 1);
        const factor = window.innerWidth < 768 ? 80 : 120;
        
        document.getElementById('s-name').style.transform = `translateX(${50 - (progress * factor)}%)`;
        document.getElementById('p-text').style.transform = `translateX(${-50 + (progress * factor)}%)`;
      }
    });

    // מאפשר חזרה אחורה בדפדפן/אפליקציה
    window.onpopstate = () => handleRoute(window.location.pathname);
  </script>
</body>
</html>
