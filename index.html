<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | Perfect Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
      /* שורת משימות בהירה */
      --header-bg: rgba(255, 255, 255, 0.15); 
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== HEADER (שורת משימות - לא חותכת) ====== */
    .header {
      position: relative; /* משנה מ-fixed כדי שלא תכסה את התמונה */
      width: 100%; height: 100px;
      background: var(--header-bg); backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    /* הופך את התפריט לנדבק כשגוללים, אבל לא חופף בהתחלה */
    .sticky-header { position: sticky; top: 0; }

    #clock { font-size: 26px; color: var(--gold-bright); font-weight: 900; font-family: 'Cinzel'; }
    
    .nav-links { display: flex; gap: 15px; }
    .nav-btn {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 10px 30px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; transition: 0.3s; font-size: 0.85rem;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--gold); }

    /* ====== PAGE CONTENT ====== */
    .page { 
      display: none; opacity: 0; 
      transition: all 0.6s ease;
    }
    .page.active { display: block; opacity: 1; }

    /* ====== HERO (מתחיל אחרי השורת משימות) ====== */
    .hero-section {
      height: 200vh; /* גובה בשביל גלילה */
      width: 100%; position: relative;
    }
    .hero-sticky-box {
      position: sticky; top: 100px; /* נדבק בדיוק מתחת להדר */
      height: calc(100vh - 100px); /* גובה המסך פחות גובה ההדר */
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    .scrolling-name {
      font-size: 10vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 1.5px var(--gold); font-family: 'Inter';
      text-transform: uppercase; white-space: nowrap; will-change: transform;
    }

    .medieval-btn {
      margin-top: 30px; font-family: 'Cinzel'; background: linear-gradient(135deg, var(--gold), #8a6d3b);
      color: black; padding: 15px 50px; border: 2px solid #5e4d2b; font-weight: 900;
      font-size: 1.2rem; cursor: pointer; transition: 0.3s;
    }

    /* ====== GALLERY ====== */
    .gallery-zone { background: var(--bg-dark); padding: 80px 20px; }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 25px; max-width: 1400px; margin: 0 auto;
    }
    .card { height: 500px; border: 1px solid #222; background-size: cover; background-position: center; }

    /* ====== CONTENT PAGES ====== */
    .content-container { padding: 100px 10%; text-align: center; min-height: calc(100vh - 100px); }

    /* ====== LOADER ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark); transition: opacity 0.5s;
    }
    .dr-bounce { font-size: 5rem; font-weight: 900; color: var(--gold); animation: bounce 1.2s infinite; font-family: 'Inter'; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  </style>
</head>
<body onload="init()">

  <div id="loader-main"><div class="dr-bounce">D&R</div></div>

  <header class="header sticky-header">
    <div class="header-left"><div id="clock">00:00:00</div></div>
    <div class="nav-links">
      <button class="nav-btn" onclick="navigateTo('/')">דף הבית</button>
      <button class="nav-btn" onclick="navigateTo('/history')">היסטוריה</button>
      <button class="nav-btn" onclick="navigateTo('/films')">סרטים</button>
    </div>
  </header>

  <div id="page-home" class="page active">
    <section class="hero-section">
      <div class="hero-sticky-box">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <button class="medieval-btn" onclick="document.getElementById('gallery-zone').scrollIntoView({behavior: 'smooth'})">לצלול לכיף</button>
      </div>
    </section>
    <div id="gallery-zone" class="gallery-zone">
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="page-history" class="page">
    <div class="content-container">
      <h2 style="font-size: 5rem; font-family: 'Cinzel'; color: var(--gold-bright);">HISTORY</h2>
      <p>הסיפור של האימפריה מתחיל כאן.</p>
    </div>
  </div>

  <div id="page-films" class="page">
    <div class="content-container">
      <h2 style="font-size: 5rem; font-family: 'Cinzel'; color: var(--gold-bright);">FILMS</h2>
      <p>בקרוב ההקרנות הגדולות.</p>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 500);
      }, 1200);
      updateClock();
      window.onpopstate = () => handleRoute(window.location.pathname);
      handleRoute(window.location.pathname);
    }

    function navigateTo(path) {
      window.history.pushState({}, "", path);
      handleRoute(path);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      let target = 'page-home';
      if (path === '/history') target = 'page-history';
      if (path === '/films') target = 'page-films';
      
      const p = document.getElementById(target);
      p.style.display = 'block';
      setTimeout(() => p.classList.add('active'), 10);
      window.scrollTo(0, 0);
    }

    window.addEventListener('scroll', () => {
      if(document.getElementById('page-home').classList.contains('active')) {
        const scrollPos = window.scrollY;
        const winHeight = window.innerHeight;
        const name = document.getElementById('main-name');
        const progress = Math.min(scrollPos / winHeight, 1.2);
        
        const xPos = 50 - (progress * 100); 
        name.style.transform = `translateX(${xPos}%)`;
        
        if (progress > 0.3) {
          name.style.color = `rgba(197, 160, 89, ${progress - 0.3})`;
        } else {
          name.style.color = 'transparent';
        }
      }
    });

    function updateClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
      }, 1000);
    }

    // גלריה
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];
    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${src}')`;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
