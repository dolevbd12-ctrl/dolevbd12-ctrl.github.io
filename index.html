<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>היכל העוצמה | דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Assistant:wght@300;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --bg-dark: #050505;
    }

    html { scroll-behavior: smooth; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: white; overflow-x: hidden; }

    /* ====== באנר אזעקות ====== */
    #alert-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #ff0000; color: white; padding: 15px; text-align: center;
      font-weight: 900; z-index: 9999; border-bottom: 3px solid gold; font-size: 1.5rem;
    }

    /* ====== Header ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 85px;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }
    #clock { font-size: 20px; color: var(--gold); font-weight: 600; }
    .header-center { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.8rem; letter-spacing: 2px; }
    .nav-btn {
      color: white; font-family: 'Cinzel', serif; padding: 10px 20px; border: 1px solid var(--gold);
      background: transparent; cursor: pointer; transition: 0.3s; margin-right: 10px;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== דפים ====== */
    .page { display: none; min-height: 100vh; width: 100%; }
    .page.active { display: block; }

    /* רקע ראשי עם התמונה המקורית */
    #main-hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* מלבן הציטוט המלכותי */
    .royal-frame {
      background: rgba(0, 0, 0, 0.8);
      padding: 50px 70px;
      border: 2px solid var(--gold);
      box-shadow: 0 0 30px rgba(197, 160, 89, 0.3);
      text-align: center;
      max-width: 800px;
    }
    .quote-text { font-family: 'Frank Ruhl Libre', serif; font-size: 2.8rem; color: var(--gold); margin-bottom: 30px; }

    /* כפתור ימי הביניים */
    .medieval-btn {
      font-family: 'Cinzel', serif; background: linear-gradient(135deg, #c5a059, #8a6d3b);
      color: black; padding: 15px 45px; border: 2px solid #5e4d2b; font-weight: 700;
      font-size: 1.2rem; cursor: pointer; border-radius: 4px; transition: 0.3s;
    }
    .medieval-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

    /* ====== קרוסלה עקבית (ללא חורים) ====== */
    .carousel-section { background: #000; padding: 80px 0; border-top: 1px solid var(--gold); }
    .carousel-container { width: 100%; overflow: hidden; position: relative; }
    
    .track {
      display: flex;
      width: max-content;
      animation: smoothRun 50s linear infinite; /* קצב איטי ועקבי */
    }
    
    .track img {
      height: 450px; width: auto; /* שומר על פרופורציות מקוריות */
      margin: 0 15px; border: 2px solid var(--gold);
      transition: 0.4s; cursor: pointer;
    }
    .track img:hover { transform: translateY(-10px); border-color: white; }

    @keyframes smoothRun {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); } /* רץ חצי דרך כי הסט משוכפל */
    }

    /* ====== דפי משנה ====== */
    .royal-title { font-family: 'Cinzel', serif; font-size: 5rem; color: var(--gold); text-shadow: 0 0 20px rgba(197,160,89,0.5); margin-top: 150px; }
    #history { background: linear-gradient(to bottom, #000, #1a0a2e); text-align: center; }
    #about { background: linear-gradient(to bottom, #000, #0a142e); text-align: center; }
  </style>
</head>
<body>

  <div id="alert-banner">🚨 צבע אדום: <span id="alert-loc"></span></div>

  <header class="header">
    <div id="clock">00:00:00</div>
    <div class="header-center" id="parasha">היכל העוצמה</div>
    <div class="header-right">
      <button class="nav-btn" onclick="nav('history')">היסטוריה מלכותית</button>
      <button class="nav-btn" onclick="nav('about')">אודות המותג</button>
      <button class="nav-btn" onclick="nav('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active">
    <section id="main-hero">
      <div class="royal-frame">
        <div class="quote-text">"העוצמה אינה נמדדת במה שיש לך, אלא במה שאתה בונה עבור אלו שאחריך."</div>
        <button class="medieval-btn" onclick="document.getElementById('fun-zone').scrollIntoView();">לצלול לכיף</button>
      </div>
    </section>

    <section id="fun-zone" class="carousel-section">
      <p style="font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2rem; text-align: center; margin-bottom: 20px;">כל האמת בפנים, לחצו על התמונות בשבילה</p>
      <div class="carousel-container">
        <div class="track" id="main-track">
          </div>
      </div>
    </section>
  </div>

  <div id="history" class="page"><h1 class="royal-title">היסטוריה מלכותית</h1></div>
  <div id="about" class="page"><h1 class="royal-title">אודות המותג</h1></div>

  <script>
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_230759616.png',
      './image_2026-03-13_222345060.png'
    ];

    const track = document.getElementById('main-track');
    // שכפול הסט 4 פעמים כדי ליצור רצף ענק ועקבי בלי רווחים
    for(let i=0; i<4; i++){
      images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.onclick = () => alert("האמת היא: שדולב ורועי הם השליטים האמיתיים! 👑");
        track.appendChild(img);
      });
    }

    function nav(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL', {hour12: false});
    }, 1000);

    // אזעקות פיקוד העורף
    async function checkAlerts() {
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.oref.org.il/WarningMessages/alert/alerts.json')}`);
        const j = await r.json();
        const d = JSON.parse(j.contents);
        const b = document.getElementById('alert-banner');
        if (d && d.data) {
          document.getElementById('alert-loc').textContent = d.data.join(', ');
          b.style.display = 'block';
        } else { b.style.display = 'none'; }
      } catch(e) {}
    }
    setInterval(checkAlerts, 4000);
  </script>
</body>
</html>
