<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | R&D Official</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
      --header-bg: rgba(255, 255, 255, 0.12); 
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== HEADER (Sticky) ====== */
    .header {
      position: sticky; top: 0;
      width: 100%; height: 90px;
      background: var(--header-bg); backdrop-filter: blur(25px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    #clock { font-size: 22px; color: var(--gold-bright); font-weight: 900; font-family: 'Cinzel'; }
    
    .nav-links { display: flex; gap: 15px; }
    .nav-btn {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 10px 28px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
    }

    /* ====== PAGE TRANSITION (Portal Effect) ====== */
    .page { 
      display: none; 
      opacity: 0; 
      transform: scale(1.1);
      filter: blur(10px);
      transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .page.active { 
      display: block; 
      opacity: 1; 
      transform: scale(1);
      filter: blur(0);
    }

    /* ====== HERO HOME ====== */
    .hero-section { height: 200vh; width: 100%; position: relative; }
    .hero-sticky-box {
      position: sticky; top: 90px; height: calc(100vh - 90px);
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    .scrolling-name {
      font-size: 10vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 1.2px var(--gold); font-family: 'Inter';
      text-transform: uppercase; white-space: nowrap; will-change: transform;
    }

    /* כפתור שמופיע רק בסוף הגלילה של הטקסט */
    .dive-btn-container {
      margin-top: 30px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }
    .dive-btn-container.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .medieval-btn {
      font-family: 'Cinzel'; background: linear-gradient(135deg, var(--gold), #8a6d3b);
      color: black; padding: 15px 45px; border: none; font-weight: 900;
      font-size: 1.1rem; cursor: pointer; transition: 0.3s;
    }

    /* ====== GALLERY ====== */
    .gallery-zone { background: var(--bg-dark); padding: 80px 20px; }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px; max-width: 1400px; margin: 0 auto;
    }
    .card { height: 500px; border: 1px solid #1a1a1a; background-size: cover; background-position: center; }

    /* ====== INTERNAL CONTENT ====== */
    .content-container { 
        padding: 120px 10%; text-align: center; min-height: calc(100vh - 90px); 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(circle at center, #111 0%, #000 100%);
    }
    .content-container h2 { font-size: 5rem; font-family: 'Cinzel'; color: var(--gold-bright); margin: 0; }
    .content-container .divider { width: 80px; height: 2px; background: var(--gold); margin: 30px 0; }

    /* ====== LOADER ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark); transition: 0.5s;
    }
    .dr-bounce { font-size: 4rem; font-weight: 900; color: var(--gold); animation: bnc 1.5s infinite; font-family: 'Inter'; }
    @keyframes bnc { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</head>
<body onload="init()">

  <div id="loader-main"><div class="dr-bounce">D&R</div></div>

  <header class="header">
    <div class="header-left"><div id="clock">00:00:00</div></div>
    <div class="nav-links">
      <button class="nav-btn" onclick="navigateTo('/')">דף הבית</button>
      <button class="nav-btn" onclick="navigateTo('/history')">היסטוריה</button>
      <button class="nav-btn" onclick="navigateTo('/films')">סרטים</button>
    </div>
  </header>

  <div id="page-home" class="page">
    <section class="hero-section">
      <div class="hero-sticky-box">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <div class="dive-btn-container" id="dive-btn">
          <button class="medieval-btn" onclick="document.getElementById('gallery-zone').scrollIntoView({behavior: 'smooth'})">מוכנים לצלול לכיף?</button>
        </div>
      </div>
    </section>
    <div id="gallery-zone" class="gallery-zone">
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="page-history" class="page">
    <div class="content-container">
      <h2>HISTORY</h2>
      <div class="divider"></div>
      <p style="font-size: 1.5rem; letter-spacing: 2px; opacity: 0.7;">ארכיון האימפריה — 2026</p>
    </div>
  </div>

  <div id="page-films" class="page">
    <div class="content-container">
      <h2>FILMS</h2>
      <div class="divider"></div>
      <p style="font-size: 1.5rem; letter-spacing: 2px; opacity: 0.7;">הפקות מקור — בקרוב</p>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 500);
      }, 1000);
      updateClock();
      
      window.onpopstate = () => handleRoute(window.location.pathname);
      handleRoute(window.location.pathname);
    }

    function navigateTo(path) {
      const currentPath = window.location.pathname;
      const targetPath = path === '/' ? window.location.origin + '/' : path;
      
      // אפקט יציאה
      document.querySelectorAll('.page').forEach(p => {
        if(p.classList.contains('active')) {
          p.style.opacity = '0';
          p.style.transform = 'scale(0.95)';
        }
      });

      setTimeout(() => {
        window.history.pushState({}, "", path);
        handleRoute(path);
      }, 400);
    }

    function handleRoute(path) {
      // ניקוי כל הדפים
      document.querySelectorAll('.page').forEach(p => {
          p.classList.remove('active');
          p.style.display = 'none';
          p.style.opacity = '0';
          p.style.transform = 'scale(1.1)';
      });

      let targetId = 'page-home';
      if (path.includes('history')) targetId = 'page-history';
      else if (path.includes('films')) targetId = 'page-films';
      
      const targetPage = document.getElementById(targetId);
      targetPage.style.display = 'block';
      
      // Trigger animation
      setTimeout(() => {
        targetPage.classList.add('active');
        targetPage.style.opacity = '1';
        targetPage.style.transform = 'scale(1)';
      }, 50);

      window.scrollTo(0, 0);
    }

    window.addEventListener('scroll', () => {
      const homePage = document.getElementById('page-home');
      if(homePage.style.display !== 'none' && homePage.classList.contains('active')) {
        const scrollPos = window.scrollY;
        const winHeight = window.innerHeight;
        const name = document.getElementById('main-name');
        const diveBtn = document.getElementById('dive-btn');
        
        // חישוב התקדמות (בין 0 ל-1)
        const progress = Math.min(scrollPos / winHeight, 1);
        
        // תנועת השם
        const xPos = 50 - (progress * 100); 
        name.style.transform = `translateX(${xPos}%)`;
        
        // שינוי צבע
        if (progress > 0.3) {
          name.style.color = `rgba(197, 160, 89, ${progress})`;
        } else {
          name.style.color = 'transparent';
        }

        // הופעת הכפתור - רק כשהטקסט הגיע ליעד (נניח מעל 80% מהדרך)
        if (progress > 0.85) {
          diveBtn.classList.add('show');
        } else {
          diveBtn.classList.remove('show');
        }
      }
    });

    function updateClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
      }, 1000);
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];
    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${src}')`;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
