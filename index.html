<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --text-main: #f8f8f8;
      --bg-dark: #121212;
    }

    html { scroll-behavior: smooth; }
    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

    /* ====== באנר אזעקות ====== */
    #alert-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #ff0000; color: white; padding: 20px; text-align: center;
      font-weight: 900; z-index: 9999; border-bottom: 4px solid #fff;
      font-size: 1.5rem; animation: alertBlink 0.8s infinite;
    }
    @keyframes alertBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ====== Header ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }
    .header-left { display: flex; flex-direction: column; min-width: 150px; }
    #clock { font-weight: 700; font-size: 18px; color: var(--gold); }
    .header-center { font-family: 'Frank Ruhl Libre', serif; color: var(--gold); font-size: 1.6rem; font-weight: 700; position: absolute; left: 50%; transform: translateX(-50%); }
    .header-right { display: flex; gap: 10px; }

    .nav-btn {
      color: var(--text-main); text-decoration: none; font-weight: 600; cursor: pointer;
      padding: 8px 16px; border: 1px solid var(--gold); border-radius: 4px; background: transparent; transition: 0.3s;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== דפים ====== */
    .page { display: none; min-height: 100vh; padding-top: 80px; text-align: center; box-sizing: border-box; }
    .page.active { display: block; }
    
    #main-hero {
      height: 90vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* ====== קרוסלה אינסופית באמת ====== */
    .carousel-wrap {
      width: 100%; overflow: hidden; background: #000; padding: 40px 0;
      border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
      position: relative;
    }

    .carousel-track {
      display: flex;
      width: max-content;
      animation: scroll 40s linear infinite;
    }

    .carousel-track img {
      height: 350px; /* גובה קבוע, רוחב משתנה לפי התמונה - מונע מעיכה */
      width: auto;
      margin: 0 15px;
      border: 2px solid var(--gold);
      border-radius: 10px;
      flex-shrink: 0;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); } /* רץ בדיוק חצי דרך ליצירת לולאה */
    }

    .welcome-text { font-family: 'Frank Ruhl Libre', serif; font-size: 2.8rem; color: var(--gold); margin: 50px 0; font-weight: 700; }
  </style>
</head>
<body>

  <div id="alert-banner">🚨 אזעקה: <span id="alert-loc"></span></div>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date" style="font-size:12px; opacity:0.8;"></div>
    </div>
    <div class="header-center" id="parasha">טוען פרשה...</div>
    <div class="header-right">
      <button class="nav-btn" onclick="showP('history')">היסטוריה</button>
      <button class="nav-btn" onclick="showP('about')">אודות</button>
      <button class="nav-btn" onclick="showP('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active" style="padding-top:0;">
    <section id="main-hero">
      <div style="background: rgba(0,0,0,0.7); padding: 40px; border: 1px solid var(--gold);">
        <h1 style="font-family: 'Frank Ruhl Libre', serif; font-size: 3rem;">"העוצמה היא המפתח לקיום."</h1>
        <button class="nav-btn" style="padding: 15px 40px; margin-top: 20px;" onclick="document.getElementById('welcome-zone').scrollIntoView();">מוכנים לצלול לכיף?</button>
      </div>
    </section>

    <section id="welcome-zone" style="background: #0c0c0c; padding-bottom: 80px;">
      <div class="welcome-text">רועי ודולב מברכים אתכם על היוולדותכם לעולם</div>
      
      <div class="carousel-wrap">
        <div class="carousel-track" id="track">
          </div>
      </div>
    </section>
  </div>

  <div id="history" class="page" style="background: #2e1a47;">
    <h1 style="font-size: 10rem; color: var(--gold); opacity: 0.3;">6767</h1>
    <h1>עמוד היסטוריה</h1>
  </div>

  <div id="about" class="page" style="background: #1a2a47;">
    <h1 style="font-size: 10rem; color: var(--gold); opacity: 0.3;">55655</h1>
    <h1>אודותינו</h1>
  </div>

  <script>
    const images = [
      './image_2026-03-13_222345060.png', './image_2026-03-13_230619314.png',
      './image_2026-03-13_230636882.png', './image_2026-03-13_230654112.png',
      './image_2026-03-13_230706432.png', './image_2026-03-13_230721055.png',
      './image_2026-03-13_230733426.png', './image_2026-03-13_230748568.png',
      './image_2026-03-13_230759616.png'
    ];

    const track = document.getElementById('track');
    // משכפלים 10 פעמים בשביל "פי אלף" תמונות שרצות בלי הפסקה
    for(let i=0; i < 10; i++) {
        images.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            track.appendChild(img);
        });
    }

    function showP(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    // זמן ופרשה
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL');
      document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', {day:'numeric', month:'long'});
    }, 1000);

    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });

    // אזעקות
    async function checkA() {
      try {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.oref.org.il/WarningMessages/alert/alerts.json')}`);
        const j = await res.json();
        const d = JSON.parse(j.contents);
        const b = document.getElementById('alert-banner');
        if (d && d.data) {
          document.getElementById('alert-loc').textContent = d.data.join(', ');
          b.style.display = 'block';
        } else { b.style.display = 'none'; }
      } catch(e) {}
    }
    setInterval(checkA, 4000);
  </script>
</body>
</html>
