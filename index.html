<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R STUDIO | Official</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent-blue: #0047ab;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--bg); overflow-x: hidden;
    }

    /* ====== לודר D&R STUDIO ====== */
    .loader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; justify-content: center; align-items: center; z-index: 9999;
      background: #000; transition: opacity 0.6s ease;
    }
    .loader-content { text-align: center; color: white; }
    .studio-text { font-size: 4rem; font-weight: 900; letter-spacing: 15px; text-transform: uppercase; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; letter-spacing: 15px; } 50% { opacity: 1; letter-spacing: 25px; } }

    /* ====== Navigation ====== */
    nav {
      position: fixed; top: 0; width: 100%; height: 100px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 1000; mix-blend-mode: difference; color: white;
    }
    .logo { font-weight: 900; font-size: 2.8rem; cursor: pointer; letter-spacing: -2px; }
    .nav-links { display: flex; gap: 40px; font-size: 15px; text-transform: uppercase; font-weight: 700; }
    .nav-links div { cursor: pointer; transition: 0.3s; }

    /* ====== Hero Section ====== */
    .page { display: none; min-height: 100vh; width: 100%; }
    .page.active { display: block; }

    .hero {
      height: 200vh; width: 100%; position: relative;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      background-attachment: fixed;
    }
    .sticky-wrap { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .scrolling-name { font-size: 12vw; font-weight: 900; white-space: nowrap; color: white; text-transform: uppercase; transform: translateX(100%); will-change: transform; }

    /* ====== גלריה ====== */
    .reveal-section { position: relative; z-index: 20; background: white; padding-top: 100px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
    .grid-item { height: 90vh; overflow: hidden; background: #000; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: 0.8s; }
    .grid-item:hover img { opacity: 1; transform: scale(1.03); }

    /* ====== Footer: הכירו את דולב ורועי ====== */
    .meet-us {
      padding: 150px 5%; background: #000; color: white;
      display: flex; justify-content: space-around; text-align: center;
    }
    .person-card { flex: 1; transition: 0.5s; cursor: pointer; }
    .person-card:hover { color: var(--accent-blue); }
    .person-card h3 { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; margin: 0; }
    .person-card p { font-family: 'Playfair Display'; font-style: italic; font-size: 1.2rem; opacity: 0.7; }

    /* ====== דפי תוכן ====== */
    .subpage-container { padding: 180px 8%; background: white; min-height: 100vh; }
    .studio-header { font-size: 10vw; font-weight: 900; color: #000; line-height: 0.8; margin-bottom: 50px; }
  </style>
</head>
<body onload="showInitialLoader()">

  <div id="loader-main" class="loader-overlay">
    <div class="loader-content">
        <div class="studio-text">D&R STUDIO</div>
        <p style="letter-spacing: 5px; margin-top: 20px;">PRODUCTION START</p>
    </div>
  </div>

  <nav>
    <div class="logo" onclick="goToPage('main')">D&R</div>
    <div class="nav-links">
      <div onclick="diveToFun()">לצלול לכיף</div>
      <div onclick="goToPage('history')">היסטוריה</div>
      <div onclick="goToPage('films')">סרטים</div>
    </div>
  </nav>

  <div id="main" class="page active">
    <section class="hero">
      <div class="sticky-wrap">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <div style="position: absolute; bottom: 10%; width: 100%; text-align: center;">
            <div style="border: 1px solid white; display: inline-block; padding: 15px 40px; color: white; cursor: pointer; letter-spacing: 5px; font-weight: 900;" onclick="diveToFun()">DIVE IN</div>
        </div>
      </div>
    </section>

    <div id="grid-start" class="reveal-section">
      <div class="grid" id="main-grid"></div>
    </div>

    <section class="meet-us">
        <div class="person-card">
            <p>Creative Director</p>
            <h3>הכירו את דולב</h3>
        </div>
        <div style="width: 1px; background: rgba(255,255,255,0.2); height: 100px; align-self: center;"></div>
        <div class="person-card">
            <p>Visionary Artist</p>
            <h3>הכירו את רועי</h3>
        </div>
    </section>
  </div>

  <div id="history" class="page">
    <div class="subpage-container">
      <div class="studio-header">OUR<br>LEGACY</div>
      <p style="font-size: 2rem; font-family: 'Playfair Display';">המורשת של הסטודיו נבנית בכל פריים מחדש.</p>
    </div>
  </div>

  <div id="films" class="page">
    <div class="subpage-container">
      <div class="studio-header" style="color: var(--accent-blue);">D&R STUDIO<br>FILMS</div>
      <div style="display: grid; gap: 40px; margin-top: 50px;">
          <div style="height: 500px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 2rem;">COMING SOON: FILM 01</div>
          <div style="height: 500px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 2rem;">COMING SOON: FILM 02</div>
      </div>
    </div>
  </div>

  <script>
    function showInitialLoader() {
      const l = document.getElementById('loader-main');
      l.style.display = 'flex';
      setTimeout(() => { 
        l.style.opacity = '0'; 
        setTimeout(() => l.style.display = 'none', 600); 
      }, 2000);
    }

    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY;
      const winHeight = window.innerHeight;
      const progress = Math.min(scrollPos / winHeight, 1);
      const name = document.getElementById('main-name');
      const xPos = 100 - (progress * 200); 
      name.style.transform = `translateX(${xPos}%)`;
    });

    function goToPage(pageId) {
      const loader = document.getElementById('loader-main');
      loader.style.display = 'flex'; loader.style.opacity = '1';
      setTimeout(() => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
        setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display='none', 600); }, 1000);
      }, 1200);
    }

    function diveToFun() {
      if (!document.getElementById('main').classList.contains('active')) {
        goToPage('main');
        setTimeout(() => document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'}), 2000);
      } else {
        document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'});
      }
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_222345060.png'
    ];
    const grid = document.getElementById('main-grid');
    images.forEach(src => {
      const div = document.createElement('div');
      div.className = 'grid-item';
      div.innerHTML = `<img src="${src}">`;
      grid.appendChild(div);
    });
  </script>
</body>
</html>
