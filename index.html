<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R STUDIO | Gold & Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Oswald:wght@700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #d4af37; /* זהב קלאסי */
      --gold-bright: #f9e29d;
      --black: #050505;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--black); overflow-x: hidden; color: var(--white);
    }

    /* ====== LOADER: שחור וזהב ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--black); transition: opacity 0.8s ease;
    }
    .loader-content { text-align: center; }
    .studio-bounce { 
      font-size: 5rem; font-weight: 900; color: var(--gold);
      display: inline-block; animation: bounceJump 1.8s infinite;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    }
    .phenomenon-text { 
      margin-top: 20px; font-size: 1.2rem; letter-spacing: 10px; color: var(--gold-bright);
      text-transform: uppercase; animation: fadeInOut 1.5s infinite;
    }

    @keyframes bounceJump {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); color: var(--gold-bright); }
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ====== NAVIGATION: זהב מינימליסטי ====== */
    nav {
      position: fixed; top: 0; width: 100%; height: 90px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
    }
    .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: -3px; color: var(--gold); cursor: pointer; }
    .nav-links { display: flex; gap: 30px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
    .nav-links div { cursor: pointer; transition: 0.3s; color: var(--white); }
    .nav-links div:hover { color: var(--gold); }

    /* ====== HERO: שילוב הרקע שלכם עם אפקט זהב ====== */
    .hero {
      height: 250vh; width: 100%; position: relative;
    }
    .hero-bg {
      position: sticky; top: 0; height: 100vh; width: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .scrolling-name {
      font-size: 15vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 2px var(--gold); /* אפקט קו מתאר מזהב */
      text-transform: uppercase; white-space: nowrap; will-change: transform; letter-spacing: -8px;
    }
    .dive-indicator {
      position: absolute; bottom: 40px; text-align: center; color: var(--gold);
      font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase;
    }

    /* ====== GRID: שחור יוקרתי ====== */
    .reveal-section { position: relative; z-index: 10; background: var(--black); padding-top: 5vh; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
    .grid-item { height: 95vh; overflow: hidden; position: relative; border: 1px solid #1a1a1a; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0.7; }
    .grid-item:hover img { transform: scale(1.1); opacity: 1; }
    
    /* בונוס: פס זהב דק מתחת לכל תמונה */
    .grid-item::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 3px; background: var(--gold); transition: 0.6s; }
    .grid-item:hover::after { width: 100%; }

    /* ====== FOOTER: חתימת הזהב ====== */
    .meet-us {
      background: var(--black); color: var(--white); padding: 150px 5%;
      display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--gold);
    }
    .person { text-align: center; }
    .person p { font-family: 'Playfair Display'; font-style: italic; color: var(--gold); font-size: 1.4rem; margin-bottom: 10px; }
    .person h3 { font-size: 4rem; font-weight: 900; margin: 0; color: var(--white); text-transform: uppercase; }

    /* ====== SUBPAGES ====== */
    .page { display: none; min-height: 100vh; background: var(--black); }
    .page.active { display: block; }
    .subpage-header { padding: 150px 6% 50px; font-size: 12vw; font-weight: 900; letter-spacing: -8px; color: var(--gold); line-height: 0.8; }
  </style>
</head>
<body onload="initSite()">

  <div id="loader-main">
    <div class="loader-content">
        <div class="studio-bounce">D&R STUDIO</div>
        <div class="phenomenon-text">התכוננו לפנומן</div>
    </div>
  </div>

  <nav>
    <div class="logo" onclick="goToPage('main')">D&R</div>
    <div class="nav-links">
      <div onclick="diveToFun()">לצלול לכיף</div>
      <div onclick="goToPage('history')">היסטוריה</div>
      <div onclick="goToPage('films')">סרטים</div>
    </div>
  </nav>

  <div id="main" class="page active">
    <section class="hero">
      <div class="hero-bg">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <div class="dive-indicator">Scroll to Reveal the Gold</div>
      </div>
    </section>

    <div id="grid-start" class="reveal-section">
      <div class="grid" id="main-grid"></div>
    </div>

    <section class="meet-us">
        <div class="person">
            <p>Creative Director</p>
            <h3>הכירו את דולב</h3>
        </div>
        <div class="person">
            <p>Visionary Artist</p>
            <h3>הכירו את רועי</h3>
        </div>
    </section>
  </div>

  <div id="history" class="page">
    <div class="subpage-header">THE<br>LEGACY</div>
  </div>

  <div id="films" class="page">
    <div class="subpage-header">STUDIO<br>FILMS</div>
  </div>

  <script>
    function initSite() {
      setTimeout(() => {
        const l = document.getElementById('loader-main');
        l.style.opacity = '0';
        setTimeout(() => l.style.display = 'none', 800);
      }, 2000);
    }

    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY;
      const winHeight = window.innerHeight;
      const progress = Math.min(scrollPos / winHeight, 1.2);
      
      const name = document.getElementById('main-name');
      const xPos = 80 - (progress * 160);
      name.style.transform = `translateX(${xPos}%)`;
      
      // אפקט זהב שמתמלא ככל שגוללים
      if(progress > 0.5) {
          name.style.color = `rgba(212, 175, 55, ${progress - 0.5})`;
      } else {
          name.style.color = 'transparent';
      }
    });

    function goToPage(pageId) {
      const loader = document.getElementById('loader-main');
      loader.style.display = 'flex'; loader.style.opacity = '1';
      setTimeout(() => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
        setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display='none', 800); }, 600);
      }, 1000);
    }

    function diveToFun() {
      if (!document.getElementById('main').classList.contains('active')) {
        goToPage('main');
        setTimeout(() => document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'}), 1800);
      } else {
        document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'});
      }
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_222345060.png'
    ];
    const grid = document.getElementById('main-grid');
    images.forEach(src => {
      const div = document.createElement('div');
      div.className = 'grid-item';
      div.innerHTML = `<img src="${src}">`;
      grid.appendChild(div);
    });
  </script>
</body>
</html>
