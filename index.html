<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | Scroll Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent-blue: #0047ab;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; }
    body { 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--bg); overflow-x: hidden;
    }

    /* ====== Loader ====== */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .loader-logo { font-size: 5rem; font-weight: 900; color: var(--accent-blue); }

    /* ====== Nav ====== */
    nav {
      position: fixed; top: 0; width: 100%; height: 80px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 1000; mix-blend-mode: difference; color: white;
    }
    .logo { font-weight: 900; font-size: 2.5rem; cursor: pointer; }

    /* ====== Scroll Container (הקסם קורה כאן) ====== */
    .scroll-wrapper {
      height: 400vh; /* גובה פי 4 מהמסך כדי שיהיה מקום לאנימציית גלילה */
      position: relative;
    }

    .sticky-container {
      position: sticky; top: 0; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* טקסט דולב ורועי שמשתנה בגלילה */
    .dynamic-title {
      font-size: 10vw; font-weight: 900; letter-spacing: -5px; line-height: 0.9;
      text-align: center; color: #000;
      transition: transform 0.1s linear, opacity 0.1s linear, text-shadow 0.1s linear;
      will-change: transform, opacity;
      position: relative;
    }

    /* כיתוב הוולקאם */
    .welcome-sub {
      font-family: 'Playfair Display'; font-style: italic; font-size: 1.5rem;
      margin-top: 20px; transition: 0.5s ease;
    }

    /* ====== גלריית תמונות ====== */
    .reveal-section {
      position: relative; z-index: 10; background: white;
      padding-top: 100px; box-shadow: 0 -50px 100px rgba(0,0,0,0.1);
    }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
    .grid-item { height: 90vh; overflow: hidden; background: #eee; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; }

    /* ====== דפים נוספים ====== */
    .page { display: none; min-height: 100vh; padding: 150px 8%; }
    .page.active { display: block; }
  </style>
</head>
<body onload="init()">

  <div id="loader"><div class="loader-logo">D&R</div></div>

  <nav>
    <div class="logo" onclick="location.reload()">D&R</div>
    <div class="nav-links" style="display:flex; gap:30px; font-weight:700; cursor:pointer;">
      <div onclick="window.scrollTo({top: window.innerHeight * 3.2, behavior: 'smooth'})">לצלול לכיף</div>
    </div>
  </nav>

  <div id="main-content">
    <div class="scroll-wrapper">
      <div class="sticky-container">
        <p style="letter-spacing: 10px; font-size: 0.8rem; font-weight: 700; margin-bottom: 20px;">SCROLL TO EXPLORE</p>
        <h1 class="dynamic-title" id="main-title">DOLEV & ROEE</h1>
        <div class="welcome-sub" id="welcome-msg">היי, אנחנו דולב ורועי, ברוכים הבאים לאתר</div>
      </div>
    </div>

    <div id="grid-start" class="reveal-section">
      <div style="text-align:center; padding-bottom:50px; font-size: 0.8rem; letter-spacing: 5px; color:#999;">THE COLLECTION</div>
      <div class="grid" id="main-grid"></div>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
      }, 1000);
    }

    // הקסם של הגלילה
    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY;
      const winHeight = window.innerHeight;
      const title = document.getElementById('main-title');
      const welcome = document.getElementById('welcome-msg');
      
      // חישוב אחוז הגלילה בתוך אזור האנימציה (0 עד 1)
      const progress = Math.min(scrollPos / (winHeight * 3), 1);

      if (progress < 0.2) {
        // שלב 1: עולה ויורד בקטנה
        title.style.transform = `translateY(${progress * -100}px) scale(${1 + progress})`;
        title.style.textShadow = "none";
      } 
      else if (progress < 0.5) {
        // שלב 2: משתכפל (צללים) וזז לצדדים בטירוף
        const moveX = Math.sin(progress * 50) * 50;
        title.style.transform = `translateX(${moveX}px) scale(1.2) rotate(${moveX/5}deg)`;
        title.style.textShadow = `
          ${moveX}px 0px rgba(0,71,171,0.3), 
          ${-moveX}px 0px rgba(0,71,171,0.3)
        `;
        welcome.style.opacity = "0";
      } 
      else if (progress < 0.8) {
        // שלב 3: קפיצה ענקית ממלא את המסך
        title.style.transform = `scale(${1 + progress * 8}) rotate(${progress * 360}deg)`;
        title.style.opacity = 1 - (progress - 0.5) * 2;
      }
      else {
        // שלב 4: חוזר למקום ונעלם כדי לפנות לגלריה
        title.style.transform = `scale(0.5)`;
        title.style.opacity = "0";
      }
    });

    // מילוי גלריה (דוגמה)
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png'
    ];
    const grid = document.getElementById('main-grid');
    images.forEach(src => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      item.innerHTML = `<img src="${src}">`;
      grid.appendChild(item);
    });
  </script>
</body>
</html>
