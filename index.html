<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | Official Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent-blue: #0047ab;
      --bg: #ffffff;
      --text: #000000;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--bg); color: var(--text); 
      overflow-x: hidden;
    }

    /* ====== Loader ====== */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
      transition: opacity 0.6s ease;
    }
    .loader-logo {
      font-size: 5rem; font-weight: 900; color: var(--accent-blue);
      animation: bounceRotate 1.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }

    @keyframes bounceRotate {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(180deg); }
    }

    /* ====== Navigation ====== */
    nav {
      position: fixed; top: 0; width: 100%; height: 100px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 1000; mix-blend-mode: difference; color: white;
    }
    .logo { font-weight: 900; font-size: 2.2rem; cursor: pointer; }
    #clock { font-size: 1.2rem; font-weight: bold; }
    .nav-links { display: flex; gap: 40px; font-size: 14px; text-transform: uppercase; font-weight: 700; }
    .nav-links div { cursor: pointer; }

    /* ====== Hero Section (Fixed Scroll) ====== */
    .hero {
      height: 100vh; width: 100%; position: sticky; top: 0;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; align-items: center; justify-content: center; color: white;
      z-index: 1;
    }
    .hero-content { text-align: center; }
    .hero-content h1 { font-size: 12vw; margin: 0; line-height: 0.8; font-weight: 900; letter-spacing: -6px; }
    
    .welcome-text {
      margin-top: 20px; font-size: 1.5rem; letter-spacing: 2px;
      font-weight: 400; font-family: 'Playfair Display', serif; font-style: italic;
    }

    .dive-btn {
      margin-top: 40px; display: inline-block; padding: 18px 50px; border: 2px solid white;
      color: white; text-transform: uppercase; letter-spacing: 5px; font-weight: 900;
      cursor: pointer; transition: 0.4s; background: transparent;
    }

    /* ====== ה-Scroll Reveal (האפקט של לקלר) ====== */
    .reveal-section {
      position: relative; z-index: 2; background: white;
      box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
    }

    /* ====== Grid Gallery ====== */
    .grid { 
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; 
      background: white;
    }
    .grid-item { 
      position: relative; height: 95vh; overflow: hidden; cursor: pointer; 
      clip-path: inset(0 0 0 0); /* בסיס לאפקט החיתוך */
    }
    .grid-item img { 
      width: 100%; height: 100%; object-fit: cover; 
      transition: transform 1.5s ease;
      position: sticky; top: 0; /* אפקט הפאראלאקס הפנימי */
    }
    .grid-item:hover img { transform: scale(1.1); }
    .grid-overlay { position: absolute; bottom: 50px; left: 50px; color: white; z-index: 3; }

    /* ====== Modal ====== */
    .modal {
      display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
      background: #ffffff; color: var(--accent-blue);
    }
    .modal-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .modal-num { font-size: 20vw; font-weight: 900; }

    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body onload="runLoader(2000)">

  <div id="loader">
    <div class="loader-logo">D&R</div>
  </div>

  <nav>
    <div class="logo" onclick="transitionTo('main')">D&R</div>
    <div id="clock">00:00:00</div>
    <div class="nav-links">
      <div onclick="scrollToZone('grid-start')">לצלול לכיף</div>
      <div onclick="transitionTo('history')">היסטוריה</div>
      <div onclick="transitionTo('about')">אודות</div>
    </div>
  </nav>

  <div id="main" class="page active">
    <section class="hero" id="hero-sec">
      <div class="hero-content">
        <p id="parasha-display" style="letter-spacing: 8px; font-weight: 700;">OFFICIAL SITE</p>
        <h1>DOLEV & ROEE</h1>
        <div class="welcome-text">היי, אנחנו דולב ורועי, ברוכים הבאים לאתר</div>
        <br>
        <div class="dive-btn" onclick="scrollToZone('grid-start')">לצלול לכיף</div>
      </div>
    </section>

    <div id="grid-start" class="reveal-section">
      <div class="grid" id="main-grid"></div>
    </div>
  </div>

  <div id="history" class="page" style="padding: 180px 6%; background: white; position: relative; z-index: 10;">
    <h1 style="font-size: 10vw; font-weight: 900;">THE LEGACY</h1>
    <p style="font-size: 2rem; font-family: 'Playfair Display';">המורשת של דולב ורועי...</p>
  </div>

  <div id="about" class="page" style="padding: 180px 6%; background: white; position: relative; z-index: 10;">
    <h1 style="font-size: 10vw; font-weight: 900;">ABOUT US</h1>
    <p style="font-size: 2rem; font-family: 'Playfair Display';">סרטים ומידע בקרוב...</p>
  </div>

  <div id="surpriseModal" class="modal">
    <span style="position: absolute; top: 50px; right: 50px; font-size: 3rem; cursor: pointer;" onclick="closeModal()">×</span>
    <div class="modal-content">
      <p style="letter-spacing: 10px; font-weight: 900; color: #000;">DESTINY NUMBER</p>
      <div class="modal-num" id="luckyNumber"></div>
    </div>
  </div>

  <script>
    function runLoader(ms) {
      const loader = document.getElementById('loader');
      loader.style.display = 'flex';
      loader.style.opacity = '1';
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 600);
      }, ms);
    }

    function transitionTo(pageId) {
      runLoader(1000);
      setTimeout(() => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
      }, 800);
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_230759616.png',
      './image_2026-03-13_222345060.png'
    ];

    const grid = document.getElementById('main-grid');
    images.forEach((src, idx) => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      item.innerHTML = `<img src="${src}"><div class="grid-overlay"><h2>VIEW 0${idx + 1}</h2></div>`;
      item.onclick = () => {
        document.getElementById('luckyNumber').textContent = Math.floor(Math.random() * 10) + 1;
        document.getElementById('surpriseModal').style.display = "block";
      };
      grid.appendChild(item);
    });

    function closeModal() { document.getElementById('surpriseModal').style.display = "none"; }
    function scrollToZone(id) { document.getElementById(id).scrollIntoView({behavior: 'smooth'}); }

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL'); }, 1000);
  </script>
</body>
</html>
