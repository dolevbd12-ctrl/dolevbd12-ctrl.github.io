<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>היכל הרנסנס | דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Assistant:wght@300;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
    }

    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: white; overflow-x: hidden; }

    /* ====== Header ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 85px;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; border-bottom: 2px solid var(--gold);
    }
    .header-center { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.8rem; letter-spacing: 2px; }

    /* ====== דף הבית ====== */
    #main-hero {
      height: 60vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; justify-content: center; align-items: center;
      padding-top: 85px;
    }

    .royal-frame {
      background: rgba(0, 0, 0, 0.85);
      padding: 40px; border: 2px solid var(--gold);
      box-shadow: 0 0 30px rgba(197, 160, 89, 0.4);
      text-align: center; max-width: 800px;
    }
    .quote-text { font-family: 'Frank Ruhl Libre', serif; font-size: 2.2rem; color: var(--gold); }

    /* ====== גלריית הקלפים המתהפכים ====== */
    .gallery-section {
      padding: 80px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
      max-width: 1300px;
      margin: 0 auto;
      perspective: 1000px; /* עומק לאנימציית ההיפוך */
    }

    .card {
      width: 100%;
      height: 400px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    /* הצד הקדמי והאחורי */
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      /* מסגרת רנסנס דקורטיבית */
      border: 15px solid transparent;
      border-image: url('https://www.transparenttextures.com/patterns/gold-plaster.png') 30 stretch;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(197, 160, 89, 0.5);
      outline: 2px solid var(--gold);
      outline-offset: -10px;
    }

    /* הצד הקדמי - התמונה */
    .card-front {
      background-size: cover;
      background-position: center;
    }

    /* הצד האחורי - הטקסט והספרה */
    .card-back {
      background: linear-gradient(135deg, #1a0a00 0%, #3d2b1f 100%);
      transform: rotateY(180deg);
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .card-back h3 { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 10px; }
    .card-back .number { font-size: 5rem; font-weight: 900; color: white; text-shadow: 0 0 10px var(--gold); }

    .welcome-msg { text-align: center; font-family: 'Frank Ruhl Libre', serif; font-size: 2.5rem; color: var(--gold); margin-top: 50px; }
    .truth-text { text-align: center; font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; opacity: 0.8; }

  </style>
</head>
<body>

  <header class="header">
    <div id="clock">00:00:00</div>
    <div class="header-center">היכל הרנסנס</div>
    <div style="width: 100px;"></div> </header>

  <section id="main-hero">
    <div class="royal-frame">
      <div class="quote-text">"העוצמה אינה נמדדת במה שיש לך, אלא במה שאתה בונה עבור אלו שאחריך."</div>
    </div>
  </section>

  <div class="welcome-msg">רועי ודולב מברכים אתכם על היוולדותכם לעולם</div>
  <p class="truth-text">כל האמת בפנים, לחצו על התמונות בשבילה</p>

  <section class="gallery-section" id="gallery">
    </section>

  <script>
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_230759616.png'
    ];

    const gallery = document.getElementById('gallery');

    images.forEach((src, index) => {
      // יצירת קונטיינר הקלף
      const card = document.createElement('div');
      card.className = 'card';
      
      // יצירת צד קדמי
      const front = document.createElement('div');
      front.className = 'card-face card-front';
      front.style.backgroundImage = `url('${src}')`;

      // יצירת צד אחורי
      const back = document.createElement('div');
      back.className = 'card-face card-back';
      const randomNum = Math.floor(Math.random() * 10) + 1;
      back.innerHTML = `
        <h3>הגורל שלך:</h3>
        <div class="number">${randomNum}</div>
        <p style="font-family:'Cinzel'; color:var(--gold); font-size:12px;">ממלכת דולב ורועי</p>
      `;

      card.appendChild(front);
      card.appendChild(back);

      // אירוע לחיצה להיפוך
      card.onclick = () => {
        card.classList.toggle('flipped');
      };

      gallery.appendChild(card);
    });

    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL', {hour12: false});
    }, 1000);
  </script>
</body>
</html>
