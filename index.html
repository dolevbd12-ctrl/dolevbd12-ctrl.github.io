<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dolev & Roei | Official</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #c5a059; /* זהב עדין */
      --bg: #ffffff;
      --text: #000000;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--bg); color: var(--text); 
      overflow-x: hidden;
    }

    /* ====== Navigation (Leclerc Style) ====== */
    nav {
      position: fixed; top: 0; width: 100%; height: 80px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%; z-index: 1000; mix-blend-mode: difference; /* צבע משתנה לפי הרקע */
      color: white;
    }
    .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.5rem; cursor: pointer; }
    .nav-links { display: flex; gap: 30px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
    .nav-links div { cursor: pointer; border-bottom: 1px solid transparent; transition: 0.3s; }
    .nav-links div:hover { border-bottom: 1px solid white; }

    /* ====== Hero Section ====== */
    .hero {
      height: 100vh; width: 100%; position: relative;
      background: url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; align-items: center; justify-content: center;
      color: white; overflow: hidden;
    }
    .hero-content { text-align: center; z-index: 2; }
    .hero-content h1 { 
      font-size: 12vw; margin: 0; line-height: 0.8; font-weight: 900; 
      text-transform: uppercase; letter-spacing: -5px; 
    }
    .hero-content p { font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; margin-top: 20px; }

    /* ====== Quote Section ====== */
    .section-quote {
      padding: 150px 10%; background: #f9f9f9; text-align: center;
    }
    .large-quote {
      font-family: 'Playfair Display', serif; font-size: 3.5rem; 
      line-height: 1.2; font-style: italic; max-width: 1000px; margin: 0 auto;
    }
    .sub-quote { margin-top: 40px; font-size: 1rem; color: #666; letter-spacing: 2px; }

    /* ====== Gallery (The "Grid") ====== */
    .gallery-title { padding: 100px 4% 20px; font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; color: #999; }
    .grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px 100px;
    }
    .grid-item {
      position: relative; height: 80vh; overflow: hidden; cursor: pointer;
    }
    .grid-item img {
      width: 100%; height: 100%; object-fit: cover; transition: transform 1s ease;
    }
    .grid-item:hover img { transform: scale(1.05); }
    .grid-overlay {
      position: absolute; bottom: 40px; left: 40px; color: white;
    }
    .grid-overlay h2 { font-size: 2rem; margin: 0; text-transform: uppercase; }

    /* ====== Modal (Surprise) ====== */
    .modal {
      display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
      background: white; color: black;
    }
    .modal-content {
      display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
    }
    .modal-num { font-size: 15vw; font-weight: 900; }
    .close-btn { position: absolute; top: 40px; right: 40px; font-size: 2rem; cursor: pointer; }

    /* ====== Footer ====== */
    footer { padding: 100px 4%; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.8rem; color: #999; }
  </style>
</head>
<body>

  <nav>
    <div class="logo" onclick="location.reload()">D&R</div>
    <div id="clock" style="font-family: monospace; font-size: 14px;">00:00:00</div>
    <div class="nav-links">
      <div onclick="scrollToZone('grid-start')">לצלול לכיף</div>
      <div onclick="alert('דף היסטוריה בבנייה')">היסטוריה</div>
      <div onclick="alert('אודות בבנייה')">אודות</div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <p id="parasha-display">Official Website</p>
      <h1>DOLEV & ROEI</h1>
    </div>
  </section>

  <section class="section-quote">
    <div class="large-quote">"העוצמה אינה נמדדת במה שיש לך, אלא במה שאתה בונה עבור אלו שאחריך."</div>
    <div class="sub-quote">האיכות היא המצפן שלנו, והעוצמה היא המנוע.</div>
  </section>

  <div id="grid-start" class="gallery-title">רועי ודולב מברכים אתכם על היוולדותכם לעולם</div>
  
  <div class="grid" id="main-grid">
    </div>

  <footer>
    <div>© 2026 היכל העוצמה</div>
    <div>DESIGNED FOR EXCELLENCE</div>
  </footer>

  <div id="surpriseModal" class="modal">
    <span class="close-btn" onclick="closeModal()">×</span>
    <div class="modal-content">
      <p style="letter-spacing: 5px; text-transform: uppercase;">הגורל שלך</p>
      <div class="modal-num" id="luckyNumber"></div>
    </div>
  </div>

  <script>
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_230759616.png',
      './image_2026-03-13_222345060.png'
    ];

    const grid = document.getElementById('main-grid');
    images.forEach((src, idx) => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      item.innerHTML = `
        <img src="${src}" alt="Gallery image">
        <div class="grid-overlay">
          <p>0${idx + 1}</p>
          <h2>VIEW TRUTH</h2>
        </div>
      `;
      item.onclick = openModal;
      grid.appendChild(item);
    });

    function openModal() {
      document.getElementById('luckyNumber').textContent = Math.floor(Math.random() * 10) + 1;
      document.getElementById('surpriseModal').style.display = "block";
    }
    function closeModal() { document.getElementById('surpriseModal').style.display = "none"; }
    function scrollToZone(id) { document.getElementById(id).scrollIntoView({behavior: 'smooth'}); }

    // שעון ופרשה
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL');
    }, 1000);

    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "OFFICIAL SITE";
        document.getElementById('parasha-display').textContent = "פרשת " + p;
      });
  </script>
</body>
</html>
