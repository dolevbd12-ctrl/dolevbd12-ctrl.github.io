<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --text-main: #f8f8f8;
      --bg-dark: #121212;
      --purple: #2e1a47;
      --blue: #1a2a47;
    }

    html { scroll-behavior: smooth; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

    /* ====== אזעקות פיקוד העורף ====== */
    #alert-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #ff0000; color: white; padding: 20px; text-align: center;
      font-weight: 900; z-index: 9999; border-bottom: 4px solid #fff;
      font-size: 1.5rem; animation: blinker 0.8s linear infinite;
    }
    @keyframes blinker { 50% { opacity: 0; } }

    /* ====== Header ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }
    .header-left { display: flex; flex-direction: column; min-width: 150px; }
    #clock { font-weight: 700; font-size: 18px; color: var(--gold); }
    .header-center { font-family: 'Frank Ruhl Libre', serif; color: var(--gold); font-size: 1.6rem; font-weight: 700; position: absolute; left: 50%; transform: translateX(-50%); }
    .header-right { display: flex; gap: 10px; }

    .nav-btn {
      color: var(--text-main); text-decoration: none; font-weight: 600; cursor: pointer;
      padding: 8px 16px; border: 1px solid var(--gold); border-radius: 4px; background: transparent; transition: 0.3s;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== דפים ====== */
    .page { display: none; min-height: 100vh; width: 100%; padding-top: 80px; text-align: center; box-sizing: border-box; }
    .page.active { display: block; }
    
    #main { background: #000; }
    #history { background: radial-gradient(circle, var(--purple) 0%, #0c0c0c 100%); }
    #about { background: radial-gradient(circle, var(--blue) 0%, #0c0c0c 100%); }

    .hero-sec {
      height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
    }

    /* ====== קרוסלה "פי אלף" ללא הפסקה ====== */
    .carousel-container {
      width: 100%; overflow: hidden; background: #000; padding: 40px 0;
      border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
      white-space: nowrap; position: relative;
    }

    .track {
      display: inline-flex;
      animation: slide 30s linear infinite;
    }

    .track img {
      width: 350px; height: 250px; object-fit: cover;
      margin: 0 10px; border: 2px solid var(--gold); border-radius: 8px;
    }

    @keyframes slide {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); } /* תמיד זז חצי מהאורך המשוכפל */
    }

    .welcome-text { font-family: 'Frank Ruhl Libre', serif; font-size: 2.8rem; color: var(--gold); margin: 60px 0; }
  </style>
</head>
<body>

  <div id="alert-banner">🚨 אזעקה: <span id="alert-loc"></span></div>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date" style="font-size:12px; opacity:0.8;"></div>
    </div>
    <div class="header-center" id="parasha">טוען פרשה...</div>
    <div class="header-right">
      <button class="nav-btn" onclick="goTo('history')">היסטוריה</button>
      <button class="nav-btn" onclick="goTo('about')">אודות</button>
      <button class="nav-btn" onclick="goTo('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active" style="padding-top:0;">
    <section class="hero-sec">
      <div style="background: rgba(0,0,0,0.7); padding: 50px; border: 1px solid var(--gold); backdrop-filter: blur(5px);">
        <h1 style="font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; margin: 0;">"העוצמה היא המפתח לקיום."</h1>
        <button class="nav-btn" style="margin-top: 30px; padding: 15px 40px; font-size: 1.2rem;" onclick="document.getElementById('fun-zone').scrollIntoView();">מוכנים לצלול לכיף?</button>
      </div>
    </section>

    <section id="fun-zone" style="background: #0c0c0c; padding-bottom: 100px;">
      <div class="welcome-text">רועי ודולב מברכים אתכם על היוולדותכם לעולם</div>
      <div class="carousel-container">
        <div class="track" id="image-track">
          </div>
      </div>
    </section>
  </div>

  <div id="history" class="page">
    <h1 style="font-size: 4rem; color: var(--gold); margin-top: 100px;">6767</h1>
    <h2>היסטוריה</h2>
    <p>ברוכים הבאים לעמוד המורשת</p>
  </div>

  <div id="about" class="page">
    <h1 style="font-size: 4rem; color: var(--gold); margin-top: 100px;">55655</h1>
    <h2>אודות</h2>
    <p>החזון של דולב ורועי</p>
  </div>

  <script>
    const imgs = [
      './image_2026-03-13_222345060.png', './image_2026-03-13_230619314.png',
      './image_2026-03-13_230636882.png', './image_2026-03-13_230654112.png',
      './image_2026-03-13_230706432.png', './image_2026-03-13_230721055.png',
      './image_2026-03-13_230733426.png', './image_2026-03-13_230748568.png',
      './image_2026-03-13_230759616.png'
    ];

    // מילוי הקרוסלה ב-10 סטים (90 תמונות) כדי שזה יהיה אינסופי
    const track = document.getElementById('image-track');
    for(let i=0; i<10; i++) {
      imgs.forEach(s => {
        const img = document.createElement('img');
        img.src = s;
        track.appendChild(img);
      });
    }

    // ניווט בין דפים
    function goTo(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    // שעון
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL');
      document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', {day:'numeric', month:'long'});
    }, 1000);

    // אזעקות - שימוש ב-allorigins לעקוף חסימות
    async function getAlerts() {
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.oref.org.il/WarningMessages/alert/alerts.json')}`);
        const d = await r.json();
        const data = JSON.parse(d.contents);
        const b = document.getElementById('alert-banner');
        if (data && data.data && data.data.length > 0) {
          document.getElementById('alert-loc').textContent = data.data.join(', ');
          b.style.display = 'block';
        } else { b.style.display = 'none'; }
      } catch(e) {}
    }
    setInterval(getAlerts, 3000);

    // פרשה
    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });
  </script>
</body>
</html>
