<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Rubik:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1:#052617;
      --bg2:#06301c;
      --bg3:#041f12;
      --stroke: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.92);
      --ok: #24d18a;
    }

    * { box-sizing:border-box; }
    html, body { height: 100%; margin: 0; scroll-behavior: smooth; }
    
    body {
      background: var(--bg3);
      color: var(--text);
      font-family: "Rubik", sans-serif;
      overflow: hidden; /* מונע גלילה מיותרת לפני שלוחצים */
    }

    /* ====== Header ====== */
    .unified-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--stroke);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 1000;
    }

    .header-left { display: flex; align-items: center; gap: 15px; font-size: 14px; }
    .header-center { font-family: "Frank Ruhl Libre", serif; font-size: 1.2rem; color: var(--ok); }
    .header-right { display: flex; gap: 20px; }
    .header-right a { color: var(--text); text-decoration: none; font-weight: 600; cursor: pointer; }

    /* ====== דפי תוכן ====== */
    .page { display: none; height: 100vh; width: 100%; }
    .page.active { display: block; }

    /* תיקון דף הבית והתמונה */
    .hero-container {
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* שים לב: הקובץ חייב להיות באותה תיקייה בשם הזה */
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('image_5ccc35.jpg');
      background-size: cover;
      background-position: center;
      text-align: center;
    }

    .bibi-quote {
      font-family: "Frank Ruhl Libre", serif;
      font-size: clamp(1.5rem, 4vw, 3.5rem);
      font-weight: 900;
      color: white;
      max-width: 80%;
      margin-bottom: 30px;
      line-height: 1.2;
    }

    .scroll-down-btn {
      padding: 12px 35px;
      border: 2px solid white;
      background: rgba(255,255,255,0.1);
      color: white;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .scroll-down-btn:hover { background: white; color: black; }

    /* דפי המשנה */
    .sub-page {
        background: radial-gradient(circle at 50% 30%, var(--bg2) 0%, var(--bg1) 45%, var(--bg3) 100%);
        padding-top: 100px;
        text-align: center;
    }
    .special-number { font-size: 8rem; font-weight: 900; color: var(--ok); }
  </style>
</head>
<body>

  <header class="unified-header">
    <div class="header-left">
      <span id="liveClock">00:00:00</span>
      <span style="opacity: 0.3;">|</span>
      <span id="gregDate">--.--.----</span>
    </div>

    <div class="header-center">
       <span id="parashaHeader">טוען פרשה...</span>
    </div>

    <div class="header-right">
      <a onclick="showPage('history')">היסטוריה על האתר</a>
      <a onclick="showPage('about')">אודות מי אנחנו</a>
      <a onclick="showPage('main')" style="margin-right: 15px; border-right: 1px solid var(--stroke); padding-right: 15px;">דף הבית</a>
    </div>
  </header>

  <div id="main-page" class="page active">
    <section class="hero-container">
      <blockquote class="bibi-quote">
        "העוצמה היא המפתח לקיום, והעוצמה היא המפתח לשלום."
        <div style="font-size: 1.1rem; font-weight: 400; margin-top: 15px;">- בנימין נתניהו</div>
      </blockquote>
      <button class="scroll-down-btn">תגללו לעוד</button>
    </section>
  </div>

  <div id="history-page" class="page sub-page">
    <div class="special-number">6767</div>
    <h2>דף היסטוריה</h2>
  </div>

  <div id="about-page" class="page sub-page">
    <div class="special-number">55655</div>
    <h2>אודות דולב ורועי</h2>
  </div>

  <script>
    function showPage(pageName) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      if(pageName === 'main') document.getElementById('main-page').classList.add('active');
      else if(pageName === 'history') document.getElementById('history-page').classList.add('active');
      else if(pageName === 'about') document.getElementById('about-page').classList.add('active');
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("liveClock").textContent = now.toLocaleTimeString('he-IL');
      document.getElementById("gregDate").textContent = now.toLocaleDateString('he-IL');
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function loadParasha() {
        try {
            const r = await fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he");
            const j = await r.json();
            const p = j.items.find(x => x.category === "parashat")?.title || "ויקרא";
            document.getElementById("parashaHeader").textContent = "פרשת " + p;
        } catch(e) {}
    }
    loadParasha();
  </script>
</body>
</html>
