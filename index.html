<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אתר ההיסטוריה שלנו</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="live-time" id="clock">טוען זמן...</div>
        <div class="weekly-torah">פרשת השבוע: ויקרא</div>
        <nav class="nav-links">
            <a href="#">היסטוריה על האתר</a>
            <span> | </span>
            <a href="#">אודות מי אנחנו</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-overlay">
            <div class="hero-content">
                <blockquote class="bibi-quote">
                    "הדבר החשוב ביותר הוא לטפח את העוצמה של מדינת ישראל"
                </blockquote>
                <button class="scroll-btn" onclick="scrollToContent()">תגללו לעוד</button>
            </div>
        </div>
    </section>

    <div id="next-section" style="height: 100vh; background: #f4f4f4; text-align: center; padding-top: 50px;">
        <h2>המשך האתר יופיע כאן...</h2>
    </div>

    <script>
        // פונקציה לעדכון זמן ותאריך בלייב
        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('he-IL');
            const timeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('clock').innerText = dateStr + " | " + timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function scrollToContent() {
            document.getElementById('next-section').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
