<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --text-main: #f8f8f8;
      --bg-dark: #121212;
    }

    html { scroll-behavior: smooth; }
    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

    /* ====== באנר אזעקות אדום בולט ====== */
    #alert-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #ff0000; color: white; padding: 25px; text-align: center;
      font-weight: 900; z-index: 9999; border-bottom: 5px solid #fff;
      font-size: 1.8rem; box-shadow: 0 5px 20px rgba(255,0,0,0.5);
    }

    /* ====== Header ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }
    .header-left { display: flex; flex-direction: column; min-width: 150px; }
    #clock { font-weight: 700; font-size: 18px; color: var(--gold); }
    .header-center { font-family: 'Frank Ruhl Libre', serif; color: var(--gold); font-size: 1.6rem; font-weight: 700; position: absolute; left: 50%; transform: translateX(-50%); }
    .header-right { display: flex; gap: 10px; }

    .nav-btn {
      color: var(--text-main); text-decoration: none; font-weight: 600; cursor: pointer;
      padding: 8px 16px; border: 1px solid var(--gold); border-radius: 4px; background: transparent; transition: 0.3s;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== ניהול דפים ====== */
    .page { display: none; min-height: 100vh; padding-top: 80px; text-align: center; }
    .page.active { display: block; }
    
    #main-hero {
      height: 90vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* ====== קרוסלה אינסופית אמיתית ====== */
    .carousel-wrap {
      width: 100%; overflow: hidden; background: #000; padding: 60px 0;
      border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
      position: relative;
    }

    .carousel-track {
      display: flex;
      width: max-content;
      animation: linearLoop 50s linear infinite; /* קצב אחיד ומתוקן */
    }

    .carousel-track img {
      height: 400px; /* החזרתי לעובי ולגובה המקורי המרשים */
      width: auto;   /* מונע מתיחה של התמונה */
      margin: 0 20px;
      border: 3px solid var(--gold);
      border-radius: 12px;
      flex-shrink: 0;
    }

    @keyframes linearLoop {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .welcome-text { font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; color: var(--gold); margin: 60px 0; font-weight: 900; }
  </style>
</head>
<body>

  <div id="alert-banner">🚨 צבע אדום: <span id="alert-loc"></span></div>

  <header class="header" id="main-header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date" style="font-size:12px; opacity:0.8;"></div>
    </div>
    <div class="header-center" id="parasha">טוען פרשה...</div>
    <div class="header-right">
      <button class="nav-btn" onclick="showP('history')">היסטוריה</button>
      <button class="nav-btn" onclick="showP('about')">אודות</button>
      <button class="nav-btn" onclick="showP('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active" style="padding-top:0;">
    <section id="main-hero">
      <div style="background: rgba(0,0,0,0.75); padding: 50px; border: 2px solid var(--gold); border-radius: 10px;">
        <h1 style="font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; margin: 0;">"העוצמה היא המפתח לקיום."</h1>
        <button class="nav-btn" style="padding: 20px 50px; margin-top: 30px; font-size: 1.3rem;" onclick="document.getElementById('welcome-zone').scrollIntoView();">מוכנים לצלול לכיף?</button>
      </div>
    </section>

    <section id="welcome-zone" style="background: #0c0c0c; padding-bottom: 120px;">
      <div class="welcome-text">רועי ודולב מברכים אתכם על היוולדותכם לעולם</div>
      
      <div class="carousel-wrap">
        <div class="carousel-track" id="track">
          </div>
      </div>
    </section>
  </div>

  <div id="history" class="page" style="background: #1a0a2a;">
    <div style="font-size: 10rem; color: var(--gold); opacity: 0.2; margin-top: 100px;">6767</div>
    <h1>היסטוריה</h1>
  </div>

  <div id="about" class="page" style="background: #0a1a2a;">
    <div style="font-size: 10rem; color: var(--gold); opacity: 0.2; margin-top: 100px;">55655</div>
    <h1>אודות</h1>
  </div>

    for(let i=0; i < 10; i++) {

      });
