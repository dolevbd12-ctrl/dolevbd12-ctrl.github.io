<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --text-main: #f8f8f8;
      --bg-dark: #121212;
    }

    html { scroll-behavior: smooth; }
    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

    /* ====== באנר אזעקות (משופר) ====== */
    #alert-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #ff0000; color: white; padding: 20px; text-align: center;
      font-weight: 900; z-index: 9999; border-bottom: 4px solid #fff;
      font-size: 1.5rem; animation: alertBlink 0.8s infinite;
    }
    @keyframes alertBlink { 0% {background: #ff0000;} 50% {background: #8b0000;} 100% {background: #ff0000;} }

    /* ====== Header ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }
    .header-left { display: flex; flex-direction: column; }
    #clock { font-weight: 700; font-size: 18px; color: var(--gold); }
    .header-center { font-family: 'Frank Ruhl Libre', serif; color: var(--gold); font-size: 1.6rem; font-weight: 700; }
    .header-right { display: flex; gap: 10px; justify-content: flex-end; }

    .nav-btn {
      color: var(--text-main); text-decoration: none; font-weight: 600; cursor: pointer;
      padding: 8px 16px; border: 1px solid var(--gold); border-radius: 4px; background: transparent; transition: 0.3s;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== Pages ====== */
    .page { display: none; min-height: 100vh; padding-top: 80px; text-align: center; }
    .page.active { display: block; }
    
    #main-hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* ====== קרוסלה "פי אלף" - אינסופית באמת ====== */
    .carousel-wrap {
      width: 100vw; overflow: hidden; background: #000; padding: 40px 0;
      border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
      position: relative;
    }

    .carousel-track {
      display: flex;
      width: max-content;
      animation: infiniteScroll 60s linear infinite; /* מהירות רגועה יותר כי יש המון תמונות */
    }

    .carousel-track img {
      width: 350px; height: 250px; object-fit: cover;
      margin: 0 15px; border: 2px solid var(--gold); border-radius: 5px;
      flex-shrink: 0;
    }

    @keyframes infiniteScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); } /* ירוץ חצי דרך תמיד */
    }

    .welcome-text { font-family: 'Frank Ruhl Libre', serif; font-size: 2.5rem; color: var(--gold); margin: 40px 0; font-weight: 700; }
  </style>
</head>
<body>

  <div id="alert-banner">🚨 אזעקת צבע אדום: <span id="alert-loc"></span></div>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date" style="font-size:12px; opacity:0.7;"></div>
    </div>
    <div class="header-center" id="parasha">טוען...</div>
    <div class="header-right">
      <button class="nav-btn" onclick="showPage('history')">היסטוריה</button>
      <button class="nav-btn" onclick="showPage('about')">אודות</button>
      <button class="nav-btn" onclick="showPage('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active" style="padding-top:0;">
    <section id="main-hero">
      <div style="background: rgba(0,0,0,0.6); padding: 50px; border: 1px solid var(--gold);">
        <h1 style="font-family: 'Frank Ruhl Libre', serif; font-size: 3rem;">"העוצמה היא המפתח לקיום."</h1>
        <button class="nav-btn" style="padding: 15px 40px; margin-top: 20px;" onclick="document.getElementById('welcome-zone').scrollIntoView();">מוכנים לצלול לכיף?</button>
      </div>
    </section>

    <section id="welcome-zone" style="background: #0c0c0c; padding-bottom: 100px;">
      <div class="welcome-text">רועי ודולב מברכים אתכם על היוולדותכם לעולם</div>
      
      <div class="carousel-wrap">
        <div class="carousel-track" id="track">
            </div>
      </div>
    </section>
  </div>

  <div id="history" class="page"><h1>היסטוריה</h1></div>
  <div id="about" class="page"><h1>אודותינו</h1></div>

  <script>
    const images = [
      './image_2026-03-13_222345060.png', './image_2026-03-13_230619314.png',
      './image_2026-03-13_230636882.png', './image_2026-03-13_230654112.png',
      './image_2026-03-13_230706432.png', './image_2026-03-13_230721055.png',
      './image_2026-03-13_230733426.png', './image_2026-03-13_230748568.png',
      './image_2026-03-13_230759616.png'
    ];

    // יצירת מסילה סופר-ארוכה (שכפול פי 10 ליתר ביטחון)
    const track = document.getElementById('track');
    const createSlides = () => {
        const fragment = document.createDocumentFragment();
        // משכפלים את כל הסט 10 פעמים - זה יוצר שרשרת ענקית של 90 תמונות
        for(let i=0; i < 10; i++) {
            images.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                fragment.appendChild(img);
            });
        }
        track.appendChild(fragment);
    };
    createSlides();

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // שעון
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL');
      document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', {day:'numeric', month:'long'});
    }, 1000);

    // אזעקות פיקוד העורף - כולל מעקף CORS
    async function checkOref() {
      try {
        // שימוש בפרוקסי ציבורי כדי לעקוף את החסימה של דפדפנים
        const proxyUrl = "https://api.allorigins.win/get?url=";
        const targetUrl = encodeURIComponent("https://www.oref.org.il/WarningMessages/alert/alerts.json");
        
        const response = await fetch(proxyUrl + targetUrl);
        const json = await response.json();
        const data = JSON.parse(json.contents);
        
        const banner = document.getElementById('alert-banner');
        if (data && data.data && data.data.length > 0) {
          document.getElementById('alert-loc').textContent = data.data.join(', ');
          banner.style.display = 'block';
        } else {
          banner.style.display = 'none';
        }
      } catch (e) { console.log("Alert check failed"); }
    }
    setInterval(checkOref, 3000);

    // פרשה
    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });
  </script>
</body>
</html>
