<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>פרשת השבוע</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=IBM+Plex+Sans+Hebrew:wght@400;600;700&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#18233f;
      --bg2:#070b18;

      /* השורה האפורה */
      --bar:rgba(180,180,180,.16);
      --barBorder:rgba(255,255,255,.14);

      /* טקסט הפרשה (שחור) */
      --parashaText:#000;
      --parashaBg:rgba(255,255,255,.88);
    }

    html,body{margin:0;height:100%}
    body{
      background:radial-gradient(circle at top,var(--bg1),var(--bg2));
      font-family:"IBM Plex Sans Hebrew",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
      overflow:hidden;
      color:#fff;
    }

    /* HEADER */
    .header{
      position:fixed; top:0; left:0; right:0;
      padding:12px 14px;
      background:var(--bar);
      border-bottom:1px solid var(--barBorder);
      backdrop-filter:blur(10px);
      z-index:10;
    }
    .headerRow{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .badge{
      padding:6px 10px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .clock{font-family:"Roboto Mono",monospace}
    .muted{opacity:.92}

    /* MARQUEE (רציף בלי "זמן ריק") */
    .marquee-wrap{
      position:absolute;
      top:78px; left:0; right:0; bottom:0;
      display:flex;
      align-items:center;
      overflow:hidden;
      padding-inline:16px;
      box-sizing:border-box;
    }
    .marquee-track{
      display:flex;
      width:max-content;
      will-change:transform;
      animation:none; /* נדלק אחרי טעינה */
    }
    .marquee-track.running{
      animation:scroll 30s linear infinite; /* מהירות ריצה: 20 מהיר, 45 איטי */
    }
    .marquee-content{
      display:flex;
      align-items:center;
      gap:18px;
      white-space:nowrap;
    }
    .marquee-gap{width:80px}

    .marquee-content img{
      width:110px;height:110px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 12px 34px rgba(0,0,0,.45);
      flex:0 0 auto;
    }

    .parasha-text{
      font-family:"Frank Ruhl Libre","Times New Roman",serif;
      font-size:22px;
      line-height:1.4;
      color:var(--parashaText);
      background:var(--parashaBg);
      padding:10px 16px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.12);
      box-shadow:0 12px 34px rgba(0,0,0,.25);
    }

    @keyframes scroll{
      from{transform:translateX(0)}
      to{transform:translateX(-50%)}
    }

    /* פינת דיווחים (דמו) */
    .security{
      position:fixed;
      bottom:16px;
      left:16px;
      width:260px;
      background:rgba(120,0,0,.85);
      padding:12px;
      border:1px solid rgba(255,255,255,.2);
      font-size:13px;
      z-index:12;
    }
    .security strong{display:block;margin-bottom:6px}

    @media (prefers-reduced-motion: reduce){
      .marquee-track.running{animation:none}
      body{overflow:auto}
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="headerRow">
      <span class="badge" id="greeting">טוען…</span>

      <span class="badge clock" id="clock">--:--:--</span>

      <span class="badge muted" id="dates">טוען תאריך…</span>

      <!-- טיימר מאז 07.10.2023 (בין התאריך לפרשה) -->
      <span class="badge clock" id="sinceOct7">מאז 07.10.2023: —</span>

      <span class="badge muted">פרשת השבוע: <span id="parashaName">טוען…</span></span>
    </div>
  </div>

  <!-- MARQUEE -->
  <div class="marquee-wrap">
    <div class="marquee-track" id="marqueeTrack">
      <!-- עותק 1 (עם IDs) -->
      <div class="marquee-content" id="marqueeContent">
        <img src="aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg" alt="תמונה">
        <div class="parasha-text" id="parashaText">טוען את טקסט הפרשה…</div>
        <span class="marquee-gap"></span>
      </div>

      <!-- עותק 2 (נבנה בלי IDs כדי לא לשבור את הדף) -->
      <div class="marquee-content" id="marqueeClone"></div>
    </div>
  </div>

  <!-- פינת דיווחים (כרגע דמו) -->
  <div class="security">
    <strong>פינת דיווחים ביטחוניים</strong>
    ירושלים<br>
    אין התרעות
  </div>

  <script>
    /* ============================
       הגדרות
       ============================ */
    const TZ = "Asia/Jerusalem";
    const GEO = { geo:"geoname", geonameid:281184 }; // ירושלים (Hebcal)

    const el = {
      greeting: document.getElementById("greeting"),
      clock: document.getElementById("clock"),
      dates: document.getElementById("dates"),
      since: document.getElementById("sinceOct7"),
      parashaName: document.getElementById("parashaName"),
      parashaText: document.getElementById("parashaText"),
      track: document.getElementById("marqueeTrack"),
      content: document.getElementById("marqueeContent"),
      clone: document.getElementById("marqueeClone"),
    };

    /* ============================
       JSONP (לעקוף CORS מול Sefaria על GitHub Pages)
       ============================ */
    function jsonp(url){
      return new Promise((resolve, reject) => {
        const cb = "cb_" + Math.random().toString(36).slice(2);
        const script = document.createElement("script");
        const timeout = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 12000);

        function cleanup(){
          clearTimeout(timeout);
          try { delete window[cb]; } catch(e) { window[cb] = undefined; }
          script.remove();
        }

        window[cb] = (data) => { cleanup(); resolve(data); };
        script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
        script.onerror = () => { cleanup(); reject(new Error("load error")); };

        document.body.appendChild(script);
      });
    }

    /* ============================
       שעון + תאריך עברי/לועזי
       ============================ */
    function tickClockAndDates(){
      // שעה חיה (ירושלים)
      el.clock.textContent = new Intl.DateTimeFormat("he-IL", {
        timeZone: TZ, hour:"2-digit", minute:"2-digit", second:"2-digit"
      }).format(new Date());

      // תאריך עברי (אם נתמך)
      let he = "";
      try{
        he = new Intl.DateTimeFormat("he-IL-u-ca-hebrew", {
          timeZone: TZ, day:"numeric", month:"long", year:"numeric"
        }).format(new Date());
      }catch(e){}

      // תאריך לועזי
      const gr = new Intl.DateTimeFormat("he-IL", {
        timeZone: TZ, weekday:"long", day:"2-digit", month:"2-digit", year:"numeric"
      }).format(new Date());

      el.dates.textContent = he ? (he + " • " + gr) : gr;
    }

    /* ============================
       טיימר מאז 07.10.2023 (מתעדכן כל שניה)
       ============================ */
    const startDate = new Date("2023-10-07T00:00:00+03:00");
    function updateSinceOct7(){
      const now = new Date();
      let diff = Math.max(0, now - startDate);

      const days = Math.floor(diff / (1000*60*60*24));
      diff %= (1000*60*60*24);
      const hours = Math.floor(diff / (1000*60*60));
      diff %= (1000*60*60);
      const minutes = Math.floor(diff / (1000*60));
      const seconds = Math.floor((diff % (1000*60)) / 1000);

      el.since.textContent = `מאז 07.10.2023: ${days} ימים ${hours} שעות ${minutes} דקות ${seconds} שנ׳`;
    }

    /* ============================
       מרקיזה רציפה (בונה עותק 2 בלי IDs)
       ============================ */
    function refreshSeamlessMarquee(){
      let html = el.content.innerHTML;
      // מסירים id="..." כדי שלא יהיו IDs כפולים בעותק 2
      html = html.replace(/\sid="[^"]*"/g, "");
      el.clone.innerHTML = html;
      el.track.classList.add("running");
    }

    /* ============================
       Hebcal: פרשה + שבת שלום/שבוע טוב (לפי כניסת/יציאת שבת ירושלים)
       ============================ */
    function hebcalUrl(){
      const u = new URL("https://www.hebcal.com/shabbat");
      u.searchParams.set("cfg","json");
      u.searchParams.set("geo",GEO.geo);
      u.searchParams.set("geonameid",String(GEO.geonameid));
      u.searchParams.set("M","on");
      u.searchParams.set("hdp","1");
      return u.toString();
    }

    async function loadParasha(){
      try{
        const data = await fetch(hebcalUrl(), { cache:"no-store" }).then(r => r.json());
        const items = data.items || [];

        const p = items.find(i => i.category === "parashat");
        const candles = items.find(i => i.category === "candles");
        const havdalah = items.find(i => i.category === "havdalah");

        // שם הפרשה
        el.parashaName.textContent = p?.hebrew
          ? String(p.hebrew).replace(/^פרשת\s*/,"").trim()
          : "—";

        // שבת שלום אם עכשיו בתוך חלון שבת (ירושלים), אחרת שבוע טוב
        const now = new Date();
        const inShabbat = candles?.date && havdalah?.date
          ? (now >= new Date(candles.date) && now <= new Date(havdalah.date))
          : false;
        el.greeting.textContent = inShabbat ? "שבת שלום" : "שבוע טוב";

        // טווח קריאה להבאת טקסט הפרשה
        const ref = p?.leyning?.torah; // למשל "Exodus 1:1-6:1"
        if(!ref){
          el.parashaText.textContent = "טקסט הפרשה לא זמין כרגע.";
          refreshSeamlessMarquee();
          return;
        }

        // Sefaria texts דרך JSONP
        const sefUrl = "https://www.sefaria.org/api/texts/" + encodeURIComponent(ref) + "?lang=he&context=0";
        const txt = await jsonp(sefUrl);

        const text = Array.isArray(txt?.he)
          ? txt.he.filter(Boolean).join(" ")
          : (txt?.he || "");

        el.parashaText.textContent = text || "הטקסט חזר ריק כרגע.";
        refreshSeamlessMarquee();

      }catch(e){
        el.parashaName.textContent = "—";
        el.greeting.textContent = "שבוע טוב";
        el.parashaText.textContent = "שגיאה בטעינה (אינטרנט/חסימה).";
        refreshSeamlessMarquee();
      }
    }

    /* ============================
       הפעלה
       ============================ */
    tickClockAndDates();
    updateSinceOct7();
    setInterval(tickClockAndDates, 1000);
    setInterval(updateSinceOct7, 1000);

    loadParasha();
    setInterval(loadParasha, 6 * 60 * 60 * 1000); // רענון כל 6 שעות
  </script>

</body>
</html>
