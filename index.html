<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>פרשת השבוע</title>

<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=IBM+Plex+Sans+Hebrew:wght@400;600;700&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#18233f,#070b18);
  font-family:"IBM Plex Sans Hebrew",sans-serif;
  overflow:hidden;
  color:white;
}

/* HEADER */
.header{
  position:fixed;
  top:0; left:0; right:0;
  padding:12px;
  background:rgba(180,180,180,.16);
  backdrop-filter:blur(10px);
  z-index:20;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.badge{
  padding:6px 10px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.2);
}
.clock{font-family:"Roboto Mono",monospace}

/* MARQUEE */
.marquee-wrap{
  position:absolute;
  top:90px;
  left:0;
  right:0;
  height:180px;
  overflow:hidden;
  display:flex;
  align-items:center;
}

.marquee-track{
  display:flex;
  align-items:center;
  will-change:transform;
}

.marquee-content{
  display:flex;
  align-items:center;
  white-space:nowrap;
}

.marquee-content img{
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:12px;
  margin-inline:18px;
}

.parasha-text{
  font-family:"Frank Ruhl Libre",serif;
  font-size:22px;
  background:rgba(255,255,255,.9);
  color:#000;
  padding:12px 18px;
  border-radius:10px;
}

/* כפתור */
.doom{
  position:fixed;
  top:200px;
  left:50%;
  transform:translateX(-50%);
  font-size:48px;
  padding:24px 40px;
  font-weight:900;
  background:#800;
  color:white;
  border:4px solid red;
  cursor:pointer;
  animation:pulse 1.5s infinite;
  z-index:15;
}
@keyframes pulse{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.07)}
  100%{transform:translateX(-50%) scale(1)}
}
</style>
</head>

<body>

<div class="header">
  <div class="badge" id="greeting">שבוע טוב</div>
  <div class="badge" id="parashaName">פרשת השבוע</div>
  <div class="badge clock" id="clock">--:--:--</div>
</div>

<button class="doom" id="doomBtn">לא ללחוץ</button>

<div class="marquee-wrap">
  <div class="marquee-track" id="track">
    <div class="marquee-content" id="content">
      <img src="aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg">
      <div class="parasha-text" id="parashaText">טוען פרשה…</div>
    </div>
  </div>
</div>

<script>
/* שעון */
setInterval(()=>{
  document.getElementById("clock").textContent =
    new Intl.DateTimeFormat("he-IL",{
      timeZone:"Asia/Jerusalem",
      hour:"2-digit",minute:"2-digit",second:"2-digit"
    }).format(new Date());
},1000);

/* מרקיזה אמיתית – ללא קרטועים */
let x = 0;
let speed = 0.5; // מהירות פיקסלים לפריים

function startMarquee(){
  const track = document.getElementById("track");
  const content = document.getElementById("content");

  // שכפול
  track.appendChild(content.cloneNode(true));

  const contentWidth = content.offsetWidth;

  function animate(){
    x -= speed;
    if(Math.abs(x) >= contentWidth){
      x = 0;
    }
    track.style.transform = `translateX(${x}px)`;
    requestAnimationFrame(animate);
  }
  animate();
}

/* טעינת פרשה */
fetch("https://www.hebcal.com/shabbat?cfg=json&geo=geoname&geonameid=281184")
.then(r=>r.json())
.then(data=>{
  const p = data.items.find(i=>i.category==="parashat");
  document.getElementById("parashaName").textContent =
    p.hebrew.replace("פרשת ","");

  return fetch(
    "https://www.sefaria.org/api/texts/" +
    encodeURIComponent(p.leyning.torah) +
    "?lang=he&context=0"
  );
})
.then(r=>r.json())
.then(t=>{
  document.getElementById("parashaText").textContent =
    Array.isArray(t.he) ? t.he.join(" ") : t.he;
  startMarquee();
});

/* כפתור */
document.getElementById("doomBtn").onclick=()=>{
  document.body.style.background="black";
  setTimeout(()=>{
    location.href="https://www.gov.il/he/departments/prime_ministers_office";
  },600);
};
</script>

</body>
</html>
