<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>D&R | Official</title>
  
  <link rel="icon" type="image/png" href="./image_2026-03-13_222345060.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== תפריט צף מותאם ====== */
    .floating-nav {
      position: fixed; top: 0; left: 0; width: 100%; height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 1000;
      pointer-events: none;
    }
    @media (min-width: 768px) { .floating-nav { padding: 0 50px; height: 90px; } }
    
    .floating-nav > * { pointer-events: auto; }

    .brand-home {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 8px 20px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    @media (min-width: 768px) { .brand-home { padding: 12px 30px; font-size: 1.1rem; } }

    #clock { 
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 16px; color: var(--gold-bright); font-weight: 900; 
      font-family: 'Cinzel'; text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    @media (min-width: 768px) { #clock { font-size: 24px; } }
    
    .nav-links { display: flex; gap: 8px; }
    @media (min-width: 768px) { .nav-links { gap: 15px; } }

    .nav-btn {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 8px 15px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; transition: 0.3s; font-size: 0.7rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    @media (min-width: 768px) { .nav-btn { padding: 10px 28px; font-size: 0.9rem; } }
    .nav-btn:hover, .brand-home:hover { transform: translateY(-3px); filter: brightness(1.1); }

    /* ====== PAGE TRANSITIONS ====== */
    .page { 
      display: none; opacity: 0; transform: scale(1.05); filter: blur(10px);
      transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .page.active { display: block; opacity: 1; transform: scale(1); filter: blur(0); }

    /* ====== HERO HOME ====== */
    .hero-section { height: 200vh; width: 100%; position: relative; }
    .hero-sticky-box {
      position: sticky; top: 0; height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    .parasha-float {
      font-family: 'Cinzel'; font-size: 1.2rem; color: var(--gold);
      letter-spacing: 5px; margin-bottom: 5px; white-space: nowrap;
      will-change: transform; opacity: 0.6;
    }
    @media (min-width: 768px) { .parasha-float { font-size: 2rem; letter-spacing: 15px; margin-bottom: -20px; } }

    .scrolling-name {
      font-size: 15vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 1px var(--gold); font-family: 'Inter';
      text-transform: uppercase; white-space: nowrap; will-change: transform;
    }
    @media (min-width: 768px) { .scrolling-name { font-size: 10vw; -webkit-text-stroke: 1.2px var(--gold); } }

    .reveal-group {
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none; padding: 0 20px; text-align: center;
    }
    .reveal-group.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .established-text {
      font-family: 'Cinzel'; font-size: 1rem; color: var(--gold);
      letter-spacing: 5px; margin: 15px 0 25px 0; opacity: 0.8;
    }
    @media (min-width: 768px) { .established-text { font-size: 1.5rem; letter-spacing: 10px; margin: 15px 0 35px 0; } }

    .medieval-btn {
      font-family: 'Cinzel'; background: linear-gradient(135deg, var(--gold), #8a6d3b);
      color: black; padding: 12px 30px; border: none; font-weight: 900;
      font-size: 0.9rem; cursor: pointer; transition: 0.3s;
    }
    @media (min-width: 768px) { .medieval-btn { padding: 15px 45px; font-size: 1.1rem; } }

    /* ====== GALLERY ====== */
    .gallery-zone { background: var(--bg-dark); padding: 40px 15px; }
    .gallery-grid {
      display: grid; grid-template-columns: 1fr;
      gap: 15px; max-width: 1400px; margin: 0 auto;
    }
    @media (min-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    
    .card { height: 400px; border: 1px solid #1a1a1a; background-size: cover; background-position: center; }
    @media (min-width: 768px) { .card { height: 500px; } }

    /* ====== CONTENT PAGES ====== */
    .content-container { padding: 120px 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .content-container h2 { font-size: 3rem; font-family: 'Cinzel'; color: var(--gold-bright); }
    @media (min-width: 768px) { .content-container h2 { font-size: 5rem; } }

    /* ====== LOADER ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark); transition: 0.5s;
    }
    .dr-bounce { font-size: 3rem; font-weight: 900; color: var(--gold); animation: bnc 1.5s infinite; font-family: 'Inter'; }
    @keyframes bnc { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</head>
<body onload="init()">

  <div id="loader-main"><div class="dr-bounce">D&R</div></div>

  <nav class="floating-nav">
    <button class="brand-home" onclick="navigateTo('/')">D&R</button>
    <div id="clock">00:00:00</div>
    <div class="nav-links">
      <button class="nav-btn" onclick="navigateTo('/history')">היסטוריה</button>
      <button class="nav-btn" onclick="navigateTo('/films')">סרטים</button>
    </div>
  </nav>

  <div id="page-home" class="page">
    <section class="hero-section">
      <div class="hero-sticky-box">
        <div class="parasha-float" id="parasha-text">פרשת כי תשא</div>
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <div class="reveal-group" id="reveal-elements">
          <div class="established-text">ESTABLISHED 2026</div>
          <button class="medieval-btn" onclick="document.getElementById('gallery-zone').scrollIntoView({behavior: 'smooth'})">מוכנים לצלול לכיף?</button>
        </div>
      </div>
    </section>
    <div id="gallery-zone" class="gallery-zone">
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="page-history" class="page">
    <div class="content-container">
      <h2>HISTORY</h2>
      <div style="width: 60px; height: 2px; background: var(--gold); margin: 20px auto;"></div>
      <p style="font-size: 1.2rem; opacity: 0.7;">ארכיון האימפריה — 2026</p>
    </div>
  </div>

  <div id="page-films" class="page">
    <div class="content-container">
      <h2>FILMS</h2>
      <div style="width: 60px; height: 2px; background: var(--gold); margin: 20px auto;"></div>
      <p style="font-size: 1.2rem; opacity: 0.7;">הפקות מקור — בקרוב</p>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 500);
      }, 1000);
      updateClock();
      window.onpopstate = () => handleRoute(window.location.pathname);
      handleRoute(window.location.pathname);
    }

    function navigateTo(path) {
      document.querySelectorAll('.page').forEach(p => {
        if(p.classList.contains('active')) {
          p.style.opacity = '0';
          p.style.transform = 'scale(0.98)';
        }
      });
      setTimeout(() => {
        window.history.pushState({}, "", path);
        handleRoute(path);
      }, 400);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => {
          p.classList.remove('active');
          p.style.display = 'none';
          p.style.opacity = '0';
      });

      let targetId = 'page-home';
      if (path.includes('history')) targetId = 'page-history';
      else if (path.includes('films')) targetId = 'page-films';
      
      const targetPage = document.getElementById(targetId);
      targetPage.style.display = 'block';
      setTimeout(() => {
        targetPage.classList.add('active');
        targetPage.style.opacity = '1';
      }, 50);
      window.scrollTo(0, 0);
    }

    window.addEventListener('scroll', () => {
      const homePage = document.getElementById('page-home');
      if(homePage.style.display !== 'none' && homePage.classList.contains('active')) {
        const scrollPos = window.scrollY;
        const winHeight = window.innerHeight;
        const name = document.getElementById('main-name');
        const parasha = document.getElementById('parasha-text');
        const revealGroup = document.getElementById('reveal-elements');
        const progress = Math.min(scrollPos / winHeight, 1);
        
        const xPosName = 50 - (progress * 100); 
        name.style.transform = `translateX(${xPosName}%)`;

        const xPosParasha = -50 + (progress * 100);
        parasha.style.transform = `translateX(${xPosParasha}%)`;
        
        if (progress > 0.2) {
          name.style.color = `rgba(197, 160, 89, ${progress})`;
        } else {
          name.style.color = 'transparent';
        }

        if (progress > 0.8) {
          revealGroup.classList.add('show');
        } else {
          revealGroup.classList.remove('show');
        }
      }
    });

    function updateClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
      }, 1000);
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];
    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${src}')`;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
