<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R STUDIO | היכל העוצמה</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== LOADER: התכוננו לפנומן ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark); transition: opacity 0.8s ease;
    }
    .loader-content { text-align: center; }
    .studio-bounce { 
      font-size: 5rem; font-weight: 900; color: var(--gold);
      display: inline-block; animation: bounceJump 1.8s infinite;
      font-family: 'Inter', sans-serif;
    }
    .phenomenon-text { 
      margin-top: 20px; font-size: 1.2rem; letter-spacing: 10px; color: white;
      text-transform: uppercase; animation: fadeInOut 1.5s infinite;
    }
    @keyframes bounceJump {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); }
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ====== HEADER: המקורי משודרג ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 90px;
      background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; border-bottom: 1px solid rgba(197, 160, 89, 0.3);
    }
    .header-left { display: flex; flex-direction: column; }
    #clock { font-size: 22px; color: var(--gold); font-weight: 600; font-family: 'Cinzel', serif; }
    #full-date { font-size: 11px; opacity: 0.6; text-align: left; }
    .header-center { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; }
    .nav-btn {
      color: white; font-family: 'Cinzel', serif; padding: 8px 15px; border: 1px solid var(--gold);
      background: transparent; cursor: pointer; transition: 0.3s; margin-right: 10px; font-size: 0.8rem;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== HERO: אנימציית הטקסט הזז (במקום הפריים באמצע) ====== */
    .hero {
      height: 200vh; width: 100%; position: relative;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      background-attachment: fixed;
    }
    .sticky-wrap {
      position: sticky; top: 0; height: 100vh;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .scrolling-name {
      font-size: 15vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 2px var(--gold); font-family: 'Inter', sans-serif;
      text-transform: uppercase; white-space: nowrap; will-change: transform;
    }

    /* ====== GALLERY & CARDS ====== */
    .page { display: none; }
    .page.active { display: block; }
    .gallery-zone { background: var(--bg-dark); padding: 100px 20px; position: relative; z-index: 10; }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px; max-width: 1400px; margin: 50px auto;
    }
    .card {
      height: 500px; cursor: pointer; border: 2px solid #222;
      background-size: cover; background-position: center; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      position: relative; overflow: hidden;
    }
    .card::after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 0;
      background: linear-gradient(transparent, var(--gold)); opacity: 0.3; transition: 0.4s;
    }
    .card:hover { transform: scale(1.02); border-color: var(--gold); }
    .card:hover::after { height: 100%; }

    /* ====== MODAL ====== */
    .modal {
      display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
    }
    .modal-content {
      background: #000; margin: 10% auto; padding: 60px; border: 2px solid var(--gold);
      width: 320px; text-align: center; box-shadow: 0 0 70px rgba(197, 160, 89, 0.4);
    }
    .modal-number { font-size: 8rem; font-weight: 900; color: var(--gold); font-family: 'Inter'; }

    /* ====== HISTORY ====== */
    .subpage-container { padding: 150px 10%; line-height: 1.8; text-align: center; }
    .subpage-container h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 4rem; margin-bottom: 40px; }
  </style>
</head>
<body onload="init()">

  <div id="loader-main">
    <div class="loader-content">
        <div class="studio-bounce">D&R STUDIO</div>
        <div class="phenomenon-text">התכוננו לפנומן</div>
    </div>
  </div>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date"></div>
    </div>
    <div class="header-center" id="parasha-title">פרשת השבוע</div>
    <div class="header-right">
      <button class="nav-btn" onclick="nav('main')">דף הבית</button>
      <button class="nav-btn" onclick="nav('history')">היסטוריה</button>
      <button class="nav-btn" onclick="nav('films')">סרטים</button>
    </div>
  </header>

  <div id="main" class="page active">
    <section class="hero">
      <div class="sticky-wrap">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
      </div>
    </section>

    <div id="gallery-zone" class="gallery-zone">
      <h2 style="text-align: center; font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold);">WELCOME TO THE EMPIRE</h2>
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="history" class="page">
    <div class="subpage-container">
      <h2>OUR LEGACY</h2>
      <p style="font-size: 1.5rem; color: #ccc;">המורשת של דולב ורועי נבנתה מתוך תשוקה לעוצמה ואיכות בלתי מתפשרת.</p>
    </div>
  </div>

  <div id="films" class="page">
    <div class="subpage-container">
      <h2>D&R FILMS</h2>
      <p style="font-size: 1.5rem; color: #ccc;">בקרוב: גלריית הסרטים של הסטודיו.</p>
    </div>
  </div>

  <div id="surpriseModal" class="modal">
    <div class="modal-content">
      <span style="color:var(--gold); cursor:pointer; float:right; font-size: 2rem;" onclick="closeModal()">&times;</span>
      <h3 style="font-family:'Cinzel'; color:var(--gold)">הגורל שלך:</h3>
      <span id="luckyNumber" class="modal-number"></span>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 800);
      }, 2500);
      updateClock();
      fetchParasha();
    }

    // אנימציית גלילה לשמות (D&R)
    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY;
      const winHeight = window.innerHeight;
      const progress = Math.min(scrollPos / winHeight, 1.5);
      const name = document.getElementById('main-name');
      const xPos = 100 - (progress * 200); 
      name.style.transform = `translateX(${xPos}%)`;
      
      // שינוי צבע הדרגתי מזהב חלול לזהב מלא
      if(progress > 0.5) {
          name.style.color = `rgba(197, 160, 89, ${progress - 0.5})`;
      } else {
          name.style.color = 'transparent';
      }
    });

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_230759616.png'
    ];

    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${src}')`;
      card.onclick = () => {
        document.getElementById('luckyNumber').textContent = Math.floor(Math.random() * 10) + 1;
        document.getElementById('surpriseModal').style.display = "block";
      };
      gallery.appendChild(card);
    });

    function closeModal() { document.getElementById('surpriseModal').style.display = "none"; }
    function nav(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function updateClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
        document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', {day:'numeric', month:'long', year:'numeric'});
      }, 1000);
    }

    function fetchParasha() {
      fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
        .then(r => r.json()).then(j => {
          const p = j.items.find(x => x.category === "parashat")?.title || "";
          if(p) document.getElementById('parasha-title').textContent = "פרשת " + p;
        });
    }
  </script>
</body>
</html>
