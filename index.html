<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>פרשת השבוע</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=IBM+Plex+Sans+Hebrew:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#18233f,#070b18);
  color:#fff;
  font-family:"IBM Plex Sans Hebrew",sans-serif;
  overflow:hidden;
}

/* פרשה למעלה */
.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:14px;
  text-align:center;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
  z-index:10;
}
.header h1{
  margin:0;
  font-size:20px;
  font-weight:600;
}

/* אזור טקסט נע */
.marquee-wrap{
  position:absolute;
  top:90px;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  overflow:hidden;
}

.marquee{
  display:flex;
  align-items:center;
  gap:24px;
  animation:scroll 40s linear infinite;
}

.marquee img{
  width:120px;
  border-radius:12px;
}

.parasha-text{
  font-family:"Frank Ruhl Libre",serif;
  font-size:22px;
  white-space:nowrap;
}

@keyframes scroll{
  from{transform:translateX(-100%);}
  to{transform:translateX(100%);}
}

/* פינת דיווחים */
.security{
  position:fixed;
  bottom:16px;
  left:16px;
  width:260px;
  background:rgba(120,0,0,.85);
  padding:12px;
  border:1px solid rgba(255,255,255,.2);
  font-size:13px;
}

.security h3{
  margin:0 0 6px;
  font-size:14px;
}

.security .status{
  color:#9fef9f;
}
</style>
</head>

<body>

<div class="header">
  <h1 id="parashaTitle">פרשת השבוע • יום שבת כ״ד בשבט</h1>
</div>

<div class="marquee-wrap">
  <div class="marquee">
    <img src="aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg">
    <div class="parasha-text" id="parashaText">
      כאן יופיע טקסט הפרשה (טקסט לדוגמה עד חיבור API מלא)
    </div>
  </div>
</div>

<div class="security">
  <h3>פינת דיווחים ביטחוניים</h3>
  <div>ירושלים</div>
  <div class="status">אין התרעות</div>
</div>

</body>
</html>
