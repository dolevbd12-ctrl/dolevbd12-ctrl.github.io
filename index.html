<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>D&R | Official</title>
  
  <link rel="icon" type="image/png" href="./image_2026-03-13_222345060.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== תפריט צף מתוקן ====== */
    .floating-nav {
      position: fixed; top: 0; left: 0; width: 100%; height: 70px;
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 10px 15px; z-index: 2000;
      pointer-events: none;
    }
    @media (min-width: 768px) { .floating-nav { padding: 0 50px; height: 90px; align-items: center; } }
    
    .floating-nav > * { pointer-events: auto; }

    .brand-home {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 6px 12px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; font-size: 0.75rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    @media (min-width: 768px) { .brand-home { padding: 12px 30px; font-size: 1.1rem; } }

    #clock { 
      font-size: 16px; color: var(--gold-bright); font-weight: 900; 
      font-family: 'Cinzel'; text-shadow: 0 0 10px rgba(0,0,0,1);
      margin-top: 5px;
    }
    @media (min-width: 768px) { 
        #clock { font-size: 24px; position: absolute; left: 50%; transform: translateX(-50%); margin-top: 0; } 
    }
    
    .nav-links { display: flex; gap: 5px; flex-shrink: 0; }
    @media (min-width: 768px) { .nav-links { gap: 15px; } }

    .nav-btn {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 6px 10px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; font-size: 0.65rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    @media (min-width: 768px) { .nav-btn { padding: 10px 28px; font-size: 0.9rem; } }

    /* ====== HERO HOME ====== */
    .hero-section { height: 200vh; width: 100%; position: relative; }
    .hero-sticky-box {
      position: sticky; top: 0; height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    .parasha-float {
      font-family: 'Cinzel'; font-size: 1.2rem; color: var(--gold);
      letter-spacing: 5px; margin-bottom: 40px; white-space: nowrap;
      will-change: transform; opacity: 0.8;
    }
    @media (min-width: 768px) { .parasha-float { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 20px; } }

    .scrolling-name {
      font-size: 18vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 1px var(--gold); font-family: 'Inter';
      text-transform: uppercase; white-space: nowrap; will-change: transform;
      line-height: 1;
    }
    @media (min-width: 768px) { .scrolling-name { font-size: 10vw; -webkit-text-stroke: 1.5px var(--gold); } }

    .reveal-group {
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none; padding: 0 20px; text-align: center;
      margin-top: 40px;
    }
    .reveal-group.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .established-text {
      font-family: 'Cinzel'; font-size: 1rem; color: var(--gold);
      letter-spacing: 5px; margin-bottom: 20px; opacity: 0.9;
    }
    @media (min-width: 768px) { .established-text { font-size: 1.5rem; letter-spacing: 10px; } }

    /* ====== GALLERY ====== */
    .gallery-zone { background: var(--bg-dark); padding: 40px 10px; }
    .gallery-grid {
      display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1400px; margin: 0 auto;
    }
    @media (min-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    
    .card { height: 400px; border: 1px solid #222; background-size: cover; background-position: center; border-radius: 8px; }

    /* ====== LOADER ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark);
    }
    .dr-bounce { font-size: 3rem; color: var(--gold); animation: bnc 1.5s infinite; font-family: 'Inter'; font-weight: 900; }
    @keyframes bnc { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .page { display: none; opacity: 0; transition: opacity 0.6s; }
    .page.active { display: block; opacity: 1; }
  </style>
</head>
<body onload="init()">

  <div id="loader-main"><div class="dr-bounce">D&R</div></div>

  <nav class="floating-nav">
    <button class="brand-home" onclick="navigateTo('/')">D&R</button>
    <div id="clock">00:00:00</div>
    <div class="nav-links">
      <button class="nav-btn" onclick="navigateTo('/history')">היסטוריה</button>
      <button class="nav-btn" onclick="navigateTo('/films')">סרטים</button>
    </div>
  </nav>

  <div id="page-home" class="page">
    <section class="hero-section">
      <div class="hero-sticky-box">
        <div class="parasha-float" id="parasha-text">פרשת כי תשא</div>
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <div class="reveal-group" id="reveal-elements">
          <div class="established-text">ESTABLISHED 2026</div>
          <button class="medieval-btn" style="font-family:'Cinzel'; background:var(--gold); border:none; padding:12px 30px; font-weight:900; cursor:pointer;" onclick="document.getElementById('gallery-zone').scrollIntoView({behavior: 'smooth'})">בואו נתחיל</button>
        </div>
      </div>
    </section>
    <div id="gallery-zone" class="gallery-zone">
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="page-history" class="page" style="padding-top:100px; text-align:center;"><h1>HISTORY</h1></div>
  <div id="page-films" class="page" style="padding-top:100px; text-align:center;"><h1>FILMS</h1></div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 500);
      }, 1000);
      updateClock();
      handleRoute(window.location.pathname);
    }

    function navigateTo(path) {
      window.history.pushState({}, "", path);
      handleRoute(path);
      window.scrollTo(0, 0);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
      let id = 'page-home';
      if(path.includes('history')) id = 'page-history';
      if(path.includes('films')) id = 'page-films';
      const target = document.getElementById(id);
      target.style.display = 'block';
      setTimeout(() => target.classList.add('active'), 50);
    }

    window.addEventListener('scroll', () => {
      const home = document.getElementById('page-home');
      if(home.style.display !== 'none') {
        const scroll = window.scrollY;
        const height = window.innerHeight;
        const progress = Math.min(scroll / height, 1);
        
        // תנועה עדינה יותר למובייל
        const factor = window.innerWidth < 768 ? 60 : 100;
        
        document.getElementById('main-name').style.transform = `translateX(${50 - (progress * factor)}%)`;
        document.getElementById('parasha-text').style.transform = `translateX(${-50 + (progress * factor)}%)`;
        
        if (progress > 0.2) {
          document.getElementById('main-name').style.color = `rgba(197, 160, 89, ${progress})`;
        }
        if (progress > 0.8) {
          document.getElementById('reveal-elements').classList.add('show');
        } else {
          document.getElementById('reveal-elements').classList.remove('show');
        }
      }
    });

    function updateClock() {
      setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL', {hour12: false});
      }, 1000);
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];
    const container = document.getElementById('gallery');
    if(container) {
        images.forEach(src => {
          const div = document.createElement('div');
          div.className = 'card';
          div.style.backgroundImage = `url('${src}')`;
          container.appendChild(div);
        });
    }
  </script>
</body>
</html>
