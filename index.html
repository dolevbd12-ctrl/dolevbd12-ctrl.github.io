<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | R&D</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Assistant:wght@300;400;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --gold-bright: #f1d592;
      --bg-dark: #050505;
      --header-bg: rgba(255, 255, 255, 0.12); 
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Assistant', sans-serif; 
      background: var(--bg-dark); color: white; overflow-x: hidden; 
    }

    /* ====== HEADER (Sticky & Separate) ====== */
    .header {
      position: sticky; top: 0;
      width: 100%; height: 90px;
      background: var(--header-bg); backdrop-filter: blur(25px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 50px; z-index: 1000; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    #clock { font-size: 22px; color: var(--gold-bright); font-weight: 900; font-family: 'Cinzel'; }
    
    .nav-links { display: flex; gap: 15px; }
    .nav-btn {
      color: #000; font-family: 'Cinzel'; font-weight: 900;
      padding: 10px 28px; border-radius: 50px;
      background: linear-gradient(135deg, #fff, var(--gold-bright));
      border: none; cursor: pointer; transition: 0.3s; font-size: 0.8rem;
    }
    .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ====== PAGES ====== */
    .page { display: none; opacity: 0; transition: opacity 0.6s ease; }
    .page.active { display: block; opacity: 1; }

    /* ====== HERO HOME ====== */
    .hero-section { height: 180vh; width: 100%; position: relative; }
    .hero-sticky-box {
      position: sticky; top: 90px; height: calc(100vh - 90px);
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    .scrolling-name {
      font-size: 10vw; font-weight: 900; color: transparent; 
      -webkit-text-stroke: 1.2px var(--gold); font-family: 'Inter';
      text-transform: uppercase; white-space: nowrap; will-change: transform;
    }

    .medieval-btn {
      margin-top: 30px; font-family: 'Cinzel'; background: linear-gradient(135deg, var(--gold), #8a6d3b);
      color: black; padding: 15px 45px; border: none; font-weight: 900;
      font-size: 1.1rem; cursor: pointer; transition: 0.3s;
    }

    /* ====== GALLERY ====== */
    .gallery-zone { background: var(--bg-dark); padding: 80px 20px; }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px; max-width: 1400px; margin: 0 auto;
    }
    .card { height: 500px; border: 1px solid #1a1a1a; background-size: cover; background-position: center; transition: 0.4s; }
    .card:hover { border-color: var(--gold); }

    /* ====== INTERNAL CONTENT (CLEAN STYLE) ====== */
    .content-container { 
        padding: 120px 10%; text-align: center; min-height: calc(100vh - 90px); 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .content-container h2 { font-size: 4.5rem; font-family: 'Cinzel'; color: var(--gold-bright); margin: 0; letter-spacing: 8px; }
    .content-container .divider { width: 60px; height: 3px; background: var(--gold); margin: 25px 0; }
    .content-container p { font-size: 1.1rem; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }

    /* ====== LOADER ====== */
    #loader-main {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 9999;
      background: var(--bg-dark); transition: 0.5s;
    }
    .dr-bounce { font-size: 4rem; font-weight: 900; color: var(--gold); animation: bnc 1.5s infinite; font-family: 'Inter'; }
    @keyframes bnc { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</head>
<body onload="init()">

  <div id="loader-main"><div class="dr-bounce">D&R</div></div>

  <header class="header">
    <div class="header-left"><div id="clock">00:00:00</div></div>
    <div class="nav-links">
      <button class="nav-btn" onclick="navigateTo('/')">HOME</button>
      <button class="nav-btn" onclick="navigateTo('/history')">HISTORY</button>
      <button class="nav-btn" onclick="navigateTo('/films')">FILMS</button>
    </div>
  </header>

  <div id="page-home" class="page">
    <section class="hero-section">
      <div class="hero-sticky-box">
        <h1 class="scrolling-name" id="main-name">DOLEV & ROEE</h1>
        <button class="medieval-btn" onclick="document.getElementById('gallery-zone').scrollIntoView({behavior: 'smooth'})">ENTER GALLERY</button>
      </div>
    </section>
    <div id="gallery-zone" class="gallery-zone">
      <div class="gallery-grid" id="gallery"></div>
    </div>
  </div>

  <div id="page-history" class="page">
    <div class="content-container">
      <h2>HISTORY</h2>
      <div class="divider"></div>
      <p>ESTABLISHED MMXXVI — R&D ARCHIVE</p>
    </div>
  </div>

  <div id="page-films" class="page">
    <div class="content-container">
      <h2>FILMS</h2>
      <div class="divider"></div>
      <p>VISUAL PRODUCTIONS — COMING SOON</p>
    </div>
  </div>

  <script>
    function init() {
      setTimeout(() => {
        document.getElementById('loader-main').style.opacity = '0';
        setTimeout(() => document.getElementById('loader-main').style.display = 'none', 500);
      }, 1000);
      updateClock();
      
      // תמיכה בניווט
      window.onpopstate = () => handleRoute(window.location.pathname);
      handleRoute(window.location.pathname);
    }

    function navigateTo(path) {
      if (window.location.pathname === path) return;
      window.history.pushState({}, "", path);
      handleRoute(path);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => {
          p.classList.remove('active');
          p.style.display = 'none';
      });

      let target = 'page-home';
      if (path === '/history') target = 'page-history';
      else if (path === '/films') target = 'page-films';
      
      const p = document.getElementById(target);
      p.style.display = 'block';
      setTimeout(() => p.classList.add('active'), 50);
      window.scrollTo(0, 0);
    }

    window.addEventListener('scroll', () => {
      if(document.getElementById('page-home').classList.contains('active')) {
        const scrollPos = window.scrollY;
        const winHeight = window.innerHeight;
        const name = document.getElementById('main-name');
        const progress = Math.min(scrollPos / winHeight, 1.2);
        
        const xPos = 50 - (progress * 100); 
        name.style.transform = `translateX(${xPos}%)`;
        
        if (progress > 0.3) {
          name.style.color = `rgba(197, 160, 89, ${progress - 0.3})`;
        } else {
          name.style.color = 'transparent';
        }
      }
    });

    function updateClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', {hour12: false});
      }, 1000);
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];
    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.backgroundImage = `url('${src}')`;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
