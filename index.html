<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059; /* צבע זהב אלגנטי במקום ירוק */
      --text-main: #f8f8f8;
      --bg-dark: #121212;
      --purple-page: #2e1a47; /* סגול להיסטוריה */
      --blue-page: #1a2a47;   /* כחול לאודות */
    }

    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); transition: background 0.5s ease; }

    /* ====== Header אלגנטי עם מסגרות ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }

    .header-left { order: 1; font-size: 13px; letter-spacing: 1px; }
    #clock { font-weight: 700; font-size: 18px; color: var(--gold); display: block; }

    .header-center { order: 2; font-family: 'Frank Ruhl Libre', serif; color: var(--gold); font-size: 1.5rem; font-weight: 700; }

    .header-right { order: 3; display: flex; gap: 15px; }

    /* מסגרות על כפתורי הניווט */
    .nav-btn {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 18px;
      border: 1px solid var(--gold); /* המסגרת שביקשת */
      border-radius: 4px;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .nav-btn:hover {
      background: var(--gold);
      color: black;
    }

    /* ====== דפי תוכן ====== */
    .page { display: none; min-height: 100vh; padding-top: 120px; text-align: center; animation: fadeIn 0.6s ease; }
    .page.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* דף הבית עם התמונה */
    #main {
      padding-top: 0;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover;
      background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* דף היסטוריה - סגול */
    #history { background: radial-gradient(circle, var(--purple-page) 0%, #121212 100%); }
    
    /* דף אודות - כחול */
    #about { background: radial-gradient(circle, var(--blue-page) 0%, #121212 100%); }

    /* דף כיף */
    #fun { background: radial-gradient(circle, #1a3a2a 0%, #121212 100%); }

    .quote-box {
      max-width: 700px;
      border: 1px solid rgba(197, 160, 89, 0.3);
      padding: 40px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
    }

    .quote { font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; margin-bottom: 20px; line-height: 1.2; }
    
    .big-num { font-size: 10rem; font-weight: 900; color: var(--gold); opacity: 0.6; margin: 20px 0; font-family: 'Frank Ruhl Libre', serif; }

    /* התראות פיקוד העורף - עכשיו מעוצבות באלגנטיות */
    #alert-banner {
      display: none;
      position: fixed; top: 80px; left: 0; right: 0;
      background: #8b0000; color: white;
      padding: 12px; text-align: center; font-weight: 700; z-index: 2000;
      border-bottom: 2px solid white;
    }
  </style>
</head>
<body>

  <div id="alert-banner">⚠️ צבע אדום: <span id="alert-locations"></span></div>

  <header class="header">
    <div class="header-left">
      <span id="clock">00:00:00</span>
      <span id="full-date" style="opacity: 0.6;"></span>
    </div>
    
    <div class="header-center" id="parasha">טוען פרשה...</div>
    
    <div class="header-right">
      <a class="nav-btn" onclick="show('history')">היסטוריה</a>
      <a class="nav-btn" onclick="show('about')">אודות</a>
      <a class="nav-btn" onclick="show('main')">דף הבית</a>
    </div>
  </header>

  <div id="main" class="page active">
    <div class="quote-box">
      <div class="quote">"העוצמה היא המפתח לקיום."</div>
      <div style="font-size: 1.2rem; font-style: italic; color: var(--gold);">- בנימין נתניהו</div>
      <button class="nav-btn" style="margin-top: 30px; padding: 15px 40px;" onclick="show('fun')">מוכנים לצלול לכיף?</button>
    </div>
  </div>

  <div id="history" class="page">
    <div class="big-num">6767</div>
    <h1 style="font-family: 'Frank Ruhl Libre', serif;">היסטוריה</h1>
    <p style="font-size: 1.2rem; opacity: 0.8;">כרונולוגיה של עוצמה ואלגנטיות</p>
  </div>

  <div id="about" class="page">
    <div class="big-num">55655</div>
    <h1 style="font-family: 'Frank Ruhl Libre', serif;">אודותינו</h1>
    <p style="font-size: 1.2rem; opacity: 0.8;">דולב ורועי - החזון שמאחורי האתר</p>
  </div>

  <div id="fun" class="page">
    <h1 style="color: var(--gold); font-size: 3rem;">צוללים לכיף</h1>
    <div style="font-size: 5rem; font-family: 'Frank Ruhl Libre', serif; letter-spacing: 20px; margin-top: 50px;">2, 3, 5</div>
    <button class="nav-btn" style="margin-top: 50px;" onclick="show('main')">חזרה למסך הראשי</button>
  </div>

  <script>
    function show(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // עדכון זמן
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL');
      document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', {day: 'numeric', month: 'long', year: 'numeric'});
    }, 1000);

    // פיקוד העורף - נשאר אוטומטי
    async function checkAlerts() {
      try {
        const r = await fetch('https://www.oref.org.il/WarningMessages/alert/alerts.json');
        const d = await r.json();
        const b = document.getElementById('alert-banner');
        if (d && d.data) {
          document.getElementById('alert-locations').textContent = d.data.join(', ');
          b.style.display = 'block';
        } else { b.style.display = 'none'; }
      } catch(e) {}
    }
    setInterval(checkAlerts, 4000);

    // פרשה
    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });
  </script>
</body>
</html>
