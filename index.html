<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@900&family=Rubik:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #041f12;
      --ok: #24d18a;
      --text: #ffffff;
    }

    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Rubik', sans-serif; background: var(--bg-dark); color: var(--text); overflow-x: hidden; }

    /* Header */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 70px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 25px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* שמאל: זמן ותאריך */
    .header-left { order: 1; display: flex; flex-direction: column; align-items: flex-start; font-size: 13px; min-width: 120px; }
    #clock { font-weight: bold; font-size: 16px; color: var(--ok); }
    #full-date { opacity: 0.8; }

    /* אמצע: פרשה */
    .header-center { order: 2; font-family: 'Frank Ruhl Libre', serif; color: var(--ok); font-size: 1.3rem; text-align: center; flex-grow: 1; }

    /* ימין: קישורים */
    .header-right { order: 3; display: flex; gap: 20px; min-width: 150px; justify-content: flex-end; }
    .header-right a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .header-right a:hover { color: var(--ok); }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('./image_2026-03-13_222345060.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      text-align: center;
    }

    .quote-box { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 20px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }
    .quote { font-family: 'Frank Ruhl Libre', serif; font-size: clamp(1.5rem, 5vw, 3.5rem); line-height: 1.2; }
    .btn { margin-top: 25px; padding: 12px 40px; border: 2px solid var(--ok); background: var(--ok); color: black; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
    .btn:hover { background: transparent; color: var(--ok); }

    /* Pages */
    .page { display: none; min-height: 100vh; padding-top: 100px; text-align: center; background: radial-gradient(circle at center, #06301c, #041f12); }
    .page.active { display: block; }
    .big-num { font-size: clamp(5rem, 15vw, 10rem); font-weight: 900; color: var(--ok); text-shadow: 0 0 30px rgba(36,209,138,0.4); margin: 40px 0; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date">טוען תאריך...</div>
    </div>
    
    <div class="header-center" id="parasha">טוען פרשה...</div>
    
    <div class="header-right">
      <a onclick="show('history')">היסטוריה</a>
      <a onclick="show('about')">אודות</a>
      <a onclick="show('main')">דף הבית</a>
    </div>
  </header>

  <div id="main" class="page active" style="padding-top:0;">
    <section class="hero">
      <div class="quote-box">
        <div class="quote">"העוצמה היא המפתח לקיום,<br>והעוצמה היא המפתח לשלום."</div>
        <div style="margin-top:15px; font-size: 1.2rem; opacity: 0.9;">- בנימין נתניהו</div>
        <button class="btn" onclick="show('about')">גלו מי אנחנו</button>
      </div>
    </section>
  </div>

  <div id="history" class="page">
    <div class="big-num">6767</div>
    <h1 style="color:var(--ok)">היסטוריה</h1>
    <p>ברוכים הבאים לדף ההיסטוריה של האתר</p>
  </div>

  <div id="about" class="page">
    <div class="big-num">55655</div>
    <h1 style="color:var(--ok)">אודותנו</h1>
    <p>כאן תוכלו למצוא מידע על דולב ורועי</p>
  </div>

  <script>
    // פונקציית ניווט
    function show(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    // עדכון זמן ותאריך
    function updateDateTime() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL');
      
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', options);
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // משיכת פרשת השבוע
    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json())
      .then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      })
      .catch(() => { document.getElementById('parasha').textContent = "פרשת השבוע"; });
  </script>
</body>
</html>
