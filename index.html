<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <title>D&R | Official</title>
  
  <link rel="icon" type="image/png" href="./image_2026-03-13_222345060.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Assistant:wght@300;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root { --gold: #c5a059; --bg: #050505; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Assistant', sans-serif; overflow-x: hidden; }

    /* תפריט עליון - נקי ומסודר */
    .nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 5000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px; pointer-events: none;
    }
    .nav > * { pointer-events: auto; }
    
    .btn {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border: 1px solid rgba(197, 160, 89, 0.3); color: var(--gold);
      padding: 8px 15px; border-radius: 4px; font-family: 'Cinzel';
      font-size: 0.7rem; cursor: pointer; text-transform: uppercase;
    }

    #clock { font-family: 'Cinzel'; font-size: 14px; color: var(--gold); letter-spacing: 2px; }

    /* דפים */
    .page { display: none; opacity: 0; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); width: 100%; }
    .page.active { display: block; opacity: 1; }

    /* הירו - סטייל לקלר */
    .hero-container { height: 250vh; background: var(--bg); }
    .hero-sticky {
      position: sticky; top: 0; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png') center/cover;
    }

    .parasha { font-family: 'Cinzel'; color: var(--gold); font-size: 1.2rem; letter-spacing: 6px; margin-bottom: 20px; z-index: 2; }

    /* האנימציה המבוקשת */
    .main-title {
      font-family: 'Inter'; font-size: 20vw; line-height: 0.8;
      text-align: center; white-space: nowrap; will-change: transform, opacity;
      -webkit-text-stroke: 1px var(--gold); color: transparent;
      transition: color 0.3s; z-index: 1;
    }

    .founded {
      position: absolute; bottom: 100px; font-family: 'Cinzel';
      font-size: 0.8rem; color: var(--gold); letter-spacing: 4px; opacity: 0.7;
    }

    /* כפתור צלילה */
    .dive-btn {
      position: absolute; bottom: 40px; border: 1px solid var(--gold);
      padding: 12px 25px; color: var(--gold); font-family: 'Cinzel';
      border-radius: 50px; cursor: pointer; z-index: 10;
      transition: 0.3s; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(197,160,89,0.4);} 70% {box-shadow: 0 0 0 15px rgba(197,160,89,0);} 100% {box-shadow: 0 0 0 0 rgba(197,160,89,0);} }

    /* גלריה */
    .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
    .gallery img { width: 100%; border-radius: 2px; filter: grayscale(0.5); transition: 0.5s; }
    .gallery img:hover { filter: grayscale(0); }
  </style>
</head>
<body onload="init()">

  <nav class="nav">
    <button class="btn" onclick="location.href='/'">HOME</button>
    <div id="clock">00:00:00</div>
    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="navigateTo('/history')">HISTORY</button>
      <button class="btn" onclick="navigateTo('/films')">FILMS</button>
    </div>
  </nav>

  <div id="page-home" class="page">
    <div class="hero-container">
      <div class="hero-sticky">
        <div class="parasha">פרשת כי תשא</div>
        <h1 class="main-title" id="animated-name">DOLEV & ROEE</h1>
        <div class="founded">EST. 2026</div>
        <div class="dive-btn" onclick="document.getElementById('gallery-section').scrollIntoView({behavior:'smooth'})">DIVE IN</div>
      </div>
    </div>
    <div class="gallery" id="gallery-section"></div>
  </div>

  <div id="page-history" class="page" style="padding:150px 20px; text-align:center;">
    <h1 style="font-family:Cinzel; color:var(--gold); font-size:3rem;">HISTORY</h1>
    <p style="letter-spacing:2px; opacity:0.6;">COMING SOON</p>
  </div>

  <div id="page-films" class="page" style="padding:150px 20px; text-align:center;">
    <h1 style="font-family:Cinzel; color:var(--gold); font-size:3rem;">FILMS</h1>
    <p style="letter-spacing:2px; opacity:0.6;">COMING SOON</p>
  </div>

  <script>
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];

    function init() {
      setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL', {hour12:false});
      }, 1000);

      const gal = document.getElementById('gallery-section');
      images.forEach(s => {
        const i = document.createElement('img');
        i.src = s;
        gal.appendChild(i);
      });

      handleRoute(window.location.pathname);
    }

    function navigateTo(path) {
      window.history.pushState({}, "", path);
      handleRoute(path);
      window.scrollTo(0,0);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
      let id = 'page-home';
      if(path.includes('history')) id = 'page-history';
      if(path.includes('films')) id = 'page-films';
      const target = document.getElementById(id);
      target.style.display = 'block';
      setTimeout(() => target.classList.add('active'), 50);
    }

    // הלוגיקה של לקלר - אנימציית טקסט מורכבת
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const winH = window.innerHeight;
      const progress = Math.min(scrollY / winH, 1.2);
      
      const name = document.getElementById('animated-name');
      
      // תזוזה הצידה + הגדלה + שינוי צבע
      const xPos = 50 - (progress * 130); 
      name.style.transform = `translateX(${xPos}%) scale(${1 + progress * 0.5})`;
      
      if (progress > 0.5) {
        name.style.color = 'var(--gold)';
        name.style.webkitTextStroke = '0px';
      } else {
        name.style.color = 'transparent';
        name.style.webkitTextStroke = '1px var(--gold)';
      }
    });

    window.onpopstate = () => handleRoute(window.location.pathname);
  </script>
</body>
</html>
