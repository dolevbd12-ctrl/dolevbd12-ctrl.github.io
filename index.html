<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>דולב ורועי</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg">
  <link rel="apple-touch-icon" href="/aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg">

  <!-- פונט תנכ"י -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }
    body{
      background: radial-gradient(circle at top, #1b2a4a 0%, #0b1020 60%, #060814 100%);
      font-family: "Frank Ruhl Libre", "SBL Hebrew", David, "Times New Roman", serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* לוגו בפינה */
    .logo{
      position: fixed;
      top: 18px;
      left: 18px;            /* הלוגו נשאר משמאל כמו אצלך */
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 6px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      z-index: 20;
    }

    /* פס עליון שמכיל טקסט רץ (ימין->שמאל) */
    .topTicker{
      position: fixed;
      top: 18px;
      left: 130px;          /* מתחיל אחרי הלוגו */
      right: 18px;
      height: 44px;
      display: flex;
      align-items: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      overflow: hidden;
      z-index: 15;
    }

    /* התוכן שרץ */
    .marquee{
      display: inline-block;
      white-space: nowrap;
      padding-right: 100%;   /* נותן “מרווח כניסה” */
      animation: marqueeRTL 18s linear infinite;
      font-family: Arial, sans-serif; /* טיקר יותר קריא */
      font-size: 16px;
      color: rgba(255,255,255,0.85);
    }

    /* אנימציה: נכנס מימין ויוצא משמאל */
    @keyframes marqueeRTL{
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* מרכז המסך */
    .wrap{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 150px 18px 40px; /* מקום ללוגו+טיקר */
      box-sizing: border-box;
    }

    .card{
      width: min(980px, 94vw);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    /* אזור כותרת עם אנימציית “ירידה” עדינה */
    .headerZone{
      position: relative;
      height: 140px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .headerDrop{
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: -130px; /* מתחיל מעל */
      width: min(900px, 90vw);
      text-align: center;
      padding: 18px 14px 10px;
      animation: dropDown 10s ease-in-out infinite;
    }

    @keyframes dropDown{
      0%   { top: -130px; opacity: 0; }
      16%  { top: 16px; opacity: 1; }
      65%  { top: 60px; opacity: 1; }
      100% { top: -130px; opacity: 0; }
    }

    .label{
      font-size: 14px;
      color: rgba(255,255,255,0.70);
      margin: 0 0 8px;
      font-family: Arial, sans-serif;
    }

    h1{
      margin: 0;
      color: #1e90ff;
      font-size: clamp(28px, 5vw, 58px);
      font-weight: 900;
      line-height: 1.15;
      text-shadow: 0 6px 18px rgba(0,0,0,0.6);
    }

    .dateLine{
      margin-top: 8px;
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      font-family: Arial, sans-serif;
    }

    /* טקסט הפרשה */
    .content{
      padding: 18px 18px 22px;
    }

    .parshaTextBox{
      margin-top: 10px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 16px;
      max-height: min(58vh, 520px);
      overflow: auto;
      line-height: 1.9;
      font-size: 18px;
      color: rgba(255,255,255,0.92);
    }

    .parshaTextBox p{
      margin: 0 0 14px;
    }

    /* הודעת שגיאה */
    .status{
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.22);
      color: rgba(255,255,255,0.90);
      font-family: Arial, sans-serif;
      display: none;
    }

    /* נגישות */
    @media (prefers-reduced-motion: reduce){
      .headerDrop{ animation: none; top: 18px; opacity: 1; }
      .marquee{ animation: none; padding-right: 0; }
    }
  </style>
</head>

<body>
  <img class="logo"
       src="aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg"
       alt="לוגו" />

  <!-- שורת טיקר (רץ מימין לשמאל) -->
  <div class="topTicker" aria-label="טקסט רץ">
    <div id="marquee" class="marquee">טוען פרשת השבוע…</div>
  </div>

  <div class="wrap">
    <div class="card" aria-live="polite">
      <div class="headerZone">
        <div id="headerDrop" class="headerDrop">
          <p class="label">פרשת השבוע</p>
          <h1 id="parshaName">טוען…</h1>
          <div id="parshaDate" class="dateLine"></div>
        </div>
      </div>

      <div class="content">
        <div id="parshaText" class="parshaTextBox">טוען את טקסט הפרשה…</div>
        <div id="status" class="status"></div>
      </div>
    </div>
  </div>

  <script>
    /**
     * זרימה:
     * 1) Hebcal -> מביא שם פרשה (עברית + אנגלית) + תאריך שבת
     * 2) Sefaria "next-read" לפי שם הפרשה באנגלית -> מביא רפרנסים לעליות
     * 3) Sefaria "texts" -> שולף טקסט עברי לכל רפרנס ומציג
     */

    const elName   = document.getElementById("parshaName");
    const elDate   = document.getElementById("parshaDate");
    const elText   = document.getElementById("parshaText");
    const elStatus = document.getElementById("status");
    const elMarq   = document.getElementById("marquee");

    // ירושלים (לא חובה, אבל נח ל-Hebcal)
    const GEO = { geo: "geoname", geonameid: 281184 };

    function showError(msg){
      elStatus.textContent = msg;
      elStatus.style.display = "block";
    }
    function clearError(){
      elStatus.textContent = "";
      elStatus.style.display = "none";
    }

    function hebcalUrl(){
      const url = new URL("https://www.hebcal.com/shabbat/");
      url.searchParams.set("cfg", "json");
      url.searchParams.set("geo", GEO.geo);
      url.searchParams.set("geonameid", String(GEO.geonameid));
      // leyning=on הוא ברירת מחדל, אבל נשאיר פשוט
      return url.toString();
    }

    function formatDateHe(dateIso){
      if(!dateIso) return "";
      const d = new Date(dateIso);
      if(Number.isNaN(d.getTime())) return "";
      return new Intl.DateTimeFormat("he-IL", {
        weekday: "long", year: "numeric", month: "long", day: "numeric"
      }).format(d);
    }

    function extractParshaFromHebcal(data){
      const items = Array.isArray(data?.items) ? data.items : [];
      const it = items.find(x => x?.category === "parashat");
      if(!it) return null;

      return {
        hebrewName: it.hebrew || null,    // שם בעברית (כמעט תמיד קיים)
        title: it.title || null,          // "Parashat Noach" וכו'
        dateIso: it.date || null
      };
    }

    // מנקה "Parashat " משם אנגלי כדי להתאים לספריה
    function cleanEnglishParasha(title){
      if(!title) return null;
      return String(title).replace(/^Parashat\s+/i, "").trim();
    }

    // Sefaria: next-read/{parasha} (לפי תיעוד)
    function sefariaNextReadUrl(parashaEn){
      // חשוב: encode בשביל רווחים/תווים
      return "https://www.sefaria.org/api/calendars/next-read/" + encodeURIComponent(parashaEn);
    }

    // Sefaria: texts endpoint v1 (פשוט) עם context=0 כדי לקבל רק הקטע
    function sefariaTextsUrl(tref){
      const url = new URL("https://www.sefaria.org/api/texts/" + encodeURIComponent(tref));
      url.searchParams.set("lang", "he");
      url.searchParams.set("context", "0");
      return url.toString();
    }

    // מנסה לחלץ רפרנסים לעליות ממבנה שיכול להשתנות
    function getAliyotRefs(nextReadJson){
      // הרבה פעמים זה יושב ב nextReadJson.readings.torah
      const torah = nextReadJson?.readings?.torah || nextReadJson?.torah || null;
      if(!torah) return [];

      // torah יכול להיות מערך של אובייקטים עם ref, או אובייקט שמכיל aliyot
      if(Array.isArray(torah)){
        return torah.map(x => x?.ref).filter(Boolean);
      }

      if(Array.isArray(torah?.aliyot)){
        return torah.aliyot.map(x => x?.ref || x).filter(Boolean);
      }

      // fallback: חפש כל שדה שמכיל "ref"
      const refs = [];
      for(const k of Object.keys(torah)){
        const v = torah[k];
        if(Array.isArray(v)){
          v.forEach(item => {
            if(typeof item === "string") refs.push(item);
            else if(item?.ref) refs.push(item.ref);
          });
        } else if(v?.ref){
          refs.push(v.ref);
        }
      }
      return refs.filter(Boolean);
    }

    // מקבל טקסט עברי מ-Sefaria ומחזיר כמחרוזת
    function normalizeSefariaHebrewText(textJson){
      // לרוב זה מערך של פסוקים ב textJson.he
      const he = textJson?.he;
      if(Array.isArray(he)){
        // לפעמים זה מערך של פסוקים (strings)
        return he.filter(Boolean).join(" ");
      }
      if(typeof he === "string"){
        return he;
      }
      // fallback
      const t = textJson?.text;
      if(Array.isArray(t)) return t.join(" ");
      if(typeof t === "string") return t;
      return "";
    }

    async function loadParshaAndText(){
      clearError();
      elName.textContent = "טוען…";
      elDate.textContent = "";
      elText.textContent = "טוען את טקסט הפרשה…";
      elMarq.textContent = "טוען פרשת השבוע…";

      try{
        // 1) Hebcal
        const hebRes = await fetch(hebcalUrl(), { cache: "no-store" });
        if(!hebRes.ok) throw new Error("Hebcal HTTP " + hebRes.status);
        const hebJson = await hebRes.json();

        const p = extractParshaFromHebcal(hebJson);
        if(!p) throw new Error("No parasha in Hebcal response");

        const parashaEn = cleanEnglishParasha(p.title);
        const parashaHe = (p.hebrewName || "").replace(/^פרשת\s*/i, "").trim() || "פרשת השבוע";

        elName.textContent = parashaHe;
        elDate.textContent = formatDateHe(p.dateIso);

        // טקסט רץ למעלה (מימין לשמאל)
        elMarq.textContent = "פרשת השבוע: " + parashaHe + "  •  " + (elDate.textContent || "");

        if(!parashaEn){
          elText.textContent = "לא נמצא שם פרשה באנגלית כדי להביא טקסט מלא.";
          return;
        }

        // 2) Sefaria next-read
        const nrRes = await fetch(sefariaNextReadUrl(parashaEn), { cache: "no-store" });
        if(!nrRes.ok) throw new Error("Sefaria next-read HTTP " + nrRes.status);
        const nrJson = await nrRes.json();

        const refs = getAliyotRefs(nrJson);
        if(!refs.length){
          elText.textContent = "לא הצלחתי למצוא רפרנסים לעליות בספריה עבור הפרשה הזו.";
          return;
        }

        // 3) משיכת טקסט לכל עלייה והצגה כפסקאות
        const paragraphs = [];
        for(let i = 0; i < refs.length; i++){
          const tref = refs[i];
          try{
            const tRes = await fetch(sefariaTextsUrl(tref), { cache: "no-store" });
            if(!tRes.ok) throw new Error("texts HTTP " + tRes.status);
            const tJson = await tRes.json();

            const hebText = normalizeSefariaHebrewText(tJson);
            if(hebText){
              paragraphs.push(`עלייה ${i+1}: ${hebText}`);
            }
          } catch(e){
            // אם עלייה אחת נופלת – ממשיכים
            paragraphs.push(`עלייה ${i+1}: (לא הצלחתי לטעון את הטקסט)`);
          }
        }

        // מציגים יפה כ-p
        elText.innerHTML = paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join("");

      } catch(err){
        console.error(err);
        showError("יש בעיה בטעינה (אינטרנט/חסימה/שרת). נסה לרענן את הדף.");
        elText.textContent = "לא הצלחתי לטעון את טקסט הפרשה כרגע.";
      }
    }

    // אבטחה בסיסית כדי שלא נזריק HTML בטעות
    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // טוען עכשיו + מרענן כל 6 שעות
    loadParshaAndText();
    setInterval(loadParshaAndText, 6 * 60 * 60 * 1000);
  </script>
</body>
</html>
