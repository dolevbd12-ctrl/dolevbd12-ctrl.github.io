<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>פרשת השבוע</title>

<link rel="icon" type="image/jpeg" href="/aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg">

<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=IBM+Plex+Sans+Hebrew:wght@400;600;700&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">

<style>
  html,body{height:100%; margin:0;}
  body{
    /* ✅ רקע ירוק */
    background: radial-gradient(circle at top, #0f5a27 0%, #073216 55%, #03180a 100%);
    font-family:"IBM Plex Sans Hebrew",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
    overflow:hidden;
    color:#fff;
  }

  /* HEADER */
  .header{
    position:fixed;
    top:0; left:0; right:0;
    padding:12px 14px;
    background:rgba(0,0,0,.22);
    border-bottom:1px solid rgba(255,255,255,.14);
    backdrop-filter:blur(10px);
    z-index:40;
  }
  .headerRow{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    padding-inline-end:170px; /* מקום לכפתור בצד ימין */
  }
  .badge{
    padding:6px 10px;
    border:1px solid rgba(255,255,255,.18);
    background:rgba(0,0,0,.22);
    display:inline-flex;
    align-items:center;
    gap:8px;
    white-space:nowrap;
  }
  .clock{font-family:"Roboto Mono",monospace}
  .muted{opacity:.92}

  /* ✅ כפתור בימין למעלה מתחת לשבוע טוב */
  .doom{
    position:absolute;
    top:38px;        /* מתחת לשורה של התגיות */
    right:14px;
    z-index:45;

    font-size:16px;
    padding:10px 14px;
    font-weight:900;
    letter-spacing:1px;

    background:rgba(0,0,0,.35);
    color:#fff;
    border:2px solid rgba(0,255,120,.55);
    border-radius:12px;
    cursor:pointer;

    box-shadow:0 0 20px rgba(0,255,120,.25);
    user-select:none;

    opacity:0;
    transform:translateY(-6px);
    transition:opacity .5s ease, transform .5s ease;
  }
  .doom.show{
    opacity:1;
    transform:translateY(0);
  }

  /* מצב "טעית" מפחיד ומהבהב */
  .doom.triggered{
    border-color:rgba(255,60,60,.95);
    box-shadow:0 0 34px rgba(255,0,0,.65);
    animation:doomFlash .14s infinite;
  }
  @keyframes doomFlash{
    0%{ background:#000; color:#fff; transform:translateY(0) scale(1); }
    50%{ background:#a10000; color:#fff; transform:translateY(0) scale(1.03); }
    100%{ background:#000; color:#fff; transform:translateY(0) scale(1); }
  }

  /* MARQUEE */
  .marquee-wrap{
    position:absolute;
    top:86px;
    left:0; right:0;
    height:200px;
    overflow:hidden;
    display:flex;
    align-items:center;
    padding-inline:16px;
    box-sizing:border-box;
    z-index:10;
  }
  .marquee-track{
    display:flex;
    align-items:center;
    will-change:transform;
  }
  .marquee-content{
    display:flex;
    align-items:center;
    white-space:nowrap;
  }
  .marquee-content img{
    width:110px;
    height:110px;
    object-fit:cover;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 12px 34px rgba(0,0,0,.45);
    margin-inline:18px;
    flex:0 0 auto;
  }

  /* ✅ רקע הפרשה ירוק זוהר */
  .parasha-text{
    font-family:"Frank Ruhl Libre",serif;
    font-size:22px;
    line-height:1.4;
    color:#001b0c;

    background:linear-gradient(180deg, rgba(0,255,140,.92), rgba(0,190,95,.92));
    padding:12px 18px;
    border-radius:12px;
    border:1px solid rgba(0,255,140,.55);
    box-shadow:
      0 0 22px rgba(0,255,140,.55),
      0 12px 34px rgba(0,0,0,.25);
    white-space:nowrap;
    overflow:visible;
    text-overflow:unset;
  }

  /* פינת דיווחים */
  .security{
    position:fixed;
    bottom:16px;
    left:16px;
    width:260px;
    background:rgba(120,0,0,.85);
    padding:12px;
    border:1px solid rgba(255,255,255,.2);
    font-size:13px;
    z-index:35;
    border-radius:10px;
    box-shadow:0 12px 34px rgba(0,0,0,.35);
  }
  .security strong{display:block;margin-bottom:6px}
</style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="headerRow">
      <span class="badge" id="greeting">טוען…</span>

      <span class="badge muted">פרשת השבוע: <span id="parashaName">טוען…</span></span>

      <span class="badge clock" id="clock">--:--:--</span>

      <span class="badge muted" id="dates">טוען תאריך…</span>

      <span class="badge clock" id="sinceOct7">מאז 07.10.2023: —</span>

      <!-- ✅ הכפתור עכשיו כאן (ימין למעלה, מתחת לשבוע טוב) -->
      <button class="doom" id="doomBtn">לא ללחוץ</button>
    </div>
  </div>

  <!-- MARQUEE -->
  <div class="marquee-wrap">
    <div class="marquee-track" id="track">
      <div class="marquee-content" id="content">
        <img src="aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg" alt="תמונה">
        <div class="parasha-text" id="parashaText">טוען פרשה…</div>
      </div>
    </div>
  </div>

  <!-- פינה בטחונית -->
  <div class="security">
    <strong>פינת דיווחים ביטחוניים</strong>
    ירושלים<br>
    אין התרעות
  </div>

<script>
  const TZ = "Asia/Jerusalem";

  /* שעה + תאריך עברי/לועזי */
  function tickTopBar(){
    document.getElementById("clock").textContent =
      new Intl.DateTimeFormat("he-IL",{
        timeZone:TZ, hour:"2-digit",minute:"2-digit",second:"2-digit"
      }).format(new Date());

    let heb = "";
    try{
      heb = new Intl.DateTimeFormat("he-IL-u-ca-hebrew",{
        timeZone:TZ, day:"numeric",month:"long",year:"numeric"
      }).format(new Date());
    }catch(e){}

    const greg = new Intl.DateTimeFormat("he-IL",{
      timeZone:TZ, weekday:"long", day:"2-digit",month:"2-digit",year:"numeric"
    }).format(new Date());

    document.getElementById("dates").textContent = heb ? (heb + " • " + greg) : greg;
  }
  setInterval(tickTopBar, 1000);
  tickTopBar();

  /* טיימר מאז 07.10.2023 */
  const startDate = new Date("2023-10-07T00:00:00+03:00");
  function updateSinceOct7(){
    const now = new Date();
    let diff = Math.max(0, now - startDate);

    const days = Math.floor(diff / (1000*60*60*24));
    diff %= (1000*60*60*24);
    const hours = Math.floor(diff / (1000*60*60));
    diff %= (1000*60*60);
    const minutes = Math.floor(diff / (1000*60));
    const seconds = Math.floor((diff % (1000*60)) / 1000);

    document.getElementById("sinceOct7").textContent =
      `מאז 07.10.2023: ${days} ימים ${hours} שעות ${minutes} דקות ${seconds} שנ׳`;
  }
  setInterval(updateSinceOct7, 1000);
  updateSinceOct7();

  /* ✅ מרקיזה “מושלמת” — לא נוגעים במהירות, רק שומרים כמו שזה */
  let x = 0;
  let speed = 0.5; // לא נוגע
  function startMarquee(){
    const track = document.getElementById("track");
    const content = document.getElementById("content");

    // שכפול פעם אחת לריצה רציפה
    track.appendChild(content.cloneNode(true));

    const contentWidth = content.offsetWidth;

    function animate(){
      // הכיוון נשאר כמו שעשינו קודם (הפוך)
      x += speed;
      if (x >= contentWidth) x = 0;
      track.style.transform = `translateX(${x}px)`;
      requestAnimationFrame(animate);
    }
    animate();
  }

  /* טעינת פרשה */
  fetch("https://www.hebcal.com/shabbat?cfg=json&geo=geoname&geonameid=281184")
    .then(r=>r.json())
    .then(data=>{
      const p = (data.items || []).find(i=>i.category==="parashat");
      if(!p) throw new Error("no parasha");

      document.getElementById("parashaName").textContent =
        String(p.hebrew || "").replace("פרשת ","").trim() || "—";

      // שבת שלום/שבוע טוב (פשוט)
      const now = new Date();
      const isSat = new Intl.DateTimeFormat("en-US",{timeZone:TZ, weekday:"short"}).format(now) === "Sat";
      document.getElementById("greeting").textContent = isSat ? "שבת שלום" : "שבוע טוב";

      return fetch(
        "https://www.sefaria.org/api/texts/" +
        encodeURIComponent(p.leyning.torah) +
        "?lang=he&context=0"
      );
    })
    .then(r=>r.json())
    .then(t=>{
      const text = Array.isArray(t.he) ? t.he.join(" ") : (t.he || "");
      document.getElementById("parashaText").textContent = text || "טקסט הפרשה לא זמין כרגע.";
      startMarquee();
    })
    .catch(()=>{
      document.getElementById("greeting").textContent = "שבוע טוב";
      document.getElementById("parashaName").textContent = "—";
      document.getElementById("parashaText").textContent = "שגיאה בטעינה.";
      startMarquee();
    });

  /* ✅ כפתור: פותח חלון חדש + מהבהב "טעית" + מתאפס אחרי 7 שניות */
  const doomBtn = document.getElementById("doomBtn");

  // אם את רוצה שעדיין יופיע באיחור:
  setTimeout(()=> doomBtn.classList.add("show"), 6000);

  let resetTimer = null;

  doomBtn.addEventListener("click", () => {
    // פותחים אתר בחלון חדש
    window.open("https://www.gov.il/he/departments/prime_ministers_office", "_blank", "noopener,noreferrer");

    // הופכים ל"טעית" ומהבהבים
    doomBtn.classList.add("triggered");
    doomBtn.textContent = "טעית";

    // אם לוחצים שוב בזמן שזה פעיל — מאפסים את הטיימר
    if (resetTimer) clearTimeout(resetTimer);

    // מתאפס אחרי 7 שניות
    resetTimer = setTimeout(() => {
      doomBtn.classList.remove("triggered");
      doomBtn.textContent = "לא ללחוץ";
      resetTimer = null;
    }, 7000);
  });
</script>

</body>
</html>
