<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>לוח מצב</title>

<style>
body {
  margin: 0;
  background: #0b1f0b;
  font-family: "Segoe UI", Tahoma, Arial, sans-serif;
  color: #fff;
  overflow: hidden;
}

/* שורה עליונה */
#topBar {
  background: #1f3d1f;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
}

#marqueeWrap {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
}

#parasha {
  display: inline-block;
  padding-right: 100%;
  animation: scrollRTL 18s linear infinite;
  font-weight: bold;
  color: #00ff66;
}

@keyframes scrollRTL {
  from { transform: translateX(0); }
  to   { transform: translateX(-100%); }
}

/* ווידג׳ט ביטחוני */
#securityBox {
  position: fixed;
  bottom: 16px;
  left: 16px;
  background: #2b0000;
  border: 2px solid #ff0000;
  padding: 12px 14px;
  width: 260px;
  font-size: 13px;
}

/* אזעקה */
#alarm {
  position: fixed;
  inset: 0;
  background: rgba(120,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 120px;
  animation: blink 0.5s infinite;
  z-index: 999;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
</style>
</head>

<body>

<div id="topBar">
  <div id="greeting">שבוע טוב</div>
  <div id="marqueeWrap">
    <div id="parasha">טוען פרשת השבוע…</div>
  </div>
</div>

<div id="securityBox">
  <div><b>פינת דיווחים ביטחוניים</b></div>
  <div id="securityStatus">בודק התרעות…</div>
</div>

<div id="alarm">🚨</div>

<script>
/* ====== URL של ה-Worker שלך ====== */
const WORKER_URL = "https://jolly-mode-0a2a.dolevbd12.workers.dev/";

/* ====== פרשת השבוע (דוגמה – כבר עובד אצלך) ====== */
document.getElementById("parasha").textContent =
"פרשת השבוע: וארא – וַיְדַבֵּר אֱלֹהִים אֶל מֹשֶׁה";

/* ====== בדיקת התרעות ====== */
async function checkAlerts() {
  try {
    const res = await fetch(WORKER_URL, { cache: "no-store" });
    const data = await res.json();

    if (!data.data || data.data.length === 0) {
      document.getElementById("securityStatus").textContent = "אין התרעות";
      document.getElementById("alarm").style.display = "none";
      return;
    }

    const jerusalemAlert = data.data.find(a =>
      JSON.stringify(a).includes("ירושלים")
    );

    if (jerusalemAlert) {
      document.getElementById("securityStatus").textContent = "🚨 אזעקה בירושלים!";
      document.getElementById("alarm").style.display = "flex";
    } else {
      document.getElementById("securityStatus").textContent = "אין התרעה בירושלים";
      document.getElementById("alarm").style.display = "none";
    }

  } catch (e) {
    document.getElementById("securityStatus").textContent = "בעיה בקבלת נתונים";
  }
}

checkAlerts();
setInterval(checkAlerts, 15000);
</script>

</body>
</html>
