<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>פרשת השבוע</title>

<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=IBM+Plex+Sans+Hebrew:wght@400;600;700&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#18233f;
  --bg2:#070b18;
  --bar:rgba(180,180,180,.16);
  --barBorder:rgba(255,255,255,.14);
  --parashaText:#000;
  --parashaBg:rgba(255,255,255,.88);
}

html,body{margin:0;height:100%}
body{
  background:radial-gradient(circle at top,var(--bg1),var(--bg2));
  font-family:"IBM Plex Sans Hebrew",sans-serif;
  overflow:hidden;
  color:#fff;
}

/* HEADER */
.header{
  position:fixed;top:0;left:0;right:0;
  padding:12px 14px;
  background:var(--bar);
  border-bottom:1px solid var(--barBorder);
  backdrop-filter:blur(10px);
  z-index:10;
}
.headerRow{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
.badge{
  padding:6px 10px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.18);
}
.clock{font-family:"Roboto Mono",monospace}

/* MARQUEE */
.marquee-wrap{
  position:absolute;
  top:78px;left:0;right:0;bottom:0;
  display:flex;
  align-items:center;
  overflow:hidden;
  padding-inline:16px;
}
.marquee-track{
  display:flex;
  width:max-content;
  animation:scroll 30s linear infinite;
}
.marquee-content{
  display:flex;
  align-items:center;
  gap:18px;
  white-space:nowrap;
}
.marquee-gap{width:80px}

.marquee-content img{
  width:110px;height:110px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.18);
}

.parasha-text{
  font-family:"Frank Ruhl Libre",serif;
  font-size:22px;
  color:var(--parashaText);
  background:var(--parashaBg);
  padding:10px 16px;
  border-radius:10px;
}

@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* SECURITY */
.security{
  position:fixed;
  bottom:16px;
  left:16px;
  width:260px;
  background:rgba(120,0,0,.85);
  padding:12px;
  border:1px solid rgba(255,255,255,.2);
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="headerRow">
    <div class="badge" id="greeting">טוען…</div>
    <div class="badge clock" id="clock">--:--:--</div>
    <div class="badge" id="dates">טוען תאריך…</div>
    <div class="badge">פרשת השבוע: <span id="parashaName">טוען…</span></div>
  </div>
</div>

<div class="marquee-wrap">
  <div class="marquee-track" id="marqueeTrack">
    <div class="marquee-content" id="marqueeContent">
      <img src="aifaceswap-e73ebc78a59843d9ea88bf64b9636a3d.jpg">
      <div class="parasha-text" id="parashaText">טוען את טקסט הפרשה…</div>
      <span class="marquee-gap"></span>
    </div>
    <div class="marquee-content" id="marqueeClone"></div>
  </div>
</div>

<div class="security">
  <strong>פינת דיווחים ביטחוניים</strong><br>
  ירושלים<br>
  אין התרעות
</div>

<script>
const TZ="Asia/Jerusalem";
const GEO={geo:"geoname",geonameid:281184};

const el={
  greeting:document.getElementById("greeting"),
  clock:document.getElementById("clock"),
  dates:document.getElementById("dates"),
  parashaName:document.getElementById("parashaName"),
  parashaText:document.getElementById("parashaText")
};

/* JSONP */
function jsonp(url){
  return new Promise((res,rej)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    const s=document.createElement("script");
    window[cb]=d=>{delete window[cb];s.remove();res(d)};
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    s.onerror=()=>rej();
    document.body.appendChild(s);
  });
}

/* CLOCK + DATES */
function tick(){
  el.clock.textContent=new Intl.DateTimeFormat("he-IL",{timeZone:TZ,hour:"2-digit",minute:"2-digit",second:"2-digit"}).format(new Date());
  const he=new Intl.DateTimeFormat("he-IL-u-ca-hebrew",{timeZone:TZ,day:"numeric",month:"long",year:"numeric"}).format(new Date());
  const gr=new Intl.DateTimeFormat("he-IL",{timeZone:TZ,weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"}).format(new Date());
  el.dates.textContent=he+" • "+gr;
}
setInterval(tick,1000);tick();

/* HEB CAL */
async function loadParasha(){
  try{
    const u=new URL("https://www.hebcal.com/shabbat");
    u.searchParams.set("cfg","json");
    u.searchParams.set("geo",GEO.geo);
    u.searchParams.set("geonameid",GEO.geonameid);
    u.searchParams.set("M","on");
    u.searchParams.set("hdp","1");
    const data=await fetch(u).then(r=>r.json());
    const items=data.items||[];

    const p=items.find(i=>i.category==="parashat");
    const candles=items.find(i=>i.category==="candles");
    const havdalah=items.find(i=>i.category==="havdalah");

    el.parashaName.textContent=p?.hebrew?.replace("פרשת ","")||"—";

    const now=new Date();
    const shabbat=candles&&havdalah&&(now>=new Date(candles.date)&&now<=new Date(havdalah.date));
    el.greeting.textContent=shabbat?"שבת שלום":"שבוע טוב";

    const ref=p?.leyning?.torah;
    if(!ref)return;

    const txt=await jsonp("https://www.sefaria.org/api/texts/"+encodeURIComponent(ref)+"?lang=he&context=0");
    const text=Array.isArray(txt.he)?txt.he.join(" "):txt.he;
    el.parashaText.textContent=text||"לא זמין";

    /* שכפול לריצה רציפה */
    document.getElementById("marqueeClone").innerHTML=
      document.getElementById("marqueeContent").innerHTML;

  }catch(e){
    el.parashaText.textContent="שגיאה בטעינה";
  }
}
loadParasha();
setInterval(loadParasha,6*60*60*1000);
</script>

</body>
</html>
