<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --text-main: #f8f8f8;
      --bg-dark: #121212;
      --purple-page: #2e1a47;
      --blue-page: #1a2a47;
    }

    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); }

    /* ====== Header מתוקן עם פרשה במרכז ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
      display: grid;
      grid-template-columns: 1fr auto 1fr; /* יוצר חלוקה שווה ל-3 חלקים */
      align-items: center;
      padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }

    .header-left { text-align: right; } /* תאריך ושעה בצד אחד */
    #clock { font-weight: 700; font-size: 18px; color: var(--gold); }

    .header-center { 
      font-family: 'Frank Ruhl Libre', serif; 
      color: var(--gold); 
      font-size: 1.6rem; 
      font-weight: 700;
      text-align: center; /* מרכז אמיתי */
    }

    .header-right { 
      display: flex; 
      gap: 12px; 
      justify-content: flex-start; /* כפתורים בצד השני */
    }

    .nav-btn {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 16px;
      border: 1px solid var(--gold);
      border-radius: 4px;
      transition: 0.3s;
      font-size: 14px;
      background: transparent;
    }

    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== דפי תוכן ====== */
    .page { display: none; min-height: 100vh; padding-top: 100px; text-align: center; box-sizing: border-box; }
    .page.active { display: block; }

    /* דף הבית */
    #main {
      padding-top: 0;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover;
      background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* צבעים ייחודיים לכל עמוד */
    #history { background: radial-gradient(circle, var(--purple-page) 0%, #0c0c0c 100%); }
    #about { background: radial-gradient(circle, var(--blue-page) 0%, #0c0c0c 100%); }
    #fun { background: radial-gradient(circle, #1a3a2a 0%, #0c0c0c 100%); }

    .quote-box {
      max-width: 700px;
      border: 1px solid rgba(197, 160, 89, 0.4);
      padding: 40px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }

    .quote { font-family: 'Frank Ruhl Libre', serif; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 20px; color: white; }
    
    .big-num { font-size: clamp(5rem, 15vw, 10rem); font-weight: 900; color: var(--gold); opacity: 0.7; margin-top: 50px; }

    /* באנר התראות */
    #alert-banner {
      display: none;
      position: fixed; top: 80px; left: 0; right: 0;
      background: #8b0000; color: white; padding: 10px; text-align: center; z-index: 2000;
    }
  </style>
</head>
<body>

  <div id="alert-banner">⚠️ צבע אדום: <span id="alert-locations"></span></div>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date" style="font-size: 12px; opacity: 0.7;"></div>
    </div>
    
    <div class="header-center" id="parasha">טוען פרשה...</div>
    
    <div class="header-right">
      <button class="nav-btn" onclick="show('history')">היסטוריה</button>
      <button class="nav-btn" onclick="show('about')">אודות</button>
      <button class="nav-btn" onclick="show('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active">
    <div class="quote-box">
      <div class="quote">"העוצמה היא המפתח לקיום."</div>
      <div style="font-size: 1.2rem; color: var(--gold); margin-bottom: 30px;">- בנימין נתניהו</div>
      <button class="nav-btn" style="padding: 15px 35px; font-size: 1.1rem;" onclick="show('fun')">מוכנים לצלול לכיף?</button>
    </div>
  </div>

  <div id="history" class="page">
    <div class="big-num">6767</div>
    <h1>היסטוריה</h1>
    <p>ברוכים הבאים לעמוד ההיסטוריה המלכותי</p>
  </div>

  <div id="about" class="page">
    <div class="big-num">55655</div>
    <h1>אודותינו</h1>
    <p>כאן תוכלו לקרוא על החזון של דולב ורועי</p>
  </div>

  <div id="fun" class="page">
    <h1 style="color: var(--gold); font-size: 3rem; margin-top: 50px;">צוללים לכיף</h1>
    <div style="font-size: 6rem; letter-spacing: 20px;">2, 3, 5</div>
    <br>
    <button class="nav-btn" onclick="show('main')">חזרה לבית</button>
  </div>

  <script>
    // פונקציית ניווט מתוקנת
    function show(pageId) {
      console.log("Navigating to:", pageId); // לבדיקה בקונסול
      // מסתיר את כל הדפים
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });
      // מציג את הדף המבוקש
      const targetPage = document.getElementById(pageId);
      if (targetPage) {
        targetPage.classList.add('active');
        window.scrollTo(0, 0);
      }
    }

    // זמן ותאריך
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL');
      document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', {day:'numeric', month:'long'});
    }, 1000);

    // פרשה במרכז
    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });

    // פיקוד העורף
    async function checkAlerts() {
      try {
        const r = await fetch('https://www.oref.org.il/WarningMessages/alert/alerts.json');
        const d = await r.json();
        const b = document.getElementById('alert-banner');
        if (d && d.data) {
          document.getElementById('alert-locations').textContent = d.data.join(', ');
          b.style.display = 'block';
        } else { b.style.display = 'none'; }
      } catch(e) {}
    }
    setInterval(checkAlerts, 4000);
  </script>
</body>
</html>
