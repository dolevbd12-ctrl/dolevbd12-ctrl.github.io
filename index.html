<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@900&family=Rubik:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #041f12;
      --ok: #24d18a;
      --text: #ffffff;
    }

    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Rubik', sans-serif; background: var(--bg-dark); color: var(--text); overflow-x: hidden; }

    /* Header */
    .header {
      position: fixed; top: 0; width: 100%; height: 60px;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
    }

    .header-left { order: 1; font-size: 14px; }
    .header-center { order: 2; font-family: 'Frank Ruhl Libre', serif; color: var(--ok); font-size: 1.2rem; }
    .header-right { order: 3; display: flex; gap: 15px; }
    .header-right a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; }

    /* Hero Section with YOUR Image */
    .hero {
      height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      /* עדכון שם הקובץ המדויק מהצילום מסך שלכם */
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('image_2026-03-13_222345060.png');
      background-size: cover;
      background-position: center;
      text-align: center;
    }

    .quote { font-family: 'Frank Ruhl Libre', serif; font-size: clamp(2rem, 5vw, 4rem); max-width: 80%; text-shadow: 2px 2px 10px black; }
    .btn { margin-top: 20px; padding: 10px 30px; border: 2px solid white; background: none; color: white; border-radius: 50px; cursor: pointer; font-weight: bold; }

    /* Pages */
    .page { display: none; height: 100vh; padding-top: 80px; text-align: center; background: radial-gradient(circle, #06301c, #041f12); }
    .page.active { display: block; }
    .big-num { font-size: 10rem; font-weight: 900; color: var(--ok); margin-top: 50px; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left" id="clock">00:00:00</div>
    <div class="header-center" id="parasha">טוען פרשה...</div>
    <div class="header-right">
      <a onclick="show('history')">היסטוריה</a>
      <a onclick="show('about')">אודות</a>
      <a onclick="show('main')">בית</a>
    </div>
  </header>

  <div id="main" class="page active" style="padding-top:0;">
    <section class="hero">
      <div class="quote">"העוצמה היא המפתח לקיום."<br><small style="font-size: 1.2rem;">- בנימין נתניהו</small></div>
      <button class="btn" onclick="show('about')">מי אנחנו?</button>
    </section>
  </div>

  <div id="history" class="page">
    <div class="big-num">6767</div>
    <h2>היסטוריה /history</h2>
  </div>

  <div id="about" class="page">
    <div class="big-num">55655</div>
    <h2>אודות /about-us</h2>
  </div>

  <script>
    function show(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      // מעדכן את ה-URL בשורת הכתובת
      const path = id === 'main' ? '/' : (id === 'about' ? '/about-us' : '/history');
      window.history.pushState({}, '', path);
    }

    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL');
    }, 1000);

    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json())
      .then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });
  </script>
</body>
</html>
