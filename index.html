<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>האתר של דולב ורועי</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c5a059;
      --text-main: #f8f8f8;
      --bg-dark: #121212;
      --purple-page: #2e1a47;
      --blue-page: #1a2a47;
    }

    html { scroll-behavior: smooth; }
    body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

    /* ====== Header ====== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 40px; z-index: 1000; border-bottom: 1px solid var(--gold);
    }

    .header-left { display: flex; flex-direction: column; align-items: flex-start; }
    #clock { font-weight: 700; font-size: 18px; color: var(--gold); }
    #full-date { font-size: 12px; opacity: 0.7; }

    .header-center { font-family: 'Frank Ruhl Libre', serif; color: var(--gold); font-size: 1.6rem; font-weight: 700; text-align: center; }

    .header-right { display: flex; gap: 10px; justify-content: flex-end; }

    .nav-btn {
      color: var(--text-main); text-decoration: none; font-weight: 600; cursor: pointer;
      padding: 8px 16px; border: 1px solid var(--gold); border-radius: 4px; background: transparent; transition: 0.3s; font-size: 14px;
    }
    .nav-btn:hover { background: var(--gold); color: black; }

    /* ====== ניהול דפים ====== */
    .page { display: none; min-height: 100vh; padding-top: 80px; text-align: center; }
    .page.active { display: block; }

    #main-hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png');
      background-size: cover; background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* ====== קרוסלה אינסופית - זוגות זוגות ====== */
    .carousel-container {
      width: 100%; overflow: hidden; background: #000; padding: 60px 0;
      border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
      position: relative;
    }

    .carousel-track {
      display: flex;
      width: fit-content;
      animation: scroll-left 40s linear infinite; /* מהירות מותאמת ל-16 תמונות */
    }

    .carousel-track img {
      width: 400px; height: 300px; object-fit: cover;
      margin: 0 15px; border: 2px solid var(--gold); border-radius: 8px;
      transition: 0.4s;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .welcome-text { font-family: 'Frank Ruhl Libre', serif; font-size: 2.8rem; color: var(--gold); margin: 50px 0; font-weight: 700; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div id="clock">00:00:00</div>
      <div id="full-date"></div>
    </div>
    <div class="header-center" id="parasha">טוען פרשה...</div>
    <div class="header-right">
      <button class="nav-btn" onclick="showPage('history')">היסטוריה</button>
      <button class="nav-btn" onclick="showPage('about')">אודות</button>
      <button class="nav-btn" onclick="showPage('main')">דף הבית</button>
    </div>
  </header>

  <div id="main" class="page active" style="padding-top:0;">
    <section id="main-hero">
      <div class="quote-box">
        <div style="font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; margin-bottom: 20px;">"העוצמה היא המפתח לקיום."</div>
        <button class="nav-btn" style="padding: 18px 45px;" onclick="document.getElementById('welcome-zone').scrollIntoView();">מוכנים לצלול לכיף?</button>
      </div>
    </section>

    <section id="welcome-zone" style="padding-bottom: 100px; background: #0c0c0c;">
      <div class="welcome-text">רועי ודולב מברכים אתכם על היוולדותכם לעולם</div>
      
      <div class="carousel-container">
        <div class="carousel-track">
          <img src="./image_2026-03-13_230619314.png">
          <img src="./image_2026-03-13_230636882.png">
          <img src="./image_2026-03-13_230654112.png">
          <img src="./image_2026-03-13_230706432.png">
          <img src="./image_2026-03-13_230721055.png">
          <img src="./image_2026-03-13_230733426.png">
          <img src="./image_2026-03-13_230748568.png">
          <img src="./image_2026-03-13_230759616.png">
          
          <img src="./image_2026-03-13_230619314.png">
          <img src="./image_2026-03-13_230636882.png">
          <img src="./image_2026-03-13_230654112.png">
          <img src="./image_2026-03-13_230706432.png">
          <img src="./image_2026-03-13_230721055.png">
          <img src="./image_2026-03-13_230733426.png">
          <img src="./image_2026-03-13_230748568.png">
          <img src="./image_2026-03-13_230759616.png">
        </div>
      </div>
    </section>
  </div>

  <div id="history" class="page" style="background: radial-gradient(circle, var(--purple-page) 0%, #0c0c0c 100%);">
    <div style="font-size: 8rem; color: var(--gold); opacity: 0.5; margin-top: 50px;">6767</div>
    <h1>היסטוריה</h1>
  </div>

  <div id="about" class="page" style="background: radial-gradient(circle, var(--blue-page) 0%, #0c0c0c 100%);">
    <div style="font-size: 8rem; color: var(--gold); opacity: 0.5; margin-top: 50px;">55655</div>
    <h1>אודותינו</h1>
  </div>

  <script>
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL');
      document.getElementById('full-date').textContent = now.toLocaleDateString('he-IL', {day:'numeric', month:'long', year:'numeric'});
    }, 1000);

    fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=281184&lg=he")
      .then(r => r.json()).then(j => {
        const p = j.items.find(x => x.category === "parashat")?.title || "השבוע";
        document.getElementById('parasha').textContent = "פרשת " + p;
      });
  </script>
</body>
</html>
