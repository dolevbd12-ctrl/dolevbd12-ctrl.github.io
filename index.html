<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <title>D&R | Official</title>
  
  <link rel="icon" type="image/png" href="./image_2026-03-13_222345060.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Assistant:wght@300;600&family=Inter:wght@900&display=swap" rel="stylesheet">

  <style>
    :root { 
      --gold: #c5a059; 
      --bg: #050505; 
      --text: #ffffff;
      --nav-bg: rgba(255,255,255,0.08);
    }

    body.light-mode {
      --bg: #f5f5f5;
      --text: #1a1a1a;
      --nav-bg: rgba(0,0,0,0.05);
      --gold: #b08d48;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: 'Assistant', sans-serif; overflow-x: hidden;
      transition: background 0.5s ease;
    }

    /* ====== LOADING SCREEN ====== */
    #loading-screen {
      position: fixed; inset: 0; background: #050505; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s;
    }
    .loader-content { text-align: center; }
    .loader-logo {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px solid var(--gold);
      background: url('./image_2026-03-13_222345060.png') center/cover;
      animation: pulse 1.5s infinite ease-in-out;
      margin-bottom: 20px;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

    /* ====== NAVIGATION ====== */
    .nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 5000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px; pointer-events: none;
    }
    .nav > * { pointer-events: auto; }
    .nav-side { display: flex; gap: 8px; flex: 1; }
    .nav-side.right { justify-content: flex-start; }
    .nav-side.left { justify-content: flex-end; }

    .btn {
      background: var(--nav-bg); backdrop-filter: blur(10px);
      border: 1px solid var(--gold); color: var(--gold);
      padding: 7px 10px; border-radius: 4px; font-family: 'Cinzel';
      font-size: 0.6rem; cursor: pointer;
    }

    #clock { 
      font-family: 'Cinzel'; font-size: 13px; color: var(--gold); 
      flex: 0; white-space: nowrap; font-weight: 900;
    }

    /* ====== PAGES ====== */
    .page { display: none; opacity: 0; transition: 0.8s ease; width: 100%; }
    .page.active { display: block; opacity: 1; }

    /* ====== HERO ====== */
    .hero-container { height: 230vh; }
    .hero-sticky {
      position: sticky; top: 0; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('./image_2026-03-13_222345060.png') center/cover;
    }

    .parasha { font-family: 'Cinzel'; color: var(--gold); font-size: 1rem; letter-spacing: 4px; margin-bottom: 15px; }

    .main-title {
      font-family: 'Inter'; font-size: 14vw; line-height: 1;
      text-align: center; white-space: nowrap; will-change: transform;
      -webkit-text-stroke: 1px var(--gold); color: transparent;
    }

    .founded {
      position: absolute; bottom: 110px; font-family: 'Cinzel';
      font-size: 0.7rem; color: var(--gold); letter-spacing: 3px;
    }

    .dive-btn {
      position: absolute; bottom: 50px; border: 1px solid var(--gold);
      padding: 10px 22px; color: var(--gold); font-family: 'Cinzel';
      border-radius: 50px; cursor: pointer; font-size: 0.8rem;
    }

    .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
    .gallery img { width: 100%; border-radius: 4px; border: 1px solid var(--gold); }
  </style>
</head>
<body onload="init()">

  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-logo"></div>
      <div style="font-family:'Cinzel'; color:var(--gold); letter-spacing:5px;">D&R OFFICIAL</div>
    </div>
  </div>

  <nav class="nav">
    <div class="nav-side right">
      <button class="btn" onclick="location.href='/'">HOME</button>
      <button class="btn" onclick="toggleTheme()" id="theme-btn">LIGHT</button>
    </div>

    <div id="clock">00:00:00</div>

    <div class="nav-side left">
      <button class="btn" onclick="navigateTo('/history')">HISTORY</button>
      <button class="btn" onclick="navigateTo('/films')">FILMS</button>
    </div>
  </nav>

  <div id="page-home" class="page">
    <div class="hero-container">
      <div class="hero-sticky">
        <div class="parasha">פרשת כי תשא</div>
        <h1 class="main-title" id="animated-name">DOLEV & ROEE</h1>
        <div class="founded">EST. 2026</div>
        <div class="dive-btn" onclick="document.getElementById('gallery-section').scrollIntoView({behavior:'smooth'})">DIVE IN</div>
      </div>
    </div>
    <div class="gallery" id="gallery-section"></div>
  </div>

  <div id="page-history" class="page" style="padding:150px 20px; text-align:center;">
    <h1 style="font-family:Cinzel; color:var(--gold);">HISTORY</h1>
  </div>

  <div id="page-films" class="page" style="padding:150px 20px; text-align:center;">
    <h1 style="font-family:Cinzel; color:var(--gold);">FILMS</h1>
  </div>

  <script>
    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_230748568.png', './image_2026-03-13_222345060.png'
    ];

    function init() {
      // שעון
      setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL', {hour12:false});
      }, 1000);

      // טעינת תמונות לגלריה
      const gal = document.getElementById('gallery-section');
      images.forEach(s => {
        const i = document.createElement('img');
        i.src = s;
        gal.appendChild(i);
      });

      // העלמת מסך טעינה
      setTimeout(() => {
        const ls = document.getElementById('loading-screen');
        ls.style.opacity = '0';
        setTimeout(() => { ls.style.visibility = 'hidden'; }, 800);
      }, 2000); // מציג את הלואודינג ל-2 שניות

      handleRoute(window.location.pathname);
    }

    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('theme-btn');
      body.classList.toggle('light-mode');
      btn.textContent = body.classList.contains('light-mode') ? 'DARK' : 'LIGHT';
    }

    function navigateTo(path) {
      window.history.pushState({}, "", path);
      handleRoute(path);
      window.scrollTo(0,0);
    }

    function handleRoute(path) {
      document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
      let id = 'page-home';
      if(path.includes('history')) id = 'page-history';
      if(path.includes('films')) id = 'page-films';
      const target = document.getElementById(id);
      target.style.display = 'block';
      setTimeout(() => target.classList.add('active'), 50);
    }

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const winH = window.innerHeight;
      const progress = Math.min(scrollY / winH, 1.2);
      const name = document.getElementById('animated-name');
      
      const xPos = 40 - (progress * 100); 
      name.style.transform = `translateX(${xPos}%) scale(${1 + progress * 0.2})`;
      
      if (progress > 0.4) {
        name.style.color = 'var(--gold)';
        name.style.webkitTextStroke = '0px';
      } else {
        name.style.color = 'transparent';
        name.style.webkitTextStroke = '1px var(--gold)';
      }
    });

    window.onpopstate = () => handleRoute(window.location.pathname);
  </script>
</body>
</html>
