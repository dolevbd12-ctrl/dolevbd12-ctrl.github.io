<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&R | Official Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent-blue: #0047ab;
      --bg: #ffffff;
      --text: #000000;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
      background-color: var(--bg); color: var(--text); 
      overflow-x: hidden;
    }

    /* ====== לודרים ייחודיים ====== */
    .loader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; justify-content: center; align-items: center; z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #loader-main { background: #fff; }
    #loader-history { background: #111; color: white; }
    #loader-about { background: #000; clip-path: circle(0% at 50% 50%); transition: clip-path 0.8s ease-in-out; }
    #loader-about.active { clip-path: circle(150% at 50% 50%); }

    .loader-logo { font-size: 5rem; font-weight: 900; color: var(--accent-blue); animation: bounce 1.5s infinite; }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    /* ====== Navigation ====== */
    nav {
      position: fixed; top: 0; width: 100%; height: 100px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 1000; mix-blend-mode: difference; color: white;
    }
    .logo { font-weight: 900; font-size: 2.8rem; cursor: pointer; letter-spacing: -2px; }
    #clock { font-size: 1.3rem; font-weight: bold; }
    .nav-links { display: flex; gap: 40px; font-size: 15px; text-transform: uppercase; font-weight: 700; }
    .nav-links div { cursor: pointer; }

    /* ====== Hero & Text Animation ====== */
    .page { display: none; min-height: 100vh; width: 100%; }
    .page.active { display: block; }

    .hero {
      height: 100vh; width: 100%; position: sticky; top: 0;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('./image_2026-03-13_222345060.png') no-repeat center center/cover;
      display: flex; align-items: center; justify-content: center; color: white; z-index: 1;
    }

    /* הגדרות לאנימציה של הטקסט */
    .hero-content > * {
      opacity: 0;
      transform: translateY(50px);
      transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .hero.reveal-text .hero-content > * {
      opacity: 1;
      transform: translateY(0);
    }

    /* דירוג זמנים בין האלמנטים (Stagger) */
    .hero.reveal-text .hero-content p:nth-child(1) { transition-delay: 0.2s; }
    .hero.reveal-text .hero-content h1 { transition-delay: 0.4s; }
    .hero.reveal-text .hero-content .welcome-text { transition-delay: 0.6s; }
    .hero.reveal-text .hero-content .dive-btn { transition-delay: 0.8s; }

    .hero-content { text-align: center; }
    .hero-content h1 { font-size: 11vw; margin: 0; font-weight: 900; letter-spacing: -6px; line-height: 0.9; }

    .dive-btn {
      margin-top: 40px; display: inline-block; padding: 20px 60px; border: 2px solid white;
      color: white; text-transform: uppercase; letter-spacing: 5px; font-weight: 900;
      cursor: pointer; transition: 0.4s; background: transparent;
    }
    .dive-btn:hover { background: white; color: black; }

    /* ====== Reveal Section ====== */
    .reveal-section { position: relative; z-index: 2; background: white; box-shadow: 0 -20px 50px rgba(0,0,0,0.3); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
    .grid-item { position: relative; height: 90vh; overflow: hidden; cursor: pointer; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 1s ease; }
    .grid-item:hover img { transform: scale(1.05); }

    .subpage-container { padding: 180px 8%; background: white; min-height: 100vh; }
    .subpage-title { font-size: 10vw; font-weight: 900; letter-spacing: -5px; line-height: 0.8; margin-bottom: 50px; }
  </style>
</head>
<body onload="showInitialLoader()">

  <div id="loader-main" class="loader-overlay"><div class="loader-logo">D&R</div></div>
  <div id="loader-history" class="loader-overlay"><div style="font-size:3rem; letter-spacing:10px; color:white;">HISTORY</div></div>
  <div id="loader-about" class="loader-overlay"><div style="color:white; font-size:3rem; font-weight:900;">D&R FILMS</div></div>

  <nav>
    <div class="logo" onclick="goToPage('main')">D&R</div>
    <div id="clock">00:00:00</div>
    <div class="nav-links">
      <div onclick="diveToFun()">לצלול לכיף</div>
      <div onclick="goToPage('history')">היסטוריה</div>
      <div onclick="goToPage('about')">אודות</div>
    </div>
  </nav>

  <div id="main" class="page active">
    <section class="hero" id="hero-sec">
      <div class="hero-content">
        <p style="letter-spacing: 10px; font-weight:700;">OFFICIAL INTERFACE</p>
        <h1>DOLEV & ROEE</h1>
        <div class="welcome-text" style="font-family: 'Playfair Display'; font-style:italic; font-size: 1.5rem; margin-top:20px;">
          היי, אנחנו דולב ורועי, ברוכים הבאים לאתר
        </div>
        <div class="dive-btn" onclick="diveToFun()">לצלול לכיף</div>
      </div>
    </section>
    <div id="grid-start" class="reveal-section">
      <div class="grid" id="main-grid"></div>
    </div>
  </div>

  <div id="history" class="page">
    <div class="subpage-container">
      <div class="subpage-title">THE<br>LEGACY</div>
      <p style="font-size: 2rem; font-family: 'Playfair Display';">מורשת של מצוינות.</p>
    </div>
  </div>

  <div id="about" class="page">
    <div class="subpage-container">
      <div class="subpage-title">D&R<br>FILMS</div>
      <p style="font-size: 2rem; font-family: 'Playfair Display';">הסרטונים שלכם יופיעו כאן בקרוב.</p>
    </div>
  </div>

  <script>
    // פונקציית הטענה ראשונית עם הפעלת אנימציית טקסט
    function showInitialLoader() {
      const l = document.getElementById('loader-main');
      l.style.display = 'flex';
      setTimeout(() => { 
        l.style.opacity = '0'; 
        setTimeout(() => {
          l.style.display = 'none';
          document.getElementById('hero-sec').classList.add('reveal-text');
        }, 600); 
      }, 1500);
    }

    function goToPage(pageId) {
      let loaderId = 'loader-main';
      if(pageId === 'history') loaderId = 'loader-history';
      if(pageId === 'about') loaderId = 'loader-about';

      const loader = document.getElementById(loaderId);
      loader.style.display = 'flex';
      loader.style.opacity = '1';
      if(pageId === 'about') loader.classList.add('active');

      setTimeout(() => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('hero-sec').classList.remove('reveal-text');
        
        document.getElementById(pageId).classList.add('active');
        window.scrollTo(0,0);
        
        setTimeout(() => {
          loader.style.opacity = '0';
          loader.classList.remove('active');
          if(pageId === 'main') document.getElementById('hero-sec').classList.add('reveal-text');
          setTimeout(() => { loader.style.display='none'; }, 600);
        }, 800);
      }, 1000);
    }

    function diveToFun() {
      if (!document.getElementById('main').classList.contains('active')) {
        goToPage('main');
        setTimeout(() => {
          document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'});
        }, 1800);
      } else {
        document.getElementById('grid-start').scrollIntoView({behavior: 'smooth'});
      }
    }

    const images = [
      './image_2026-03-13_230619314.png', './image_2026-03-13_230636882.png',
      './image_2026-03-13_230654112.png', './image_2026-03-13_230706432.png',
      './image_2026-03-13_230721055.png', './image_2026-03-13_230733426.png',
      './image_2026-03-13_222345060.png'
    ];
    const grid = document.getElementById('main-grid');
    images.forEach(src => {
      const div = document.createElement('div');
      div.className = 'grid-item';
      div.innerHTML = `<img src="${src}">`;
      grid.appendChild(div);
    });

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('he-IL'); }, 1000);
  </script>
</body>
</html>
